# Predator Analytics v25 - Docker Compose Configuration

services:

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: predator_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-predator}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-predator_secret_key}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - predator-net
    profiles: ["local", "server"]

  arbiter:
    build:
      context: ./services/arbiter
      dockerfile: Dockerfile
    container_name: predator_arbiter
    ports:
      - "8091:8000"
    volumes:
      - ./services/arbiter:/app
      - ./infrastructure/constitution:/app/infrastructure/constitution
    environment:
      - CONSTITUTION_PATH=/app/infrastructure/constitution
    networks:
      - predator-net
    profiles: ["local", "server"]

  truth-ledger:
    build:
      context: ./services/truth-ledger
      dockerfile: Dockerfile
    container_name: predator_ledger
    ports:
      - "8092:8000"
    volumes:
      - ./services/truth-ledger:/app
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://admin:666666@postgres:5432/predator_db}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - predator-net
    profiles: ["local", "server"]

  backend:
    image: predator-backend:v25
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    container_name: predator_backend
    ports:
      - "8090:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./services/api-gateway/app:/app/app
      - ./services/api-gateway/src:/app/src
      - ./libs:/app/libs
      - ./predatorctl/predatorctl:/app/predatorctl
      - ./services/orchestrator:/app/orchestrator
      - ./services:/app/services
      - ./docs:/app/docs
      - ./scripts:/app/scripts
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://admin:666666@postgres:5432/predator_db}
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_URL=http://qdrant:6333
      - OPENSEARCH_URL=http://opensearch:9200
      - MINIO_ENDPOINT=minio:9000
      - RABBITMQ_URL=amqp://predator:predator_secret_key@rabbitmq:5672/
      - PRELOAD_MODELS=false
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - predator-net
    profiles: ["local", "server"]

  orchestrator:
    image: predator-orchestrator:v25
    build:
      context: .
      dockerfile: services/orchestrator/Dockerfile
    container_name: predator_orchestrator
    network_mode: host
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://predator:predator_password@127.0.0.1:5432/predator_db}
      - REDIS_URL=redis://127.0.0.1:6379/1
      - QDRANT_URL=http://127.0.0.1:6333
      - OPENSEARCH_URL=http://127.0.0.1:9200
      - OLLAMA_BASE_URL=http://127.0.0.1:11434
    volumes:
      - ./services/orchestrator:/app/orchestrator
      - ./docs:/app/docs
      - ./scripts:/app/scripts
      - ./services/api-gateway/app:/app/app
      - ./libs:/app/libs
      - orchestrator_logs:/app/logs
      - /var/run/docker.sock:/var/run/docker.sock
    deploy:
      resources:
        limits:
          memory: 4G
        # reservations:
        #   devices:
        #     - driver: nvidia
        #       count: 1
        #       capabilities: [gpu]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    restart: unless-stopped
    profiles: ["server"]

  celery_worker:
    image: predator-backend:v25
    container_name: predator_celery_worker
    command: celery -A app.core.celery_app worker --loglevel=info -Q etl,ingestion,maintenance,monitoring,analytics --prefetch-multiplier=1 --concurrency=4
    volumes:
      - ./services/api-gateway/app:/app/app
      - ./services/api-gateway/src:/app/src
      - ./libs:/app/libs
      - ./predatorctl/predatorctl:/app/predatorctl
      - ./services/orchestrator:/app/orchestrator
      - ./services:/app/services
      - ./docs:/app/docs
      - ./scripts:/app/scripts
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://admin:666666@postgres:5432/predator_db}
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_URL=http://qdrant:6333
      - OPENSEARCH_URL=http://opensearch:9200
      - MINIO_ENDPOINT=minio:9000
      - RABBITMQ_URL=amqp://predator:predator_secret_key@rabbitmq:5672/
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - predator-net
    profiles: ["local", "server"]
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.core.celery_app inspect ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  celery_beat:
    image: predator-backend:v25
    container_name: predator_celery_beat
    command: celery -A app.core.celery_app beat --loglevel=info
    volumes:
      - ./services/api-gateway/app:/app/app
      - ./libs:/app/libs
      - ./predatorctl/predatorctl:/app/predatorctl
      - ./services/orchestrator:/app/orchestrator
      - ./services:/app/services
      - ./docs:/app/docs
      - ./scripts:/app/scripts
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://predator:predator_password@postgres:5432/predator_db}
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - predator-net
    profiles: ["local", "server"]
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.core.celery_app inspect ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./apps/predator-analytics-ui
      dockerfile: Dockerfile
    container_name: predator_frontend
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped
    networks:
      - predator-net
    profiles: ["local", "server"]

  postgres:
    image: timescale/timescaledb:latest-pg15
    container_name: predator_postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-666666}
      POSTGRES_DB: predator_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U admin -d predator_db" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - predator-net
    profiles: ["local", "server"]

  redis:
    image: redis:7-alpine
    container_name: predator_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - predator-net
    profiles: ["local", "server"]

  qdrant:
    image: qdrant/qdrant:latest
    container_name: predator_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    networks:
      - predator-net
    profiles: ["local", "server"]

  opensearch:
    image: opensearchproject/opensearch:2.11.0
    container_name: predator_opensearch
    environment:
      - cluster.name=predator-cluster
      - node.name=predator-node1
      - discovery.type=single-node
      - bootstrap.memory_lock=false
      - "OPENSEARCH_JAVA_OPTS=-Xms1g -Xmx1g"
      - DISABLE_SECURITY_PLUGIN=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "9200:9200"
      - "9600:9600"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    restart: unless-stopped
    networks:
      - predator-net
    profiles: ["local", "server"]

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.11.0
    container_name: predator_dashboards
    ports:
      - "5601:5601"
    environment:
      - 'OPENSEARCH_HOSTS=["http://opensearch:9200"]'
      - "DISABLE_SECURITY_PLUGIN=true"
      - "SERVER_BASEPATH=/opensearch-dashboards"
      - "SERVER_REWRITEBASEPATH=true"
    volumes:
      - ./opensearch_dashboards_no_auth.yml:/usr/share/opensearch-dashboards/config/opensearch_dashboards.yml:ro
    depends_on:
      opensearch:
        condition: service_started
    restart: unless-stopped
    networks:
      - predator-net
    profiles: ["local", "server"]

  minio:
    image: minio/minio
    container_name: predator_minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-predator_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-predator_secret_key}
      MINIO_BROWSER_REDIRECT_URL: "https://commendatory-loriann-unappealingly.ngrok-free.dev/minio"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - predator-net
    profiles: ["local", "server"]

  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    container_name: predator_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - predator-net
    profiles: ["local", "server"]

  kafka:
    image: confluentinc/cp-kafka:latest
    container_name: predator_kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - predator-net
    profiles: ["local", "server"]

  h2o-llm-studio:
    image: h2oairelease/h2oai-llmstudio-app:latest
    container_name: h2o-llmstudio
    ports:
      - "10101:10101"
    environment:
      - H2O_WAVE_MAX_REQUEST_SIZE=100MB
      - H2O_WAVE_NO_LOGGING=true
      - H2O_WAVE_BASE_URL=/llm-studio
      - CUDA_VISIBLE_DEVICES=  # Empty = CPU mode (no GPU crashes)
    volumes:
      - h2o_workspace:/workspace
      - ./configs/h2o:/configs
    # GPU mode - uncomment when NVIDIA Container Toolkit is properly configured
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:10101/ || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 120s
    restart: "no"  # Disabled to prevent crash loop - enable after GPU setup
    networks:
      - predator-net
    profiles: ["server"]

  ollama:
    image: ollama/ollama:latest
    container_name: predator_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    networks:
      - predator-net
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles: ["local", "server"]

  mlflow:
    build:
      context: ./infra/mlflow
      dockerfile: Dockerfile
    container_name: predator_mlflow
    ports:
      - "5001:5000"
    environment:
      - MLFLOW_S3_ENDPOINT_URL=http://minio:9000
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER:-predator_admin}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD:-predator_secret_key}
    depends_on:
      - postgres
      - minio
    restart: unless-stopped
    networks:
      - predator-net
    profiles: ["server"]

  grafana:
    image: grafana/grafana:latest
    container_name: predator_grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-666666}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=true
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards
    restart: unless-stopped
    networks:
      - predator-net
    profiles: ["server"]

  prometheus:
    image: prom/prometheus:latest
    container_name: predator_prometheus
    ports:
      - "9092:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - predator-net
    profiles: ["server"]

  alertmanager:
    image: prom/alertmanager:latest
    container_name: predator_alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./infra/prometheus/alertmanager.yml:/etc/alertmanager/config.yml
    command:
      - '--config.file=/etc/alertmanager/config.yml'
      - '--storage.path=/alertmanager'
    restart: unless-stopped
    networks:
      - predator-net
    profiles: ["server"]

  telegram-bot:
    build:
      context: .
      dockerfile: apps/telegram-bot/Dockerfile
    container_name: predator_telegram_bot
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_ADMIN_IDS=${TELEGRAM_ADMIN_IDS}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - REDIS_URL=redis://redis:6379/1
      - POSTGRES_DSN=${DATABASE_URL:-postgresql+asyncpg://predator:predator_password@postgres:5432/predator_db}
      - ENVIRONMENT=rnd
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - ./apps/telegram-bot:/app
      - ./libs:/app/libs
    networks:
      - predator-net
    profiles: ["local", "server"]

  # ═══════════════════════════════════════════════════════════════
  # v28-S Constitutional Framework Services
  # ═══════════════════════════════════════════════════════════════

  som:
    build:
      context: ./services/som
      dockerfile: Dockerfile
    container_name: predator_som
    ports:
      - "8095:8095"
    volumes:
      - ./services/som:/app
      - ./infrastructure/constitution:/app/infrastructure/constitution
      - ./libs:/app/libs
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://admin:666666@postgres:5432/predator_db}
      - REDIS_URL=redis://redis:6379/0
      - ARBITER_URL=http://arbiter:8000
      - LEDGER_URL=http://truth-ledger:8000
      - RCE_URL=http://rce:8093
      - VPC_URL=http://vpc-verifier:8094
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      arbiter:
        condition: service_started
      truth-ledger:
        condition: service_started
    restart: unless-stopped
    networks:
      - predator-net
    profiles: ["local", "server"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8095/api/v1/som/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  rce:
    build:
      context: ./services/rce
      dockerfile: Dockerfile
    container_name: predator_rce
    ports:
      - "8093:8093"
    volumes:
      - ./services/rce:/app
      - ./libs:/app/libs
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - predator-net
    profiles: ["local", "server"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8093/api/v1/rce/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  vpc-verifier:
    build:
      context: ./services/vpc-verifier
      dockerfile: Dockerfile
    container_name: predator_vpc
    ports:
      - "8094:8094"
    volumes:
      - ./services/vpc-verifier:/app
      - ./libs:/app/libs
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://admin:666666@postgres:5432/predator_db}
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - predator-net
    profiles: ["local", "server"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8094/api/v1/vpc/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  opensearch_data:
  minio_data:
  grafana_data:
  prometheus_data:
  orchestrator_logs:
  h2o_workspace:
  ollama_data:

networks:
  predator-net:
    driver: bridge
