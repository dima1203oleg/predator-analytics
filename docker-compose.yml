# Predator Analytics v56.5-ELITE - Production Docker Compose
# Single network: predator-network | No hardcoded secrets | No duplicates

services:

  # ═══════════════════════════════════════════════════════════════ʼʼ
  # 1. DATA STACK (PostgreSQL, Redis, Neo4j, Qdrant, OpenSearch, MinIO, Kafka)
  # ═══════════════════════════════════════════════════════════════

  postgres:
    image: timescale/timescaledb:latest-pg15
    container_name: predator_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-predator_db}
    ports: ["5432:5432"]
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-predator_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 8G
    restart: unless-stopped
    networks: [predator-network]
    profiles: ["local", "server"]

  redis:
    image: redis:7-alpine
    container_name: predator_redis
    ports: ["6379:6379"]
    volumes: [redis_data:/data]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
    deploy:
      resources:
        limits:
          memory: 4G
    restart: unless-stopped
    networks: [predator-network]
    profiles: ["local", "server"]

  neo4j:
    image: neo4j:5.16.0
    container_name: predator_neo4j
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD}
      - NEO4J_apoc_export_file_enabled=true
      - NEO4J_apoc_import_file_enabled=true
      - NEO4J_apoc_import_file_use__neo4j__config=true
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_memory_heap_max__size=1G
      - NEO4J_dbms_memory_pagecache_size=2G
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_import:/var/lib/neo4j/import
      - neo4j_plugins:/plugins
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 4G
    restart: unless-stopped
    networks: [predator-network]
    profiles: ["local", "server"]

  qdrant:
    image: qdrant/qdrant:latest
    container_name: predator_qdrant
    ports: ["6333:6333", "6334:6334"]
    volumes: [qdrant_data:/qdrant/storage]
    deploy:
      resources:
        limits:
          memory: 4G
    restart: unless-stopped
    networks: [predator-network]
    profiles: ["local", "server"]

  opensearch:
    image: opensearchproject/opensearch:2.17.1
    container_name: predator_opensearch
    environment:
      - discovery.type=single-node
      - bootstrap.memory_lock=false
      - "OPENSEARCH_JAVA_OPTS=-Xms2g -Xmx2g"
      - DISABLE_SECURITY_PLUGIN=true
    ulimits:
      memlock: { soft: -1, hard: -1 }
    ports: ["9200:9200", "9600:9600"]
    volumes: [opensearch_data:/usr/share/opensearch/data]
    deploy:
      resources:
        limits:
          memory: 4G
    restart: unless-stopped
    networks: [predator-network]
    profiles: ["local", "server"]

  minio:
    image: minio/minio
    container_name: predator_minio
    command: server /data --console-address ":9001"
    ports: ["9000:9000", "9001:9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes: [minio_data:/data]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
    restart: unless-stopped
    networks: [predator-network]
    profiles: ["local", "server"]

  redpanda:
    image: redpandadata/redpanda:v24.2.19
    container_name: predator_redpanda
    command:
      - redpanda
      - start
      - --smp 1
      - --overprovisioned
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr internal://redpanda:8082,external://localhost:18082
    ports:
      - "19092:19092"
      - "18082:18082"
      - "9644:9644"
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f localhost:9644/v1/status/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 3G
    restart: unless-stopped
    networks: [predator-network]
    profiles: ["local", "server"]

  # ═══════════════════════════════════════════════════════════════
  # 2. CORE STACK (Backend, Celery, Frontend)
  # ═══════════════════════════════════════════════════════════════

  rtb-engine:
    build:
      context: .
      dockerfile: services/rtb-engine/Dockerfile
    ports:
      - "9010:8000"
    environment:
      - CEREBRO_URL=http://cerebro:8000/orchestrate/ret
    depends_on:
      - cerebro
    restart: unless-stopped
    networks: [predator-network]
    profiles: ["local", "server"]

  cerebro:
    build:
      context: .
      dockerfile: services/cerebro/Dockerfile
    ports:
      - "9020:8000"
    environment:
      - TRAINING_CONTROLLER_URL=http://training-controller:8000
      - VALIDATION_CONTROLLER_URL=http://validation-controller:8000
    restart: unless-stopped
    networks: [predator-network]
    profiles: ["local", "server"]

  mcp-router:
    build:
      context: .
      dockerfile: services/mcp-router/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - REDIS_URL=redis://redis:6379/1
      - OLLAMA_BASE_URL=http://ollama:11434
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks: [predator-network]
    profiles: ["local", "server"]

  graph-service:
    build:
      context: .
      dockerfile: services/graph-service/Dockerfile
    ports:
      - "9030:8000"
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
    depends_on:
      - neo4j
    restart: unless-stopped
    networks: [predator-network]
    profiles: ["local", "server"]

  ingestion-worker:
    build:
      context: .
      dockerfile: services/ingestion-worker/Dockerfile
    container_name: predator_ingestion_worker
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=redpanda:9092
      - POSTGRES_USER=${POSTGRES_USER:-admin}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-predator_db}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
      - OPENSEARCH_HOSTS=http://opensearch:9200
      - OPENSEARCH_USERNAME=admin
      - OPENSEARCH_PASSWORD=admin
      - OPENSEARCH_TLS_VERIFY=false
      - QDRANT_URL=http://qdrant:6333
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD}
      - MINIO_SECURE=false
      - MINIO_BUCKET_INGESTION=raw-uploads
    depends_on:
      redpanda:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 4G
    restart: unless-stopped
    networks: [predator-network]
    profiles: ["local", "server"]

  backend:
    image: predator-backend:latest
    build:
      context: .
      dockerfile: services/core-api/Dockerfile
    container_name: predator_backend
    ports:
      - "8090:8000"
    extra_hosts: ["host.docker.internal:host-gateway"]
    volumes:
      - ./services/core-api/app:/app/app
      - ./libs:/libs
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}}
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_URL=http://qdrant:6333
      - OPENSEARCH_HOSTS=http://opensearch:9200
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD}
      - KAFKA_BROKERS=redpanda:9092
      - MCP_ROUTER_URL=http://mcp-router:8080/v1/query
      - GRAPH_SERVICE_URL=http://graph-service:8000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mcp-router:
        condition: service_started
      graph-service:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 8G
    restart: unless-stopped
    networks: [predator-network]
    profiles: ["local", "server"]

  celery_worker:
    image: predator-backend:latest
    container_name: predator_celery_worker
    command: celery -A app.core.celery_app worker --loglevel=info -Q etl,ingestion,maintenance,monitoring --prefetch-multiplier=1 --concurrency=4
    volumes:
      - ./services/core-api/app:/app/app
      - ./libs:/libs
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}}
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_URL=http://qdrant:6333
      - OPENSEARCH_HOSTS=http://opensearch:9200
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD}
      - KAFKA_BROKERS=redpanda:9092
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks: [predator-network]
    profiles: ["local", "server"]

  celery_beat:
    image: predator-backend:latest
    container_name: predator_celery_beat
    command: celery -A app.core.celery_app beat --loglevel=info
    volumes:
      - ./services/core-api/app:/app/app
      - ./libs:/libs
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}}
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks: [predator-network]
    profiles: ["local", "server"]

  frontend:
    build:
      context: ./apps/predator-analytics-ui
      dockerfile: Dockerfile
    container_name: predator_frontend
    ports: ["3030:3030"]
    environment:
      - API_UPSTREAM=http://predator_backend:8000
    depends_on: [backend]
    restart: unless-stopped
    networks: [predator-network]
    profiles: ["local", "server"]

  # ═══════════════════════════════════════════════════════════════
  # 3. AI/ML STACK (Ollama, Orchestrator, H2O)
  # ═══════════════════════════════════════════════════════════════

  ollama:
    image: ollama/ollama:latest
    container_name: predator_ollama
    ports: ["11434:11434"]
    volumes: [ollama_data:/root/.ollama]
    deploy:
      resources:
        limits:
          memory: 8G
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    networks: [predator-network]
    profiles: ["local", "server"]

  orchestrator:
    image: predator-orchestrator:v56.5-elite
    build:
      context: .
      dockerfile: apps/self-improve-orchestrator/Dockerfile
    container_name: predator_orchestrator
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}}
      - REDIS_URL=redis://redis:6379/1
      - QDRANT_URL=http://qdrant:6333
      - OPENSEARCH_URL=http://opensearch:9200
      - OLLAMA_BASE_URL=http://ollama:11434
    volumes:
      - ./apps/self-improve-orchestrator:/app/orchestrator
      - ./services/core-api/app:/app/app
      - ./libs:/app/libs
      - orchestrator_logs:/app/logs
    deploy:
      resources:
        limits:
          memory: 4G
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    restart: unless-stopped
    networks: [predator-network]
    profiles: ["server"]

  # ═══════════════════════════════════════════════════════════════
  # 3.5 SECURITY & IDENTITY (Keycloak, Vault)
  # ═══════════════════════════════════════════════════════════════

  keycloak:
    image: quay.io/keycloak/keycloak:22.0.5
    container_name: predator_keycloak
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-predator_db}
      KC_DB_USERNAME: ${POSTGRES_USER:-admin}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    command: start-dev
    ports: ["8080:8080"]
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 2G
    restart: unless-stopped
    networks: [predator-network]
    profiles: ["server"]

  vault:
    image: hashicorp/vault:1.15
    container_name: predator_vault
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: root
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    ports: ["8200:8200"]
    cap_add: ["IPC_LOCK"]
    deploy:
      resources:
        limits:
          memory: 1G
    restart: unless-stopped
    networks: [predator-network]
    profiles: ["server"]

  # ═══════════════════════════════════════════════════════════════
  # 4. OBSERVABILITY (Prometheus, Grafana)
  # ═══════════════════════════════════════════════════════════════

  prometheus:
    image: prom/prometheus:latest
    container_name: predator_prometheus
    ports: ["9090:9090"]
    volumes:
      - prometheus_data:/prometheus
    deploy:
      resources:
        limits:
          memory: 2G
    restart: unless-stopped
    networks: [predator-network]
    profiles: ["server"]

  alertmanager:
    image: prom/alertmanager:latest
    container_name: predator_alertmanager
    ports: ["9093:9093"]
    volumes:
      - alertmanager_data:/alertmanager
    restart: unless-stopped
    networks: [predator-network]
    profiles: ["server"]

  grafana:
    image: grafana/grafana:latest
    container_name: predator_grafana
    ports: ["3001:3000"]
    volumes:
      - grafana_data:/var/lib/grafana
    deploy:
      resources:
        limits:
          memory: 1G
    restart: unless-stopped
    networks: [predator-network]
    profiles: ["server"]

  loki:
    image: grafana/loki:latest
    container_name: predator_loki
    ports: ["3100:3100"]
    volumes:
      - loki_data:/loki
    deploy:
      resources:
        limits:
          memory: 2G
    restart: unless-stopped
    networks: [predator-network]
    profiles: ["server"]

  dcgm-exporter:
    image: nvcr.io/nvidia/k8s/dcgm-exporter:3.3.0-3.2.0-ubuntu22.04
    container_name: predator_dcgm_exporter
    ports: ["9400:9400"]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    networks: [predator-network]
    profiles: ["server"]

  # ═══════════════════════════════════════════════════════════════
  # 5. TELEGRAM BOT
  # ═══════════════════════════════════════════════════════════════

  telegram-bot:
    build:
      context: .
      dockerfile: apps/self-improve-orchestrator/Dockerfile
    container_name: predator_telegram_bot
    command: python3 -m orchestrator.telegram.bot
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_ADMIN_IDS=${TELEGRAM_ADMIN_IDS}
      - REDIS_URL=redis://redis:6379/1
      - POSTGRES_DSN=${DATABASE_URL:-postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}}
      - ENVIRONMENT=production
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - ./apps/self-improve-orchestrator:/app/orchestrator
      - ./libs:/app/libs
    restart: unless-stopped
    networks: [predator-network]
    profiles: ["local", "server"]

volumes:
  postgres_data:
  redis_data:
  neo4j_data:
  neo4j_logs:
  neo4j_import:
  neo4j_plugins:
  qdrant_data:
  opensearch_data:
  minio_data:
  redpanda_data:
  ollama_data:
  orchestrator_logs:
  prometheus_data:
  grafana_data:
  loki_data:
  alertmanager_data:

networks:
  predator-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
