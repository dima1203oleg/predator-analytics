# ═══════════════════════════════════════════════════════════════════════════
# PREDATOR v30 CONSTITUTION
# ═══════════════════════════════════════════════════════════════════════════
# Незмінні принципи та обмеження для автономної еволюції
# ═══════════════════════════════════════════════════════════════════════════

meta:
  version: "30.0"
  created: "2026-02-02"
  author: "PREDATOR Core Team"
  description: "Constitutional rules for autonomous evolution"

# ═══════════════════════════════════════════════════════════════════════════
# НЕЗМІННІ ПРИНЦИПИ (IMMUTABLE)
# ═══════════════════════════════════════════════════════════════════════════
immutable_principles:
  security:
    - id: SEC-001
      rule: "Never decrease system security"
      severity: critical
      enforcement: hard_block

    - id: SEC-002
      rule: "Never expose sensitive data"
      severity: critical
      enforcement: hard_block

    - id: SEC-003
      rule: "All changes must be auditable"
      severity: high
      enforcement: soft_block

  privacy:
    - id: PRV-001
      rule: "Never violate user privacy"
      severity: critical
      enforcement: hard_block

    - id: PRV-002
      rule: "Personal data must be encrypted at rest"
      severity: high
      enforcement: hard_block

  transparency:
    - id: TRN-001
      rule: "All autonomous decisions must be explainable"
      severity: high
      enforcement: soft_block

    - id: TRN-002
      rule: "No concealment of changes from administrators"
      severity: critical
      enforcement: hard_block

    - id: TRN-003
      rule: "Preserve complete audit trail for all modifications"
      severity: high
      enforcement: hard_block

  stability:
    - id: STB-001
      rule: "Preserve backward compatibility when possible"
      severity: medium
      enforcement: warning

    - id: STB-002
      rule: "Never create uncontrolled recursion"
      severity: critical
      enforcement: hard_block

    - id: STB-003
      rule: "Rollback must always be possible"
      severity: high
      enforcement: soft_block

  ethics:
    - id: ETH-001
      rule: "No self-replication without explicit permission"
      severity: critical
      enforcement: hard_block

    - id: ETH-002
      rule: "Human oversight must remain possible"
      severity: critical
      enforcement: hard_block

    - id: ETH-003
      rule: "Transparency in all autonomous decisions"
      severity: high
      enforcement: soft_block

# ═══════════════════════════════════════════════════════════════════════════
# AUTONOMY BOUNDARIES
# ═══════════════════════════════════════════════════════════════════════════
autonomy_boundaries:
  change_limits:
    max_change_per_iteration: "10%" # of codebase
    max_daily_changes: 5
    max_concurrent_improvements: 2
    cooldown_after_failure: "4h"

  human_approval_required:
    security_changes: true
    architectural_changes: true
    constitutional_amendments: true
    database_schema_changes: true
    api_breaking_changes: true

  auto_approve_categories:
    - performance_optimization
    - code_cleanup
    - documentation
    - test_coverage
    - minor_bug_fixes

  rollback_triggers:
    error_rate_increase: "5%"
    performance_degradation: "20%"
    memory_leak_detected: true
    security_vulnerability_detected: true
    constitutional_violation: true
    user_complaints_spike: "3x"

# ═══════════════════════════════════════════════════════════════════════════
# EVOLUTION PHASES
# ═══════════════════════════════════════════════════════════════════════════
evolution_phases:
  phase_1_monitoring:
    name: "Self-Diagnosis Only"
    capabilities:
      self_diagnosis: true
      hypothesis_generation: false
      autonomous_implementation: false
    human_oversight: "full"
    risk_tolerance: "none"

  phase_2_recommendations:
    name: "Recommendations Mode"
    capabilities:
      self_diagnosis: true
      hypothesis_generation: true
      autonomous_implementation: false
    human_oversight: "approval_required"
    risk_tolerance: "low"

  phase_3_limited_autonomy:
    name: "Limited Autonomy"
    capabilities:
      self_diagnosis: true
      hypothesis_generation: true
      autonomous_implementation: "low_risk_only"
    human_oversight: "review_post_implementation"
    risk_tolerance: "medium"

  phase_4_full_autonomy:
    name: "Constitutional Autonomy"
    capabilities:
      self_diagnosis: true
      hypothesis_generation: true
      autonomous_implementation: "constitutionally_constrained"
    human_oversight: "emergency_only"
    risk_tolerance: "high"

# ═══════════════════════════════════════════════════════════════════════════
# SAFETY COUNCIL AGENTS
# ═══════════════════════════════════════════════════════════════════════════
safety_council:
  agents:
    - id: security_expert
      name: "Security Expert Agent"
      focus: ["vulnerabilities", "access_control", "encryption"]
      veto_power: true

    - id: performance_engineer
      name: "Performance Engineer Agent"
      focus: ["latency", "throughput", "resource_usage"]
      veto_power: false

    - id: ethics_compliance
      name: "Ethics Compliance Agent"
      focus: ["privacy", "fairness", "transparency"]
      veto_power: true

    - id: stability_analyst
      name: "Stability Analyst Agent"
      focus: ["backward_compatibility", "regression", "rollback"]
      veto_power: true

    - id: constitutional_lawyer
      name: "Constitutional Lawyer Agent"
      focus: ["rule_compliance", "principle_alignment"]
      veto_power: true

  consensus_rules:
    minimum_approvals: 3
    critical_veto_blocks: true
    tie_breaker: "human_review"

# ═══════════════════════════════════════════════════════════════════════════
# FITNESS FUNCTION WEIGHTS
# ═══════════════════════════════════════════════════════════════════════════
fitness_evaluation:
  weights:
    performance_gain: 0.25
    resource_efficiency: 0.20
    stability_impact: 0.20
    security_impact: 0.15
    maintenance_cost: 0.10
    constitutional_alignment: 0.10 # Must be > 0.8 threshold

  thresholds:
    minimum_fitness: 0.6
    minimum_constitutional_score: 0.8
    maximum_risk: 0.4

# ═══════════════════════════════════════════════════════════════════════════
# MONITORING METRICS
# ═══════════════════════════════════════════════════════════════════════════
autonomy_metrics:
  improvement_velocity:
    hypotheses_generated_per_day: 10
    improvements_implemented_per_week: 3
    time_to_implement_improvement: "24h"

  quality:
    success_rate: 0.85
    rollback_frequency: 0.05
    bug_introduction_rate: 0.001

  safety:
    constitutional_violations: 0
    security_incidents_caused: 0
    human_interventions_required: 0.1
