{{- if .Values.vault.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: predator-secrets
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: predator-secrets
    creationPolicy: Owner
  data:
    - secretKey: database-url
      remoteRef:
        key: secret/predator/database
        property: url
    - secretKey: mq-password
      remoteRef:
        key: secret/predator/mq
        property: password
    - secretKey: s3-secret-key
      remoteRef:
        key: secret/predator/minio
        property: secret_key
    - secretKey: openai-api-key
      remoteRef:
        key: secret/predator/llm
        property: openai_key
{{- else }}
# Fallback Secret for Dev functionality (Non-Vault)
apiVersion: v1
kind: Secret
metadata:
  name: predator-secrets
type: Opaque
stringData:
  database-url: "postgresql://{{ .Values.postgresql.auth.username }}:{{ .Values.global.dbPassword }}@{{ .Release.Name }}-postgresql:5432/{{ .Values.postgresql.auth.database }}"
  mq-password: "{{ .Values.global.mqPassword }}"
{{- end }}
