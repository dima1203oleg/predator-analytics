apiVersion: v2
name: predator-backend
description: PREDATOR Analytics Backend Services - FastAPI + Workers
type: application
version: 30.1.0
appVersion: "30.1"

maintainers:
  - name: PREDATOR Team
    email: dev@predator-analytics.com

dependencies:
  - name: postgresql
    version: "12.x.x"
    repository: "https://charts.bitnami.com/bitnami"
    condition: postgresql.enabled

  - name: redis
    version: "17.x.x"
    repository: "https://charts.bitnami.com/bitnami"
    condition: redis.enabled

keywords:
  - analytics
  - ai
  - backend
  - fastapi
  - python

annotations:
  category: Analytics
  licenses: Proprietary
