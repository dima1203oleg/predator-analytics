apiVersion: v1
kind: Secret
metadata:
  name: {{ include "predator-backend.fullname" . }}-secrets
  labels:
    {{- include "predator-backend.labels" . | nindent 4 }}
type: Opaque
data:
  database-url: {{ include "predator-backend.databaseUrl" . | b64enc | quote }}
  redis-url: {{ include "predator-backend.redisUrl" . | b64enc | quote }}
  jwt-secret-key: {{ .Values.secrets.jwtSecretKey | required "secrets.jwtSecretKey is required" | b64enc | quote }}
  opensearch-password: {{ .Values.externalServices.opensearch.password | b64enc | quote }}
  qdrant-api-key: {{ .Values.externalServices.qdrant.apiKey | default "" | b64enc | quote }}
  minio-access-key: {{ .Values.externalServices.minio.accessKey | b64enc | quote }}
  minio-secret-key: {{ .Values.externalServices.minio.secretKey | b64enc | quote }}
