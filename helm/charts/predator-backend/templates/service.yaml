apiVersion: v1
kind: Service
metadata:
  name: {{ include "predator-backend.fullname" . }}
  labels:
    {{- include "predator-backend.labels" . | nindent 4 }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
    - port: 9090
      targetPort: metrics
      protocol: TCP
      name: metrics
  selector:
    {{- include "predator-backend.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: api-gateway
