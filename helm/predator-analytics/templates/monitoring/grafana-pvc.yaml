apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "predator-analytics.fullname" . }}-grafana
  labels:
    {{- include "predator-analytics.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: {{ .Values.global.storageClass }}
  resources:
    requests:
      storage: {{ .Values.monitoring.grafana.persistence.size }}
