apiVersion: v1
kind: Service
metadata:
  name: {{ include "predator-analytics.fullname" . }}-grafana
  labels:
    {{- include "predator-analytics.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
spec:
  type: {{ .Values.monitoring.grafana.service.type }}
  ports:
    - name: http
      port: {{ .Values.monitoring.grafana.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "predator-analytics.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
