apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "predator-analytics.fullname" . }}-mlflow
  labels:
    {{- include "predator-analytics.labels" . | nindent 4 }}
    app.kubernetes.io/component: mlflow
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "predator-analytics.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: mlflow
  template:
    metadata:
      labels:
        {{- include "predator-analytics.labels" . | nindent 8 }}
        app.kubernetes.io/component: mlflow
    spec:
      {{- with .Values.mlflow.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: mlflow
          securityContext:
            {{- toYaml .Values.mlflow.securityContext | nindent 12 }}
          image: {{ include "predator-analytics.image" (dict "root" . "image" .Values.mlflow.image) }}
          imagePullPolicy: {{ .Values.mlflow.image.pullPolicy }}
          command: ["bash", "-c", "pip install mlflow psycopg2-binary && mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri postgresql://predator:{{ .Values.postgresql.auth.postgresPassword }}@{{ .Release.Name }}-postgresql:5432/predator_db --default-artifact-root /mlflow/artifacts"]
          ports:
            - name: http
              containerPort: 5000
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.mlflow.resources | nindent 12 }}
          env:
            {{- toYaml .Values.mlflow.env | nindent 12 }}
          volumeMounts:
            - name: mlflow-data
              mountPath: /mlflow
      volumes:
        - name: mlflow-data
          persistentVolumeClaim:
            claimName: {{ include "predator-analytics.fullname" . }}-mlflow
      {{- with .Values.mlflow.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.mlflow.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.mlflow.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
