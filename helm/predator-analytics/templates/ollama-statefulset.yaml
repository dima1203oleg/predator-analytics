
# ════════════════════════════════════════════════════════════════════════
# OLLAMA STATEFULSET (Local LLM Inference)
# ════════════════════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "predator-analytics.fullname" . }}-ollama
  labels:
    {{- include "predator-analytics.labels" . | nindent 4 }}
    app: ollama
    component: ai-layer
spec:
  serviceName: {{ include "predator-analytics.fullname" . }}-ollama
  replicas: 1
  selector:
    matchLabels:
      {{- include "predator-analytics.selectorLabels" . | nindent 6 }}
      app: ollama
  template:
    metadata:
      labels:
        {{- include "predator-analytics.selectorLabels" . | nindent 8 }}
        app: ollama
        component: ai-layer
    spec:
      priorityClassName: predator-high
      containers:
        - name: ollama
          image: "ollama/ollama:latest"
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 11434
              name: http
          env:
            - name: OLLAMA_HOST
              value: "0.0.0.0"
          # Pre-load models script
          lifecycle:
            postStart:
              exec:
                command: ["/bin/bash", "-c", "sleep 10 && ollama pull llama3.1:8b && ollama pull codellama:7b"]
          volumeMounts:
            - name: models
              mountPath: /root/.ollama
          resources:
            requests:
              memory: "4Gi"
              cpu: "2"
            limits:
              memory: "8Gi"
              cpu: "4"
          livenessProbe:
            httpGet:
              path: /api/tags
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /api/tags
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata:
      name: models
      spec:
        accessModes: [ "ReadWriteOnce" ]
        resources:
          requests:
            storage: 50Gi
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "predator-analytics.fullname" . }}-ollama
  labels:
    {{- include "predator-analytics.labels" . | nindent 4 }}
    app: ollama
spec:
  type: ClusterIP
  ports:
    - port: 11434
      targetPort: 11434
      protocol: TCP
      name: http
  selector:
    {{- include "predator-analytics.selectorLabels" . | nindent 4 }}
    app: ollama
