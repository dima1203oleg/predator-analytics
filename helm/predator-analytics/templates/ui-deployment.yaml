
# ════════════════════════════════════════════════════════════════════════
# UI DEPLOYMENT (React + Nginx)
# ════════════════════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "predator-analytics.fullname" . }}-ui
  labels:
    {{- include "predator-analytics.labels" . | nindent 4 }}
    app: ui
    component: presentation-layer
spec:
  replicas: 2
  selector:
    matchLabels:
      {{- include "predator-analytics.selectorLabels" . | nindent 6 }}
      app: ui
  template:
    metadata:
      labels:
        {{- include "predator-analytics.selectorLabels" . | nindent 8 }}
        app: ui
        component: presentation-layer
    spec:
      priorityClassName: predator-medium
      containers:
        - name: ui
          image: "ghcr.io/predator-analytics/ui:latest"
          ports:
            - containerPort: 3000
              name: http
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "predator-analytics.fullname" . }}-ui
  labels:
    {{- include "predator-analytics.labels" . | nindent 4 }}
    app: ui
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 3000
      protocol: TCP
      name: http
  selector:
    {{- include "predator-analytics.selectorLabels" . | nindent 4 }}
    app: ui
