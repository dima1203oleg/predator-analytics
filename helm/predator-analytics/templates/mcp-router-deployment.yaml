
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "predator-analytics.fullname" . }}-mcp-router
  labels:
    {{- include "predator-analytics.labels" . | nindent 4 }}
    app: mcp-router
    component: intelligence-layer
spec:
  replicas: 2
  selector:
    matchLabels:
      {{- include "predator-analytics.selectorLabels" . | nindent 6 }}
      app: mcp-router
  template:
    metadata:
      labels:
        {{- include "predator-analytics.selectorLabels" . | nindent 8 }}
        app: mcp-router
        component: intelligence-layer
    spec:
      priorityClassName: predator-high
      containers:
        - name: mcp-router
          image: "ghcr.io/predator-analytics/mcp-router:latest"
          command: ["uvicorn", "services.mcp-router.router:app", "--host", "0.0.0.0", "--port", "8080"]
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: OLLAMA_HOST
              value: "http://{{ include "predator-analytics.fullname" . }}-ollama:11434"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "predator-analytics.fullname" . }}-mcp-router
  labels:
    {{- include "predator-analytics.labels" . | nindent 4 }}
    app: mcp-router
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: http
  selector:
    {{- include "predator-analytics.selectorLabels" . | nindent 4 }}
    app: mcp-router
