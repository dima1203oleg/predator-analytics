
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "predator-analytics.fullname" . }}-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
    - hosts:
        - predator.analytics.internal
      secretName: predator-tls
  rules:
    - host: predator.analytics.internal
      http:
        paths:
          - path: /v1/query
            pathType: Prefix
            backend:
              service:
                name: {{ include "predator-analytics.fullname" . }}-mcp-router
                port:
                  number: 8080
          - path: /events
            pathType: Prefix
            backend:
              service:
                name: {{ include "predator-analytics.fullname" . }}-rtb-engine
                port:
                  number: 8081
