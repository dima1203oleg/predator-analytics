
# ════════════════════════════════════════════════════════════════════════
# INGRESS (Public Access)
# ════════════════════════════════════════════════════════════════════════
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "predator-analytics.fullname" . }}-ingress
  labels:
    {{- include "predator-analytics.labels" . | nindent 4 }}
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
spec:
  rules:
    - host: {{ .Values.global.domain }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "predator-analytics.fullname" . }}-api
                port:
                  number: 8000
    - host: mlflow.{{ .Values.global.domain }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "predator-analytics.fullname" . }}-mlflow
                port:
                  number: 5000
