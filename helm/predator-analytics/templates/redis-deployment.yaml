
# ════════════════════════════════════════════════════════════════════════
# REDIS DEPLOYMENT (Cache & Queue)
# ════════════════════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "predator-analytics.fullname" . }}-redis
  labels:
    {{- include "predator-analytics.labels" . | nindent 4 }}
    app: redis
    component: data-layer
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "predator-analytics.selectorLabels" . | nindent 6 }}
      app: redis
  template:
    metadata:
      labels:
        {{- include "predator-analytics.selectorLabels" . | nindent 8 }}
        app: redis
        component: data-layer
    spec:
      priorityClassName: predator-high
      containers:
        - name: redis
          image: "redis:7"
          ports:
            - containerPort: 6379
              name: redis
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "predator-analytics.fullname" . }}-redis
  labels:
    {{- include "predator-analytics.labels" . | nindent 4 }}
    app: redis
spec:
  type: ClusterIP
  ports:
    - port: 6379
      targetPort: 6379
      protocol: TCP
      name: redis
  selector:
    {{- include "predator-analytics.selectorLabels" . | nindent 4 }}
    app: redis
