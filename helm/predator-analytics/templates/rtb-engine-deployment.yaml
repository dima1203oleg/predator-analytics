
# ════════════════════════════════════════════════════════════════════════
# RTB ENGINE DEPLOYMENT (Decision Heart)
# ════════════════════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "predator-analytics.fullname" . }}-rtb-engine
  labels:
    {{- include "predator-analytics.labels" . | nindent 4 }}
    app: rtb-engine
    component: intelligence-layer
spec:
  replicas: 2
  selector:
    matchLabels:
      {{- include "predator-analytics.selectorLabels" . | nindent 6 }}
      app: rtb-engine
  template:
    metadata:
      labels:
        {{- include "predator-analytics.selectorLabels" . | nindent 8 }}
        app: rtb-engine
        component: intelligence-layer
    spec:
      priorityClassName: predator-critical
      containers:
        - name: rtb-engine
          image: "ghcr.io/predator-analytics/rtb-engine:latest"
          command: ["uvicorn", "services.rtb-engine.engine:app", "--host", "0.0.0.0", "--port", "8081"]
          ports:
            - containerPort: 8081
              name: http
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "predator-analytics.fullname" . }}-rtb-engine
  labels:
    {{- include "predator-analytics.labels" . | nindent 4 }}
    app: rtb-engine
spec:
  type: ClusterIP
  ports:
    - port: 8081
      targetPort: 8081
      protocol: TCP
      name: http
  selector:
    {{- include "predator-analytics.selectorLabels" . | nindent 4 }}
    app: rtb-engine
