apiVersion: v1
kind: Secret
metadata:
  name: predator-secrets
  labels:
    {{- include "predator-analytics.labels" . | nindent 4 }}
type: Opaque
data:
  # Database URL (base64 encoded)
  database-url: {{ include "predator-analytics.databaseURL" . | b64enc }}
  
  # JWT Secret (base64 encoded)
  jwt-secret: {{ .Values.jwt.secretKey | default "your-jwt-secret-key" | b64enc }}
  
  # PostgreSQL password (base64 encoded)
  postgres-password: {{ .Values.postgresql.auth.postgresPassword | b64enc }}
  
  # OpenSearch password (base64 encoded)
  opensearch-password: {{ .Values.opensearch.security.auth.adminPassword | b64enc }}
  
  # Grafana password (base64 encoded)
  grafana-password: {{ .Values.monitoring.grafana.adminPassword | b64enc }}
  
  # SSL certificates (base64 encoded)
  ssl-cert: {{ .Values.nginxSSL.cert | default "" | b64enc }}
  ssl-key: {{ .Values.nginxSSL.key | default "" | b64enc }}
  
  # External API keys (base64 encoded)
  openai-api-key: {{ .Values.externalAPIs.openai | default "" | b64enc }}
  anthropic-api-key: {{ .Values.externalAPIs.anthropic | default "" | b64enc }}
  gemini-api-key: {{ .Values.externalAPIs.gemini | default "" | b64enc }}
  groq-api-key: {{ .Values.externalAPIs.groq | default "" | b64enc }}
