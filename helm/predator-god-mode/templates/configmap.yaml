apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "predator.fullname" . }}-config
  labels:
    app.kubernetes.io/name: {{ include "predator.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
data:
  # ── Налаштування середовища ──
  ENVIRONMENT: {{ .Values.global.environment | quote }}
  TZ: {{ .Values.global.timezone | quote }}
  LANG: {{ .Values.global.locale | quote }}
  LC_ALL: {{ .Values.global.locale | quote }}

  # ── Backend Configuration ──
  LOG_LEVEL: "INFO"
  API_V1_STR: "/api/v45"

  # ── Зв'язки між сервісами (Service Discovery) ──
  LITELLM_API_BASE: "http://{{ include "predator.fullname" . }}-litellm:4000"
  OLLAMA_API_BASE: "http://ollama-service:11434" # Зовнішній сервіс або GPU Node
