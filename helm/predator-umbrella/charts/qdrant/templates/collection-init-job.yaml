{{- if .Values.init.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "qdrant.fullname" . }}-collection-init
  labels:
    app.kubernetes.io/name: {{ include "qdrant.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-delete-policy": hook-succeeded
spec:
  backoffLimit: 2
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: qdrant-collection-init
          image: curlimages/curl:8.2.1
          command: ["sh", "-c"]
          args:
            - |
              set -e
              QDRANT_HOST="http://{{ include "qdrant.fullname" . }}:{{ .Values.service.port }}"
              # wait for qdrant to be available
              i=0
              until curl -sS "$QDRANT_HOST/collections" >/dev/null 2>&1 || [ $i -gt 30 ]; do
                echo "Waiting for Qdrant ($QDRANT_HOST)..."
                i=$((i+1)); sleep 5
              done
              if [ $i -gt 30 ]; then
                echo "Qdrant did not become available in time"
                exit 1
              fi
              COLL_NAME="{{ default "multimodal_index" .Values.init.collectionName }}"
              QDRANT_AUTH_HEADER=""
{{- if and .Values.auth.enabled (ne .Values.auth.secretName "") }}
              # Use secret based API key if secretName set
                QDRANT_AUTH_HEADER="-H 'api-key: '${QDRANT_API_KEY}"
{{- else if .Values.auth.enabled }}
              # Use API key value from chart values (not recommended for prod)
                QDRANT_AUTH_HEADER="-H 'api-key: {{ .Values.auth.apiKey }}'"
{{- end }}
              # Check if collection exists
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" $QDRANT_HOST/collections/$COLL_NAME $QDRANT_AUTH_HEADER) || STATUS=000
              if [ "$STATUS" = "200" ]; then
                echo "Collection $COLL_NAME exists; skipping create"
              else
                echo "Creating or updating Qdrant collection $COLL_NAME"
                curl -sS -X POST "$QDRANT_HOST/collections/$COLL_NAME" -H 'Content-Type: application/json' $QDRANT_AUTH_HEADER -d '{"vectors": {"text_dense": {"size": 768, "distance": "Cosine"}, "image_clip": {"size": 512, "distance": "Cosine"}}, "hnsw_config": {"m": 0, "payload_m": 16}, "on_disk": true }'
              fi
              echo "Creating payload index for tenant_id (idempotent)"
                echo "Checking payload indexes for tenant_id"
                INDEXES_JSON=$(curl -sS $QDRANT_HOST/collections/$COLL_NAME/payload/indexes $QDRANT_AUTH_HEADER || echo "")
                if echo "$INDEXES_JSON" | grep -q '"field_name".*"tenant_id"'; then
                  echo "Payload index 'tenant_id' already exists, skipping"
                else
                  echo "Creating payload index 'tenant_id' for $COLL_NAME"
                  curl -sS -X POST "$QDRANT_HOST/collections/$COLL_NAME/payload/indexes" -H 'Content-Type: application/json' $QDRANT_AUTH_HEADER -d '{"field_name": "tenant_id", "field_schema": {"type": "keyword", "is_tenant": true}}'
                fi
      terminationGracePeriodSeconds: 30
      {{- if and .Values.auth.enabled (ne .Values.auth.secretName "") }}
      env:
        - name: QDRANT_API_KEY
          valueFrom:
            secretKeyRef:
              name: {{ .Values.auth.secretName }}
              key: apiKey
      {{- end }}
{{- end }}
