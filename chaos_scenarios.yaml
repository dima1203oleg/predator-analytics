title: Predator Chaos Scenarios
version: 1.0
description: "Автоматизовані сценарії тестування стійкості (Chaos Engineering) для Predator v29"

scenarios:
  - name: "database_latency"
    type: "network"
    target: "postgres"
    duration: "30s"
    params:
      latency: "500ms"
      jitter: "100ms"
    expected_outcome: "recovered"
    description: "Симуляція високої затримки бази даних"

  - name: "redis_unavailability"
    type: "infrastructure"
    target: "redis"
    duration: "10s"
    params:
      action: "blackhole"
    expected_outcome: "degraded_performance"
    description: "Імітація недоступності Redis кешу"

  - name: "high_cpu_load"
    type: "resource"
    target: "api-gateway"
    duration: "45s"
    params:
      load: "90%"
    expected_outcome: "autoscaling_trigger"
    description: "Стрес-тест CPU для API Gateway"

  - name: "qdrant_timeout"
    type: "network"
    target: "qdrant"
    duration: "20s"
    params:
      packet_loss: "10%"
    expected_outcome: "fallback_to_keyword_search"
    description: "Імітація проблем мережі до Vector DB"

  - name: "som_axiom_violation"
    type: "application"
    target: "orchestrator"
    duration: "5s"
    params:
      injection: "unauthorized_access_attempt"
    expected_outcome: "quarantine"
    description: "Перевірка реакції SOM на порушення аксіом"

execution:
  schedule: "0 */2 * * *" # Кожні 2 години
  probability: 0.1 # 10% шанс запуску
  notification_channel: "telegram"
