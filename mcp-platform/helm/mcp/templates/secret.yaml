apiVersion: v1
kind: Secret
metadata:
  name: {{ include "mcp-platform.fullname" . }}
  labels:
    {{- include "mcp-platform.labels" . | nindent 4 }}
type: Opaque
data:
  # base64-encoded
  # echo -n 'your-qdrant-api-key' | base64
  qdrant-api-key: {{ .Values.env.QDRANT_API_KEY | b64enc | quote }}
  neo4j-password: {{ .Values.env.NEO4J_PASSWORD | b64enc | quote }}
