replicaCount: 1

image:
  repository: mcp-platform
  pullPolicy: IfNotPresent
  tag: "latest"

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext:
  fsGroup: 1001

securityContext:
  allowPrivilegeEscalation: false
  runAsNonRoot: true
  runAsUser: 1001
  capabilities:
    drop:
      - ALL

resources:
  requests:
    cpu: 10m
    memory: 32Mi
  limits:
    cpu: 100m
    memory: 128Mi

autoscaling:
  enabled: false

nodeSelector: {}

tolerations: []

affinity: {}

env:
  NATS_URL: "nats://nats:4222"
  NEO4J_URI: "bolt://neo4j:7687"
  NEO4J_USER: "neo4j"
  NEO4J_PASSWORD: "test"
  QDRANT_URL: "http://qdrant:6333"
  QDRANT_API_KEY: ""
  OPENHANDS_API_BASE: "http://litellm:4000/v1"
  OPENHANDS_API_KEY: ""
  OPENHANDS_MODEL: "codellama/CodeLlama-7b-Instruct-hf"

externalServices:
  nats:
    enabled: true
    host: "nats"
    port: 4222
  neo4j:
    enabled: true
    host: "neo4j"
    port: 7687
  qdrant:
    enabled: true
    host: "qdrant"
    port: 6333

service:
  type: ClusterIP
  port: 8000

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: mcp.local
      paths:
        - path: /
          pathType: Prefix
  tls: []
