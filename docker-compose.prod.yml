# Predator Analytics v27.0 - Production Docker Compose (Updated)
# Infrastructure + Governance + AI Orchestration
# Optimized for NVIDIA Server Deployment

version: "3.8"

networks:
  predator-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

services:
  # Reverse Proxy
  nginx:
    image: nginx:1.25-alpine
    container_name: predator-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./docker/ssl:/etc/nginx/ssl:ro
      - ./apps/predator-analytics-ui/dist:/usr/share/nginx/html:ro
    networks:
      predator-network:
        ipv4_address: 172.20.0.2
    depends_on:
      - backend
      - frontend

  # Frontend
  frontend:
    build:
      context: ./apps/predator-analytics-ui
      dockerfile: Dockerfile.prod
    container_name: predator-frontend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - API_BASE_URL=https://predator.analytics.local/api/v1
    networks:
      predator-network:
        ipv4_address: 172.20.0.3

  # Backend API
  backend:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile.prod
    container_name: predator-backend
    restart: unless-stopped
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://predator:${POSTGRES_PASSWORD}@postgres:5432/predator_db
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_URL=http://qdrant:6333
      - OPENSEARCH_URL=http://opensearch:9200
      - OLLAMA_BASE_URL=http://ollama:11434
    networks:
      predator-network:
        ipv4_address: 172.20.0.4
    depends_on:
      - postgres
      - redis
      - governance
      - ollama

  # Governance (SOM) - NEW v27
  governance:
    build:
      context: .
      dockerfile: services/constitutional-core/Dockerfile
    container_name: predator-governance
    restart: unless-stopped
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://predator:${POSTGRES_PASSWORD}@postgres:5432/predator_db
      - REDIS_URL=redis://redis:6379/0
    networks:
      predator-network:
        ipv4_address: 172.20.0.14
    depends_on:
      - postgres
      - redis

  # Orchestrator (AZR) - NEW v27
  orchestrator:
    build:
      context: .
      dockerfile: services/orchestrator/Dockerfile
    container_name: predator-orchestrator
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    networks:
      predator-network:
        ipv4_address: 172.20.0.15
    depends_on:
      - backend
      - ollama

  # Ollama (AI Engines) - NVIDIA GPU Optimized
  ollama:
    image: ollama/ollama:latest
    container_name: predator-ollama
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - ollama_data:/root/.ollama
    networks:
      predator-network:
        ipv4_address: 172.20.0.16

  # Database
  postgres:
    image: postgres:15-alpine
    container_name: predator-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=predator_db
      - POSTGRES_USER=predator
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      predator-network:
        ipv4_address: 172.20.0.5

  # Redis
  redis:
    image: redis:7-alpine
    container_name: predator-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      predator-network:
        ipv4_address: 172.20.0.6

  # Qdrant
  qdrant:
    image: qdrant/qdrant:v1.7.4
    container_name: predator-qdrant
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      predator-network:
        ipv4_address: 172.20.0.8

  # OpenSearch
  opensearch:
    image: opensearchproject/opensearch:2.12.0
    container_name: predator-opensearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - "OPENSEARCH_JAVA_OPTS=-Xms1g -Xmx1g"
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=${OPENSEARCH_PASSWORD}
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    networks:
      predator-network:
        ipv4_address: 172.20.0.7

  # Celery Worker
  celery-worker:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile.prod
    container_name: predator-celery-worker
    command: celery -A app.core.celery_app worker --loglevel=info
    env_file: .env
    environment:
       - DATABASE_URL=postgresql+asyncpg://predator:${POSTGRES_PASSWORD}@postgres:5432/predator_db
       - REDIS_URL=redis://redis:6379/0
       - OLLAMA_BASE_URL=http://ollama:11434
    networks:
      predator-network:
        ipv4_address: 172.20.0.10
    depends_on:
      - backend
      - redis

  # Celery Beat
  celery-beat:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile.prod
    container_name: predator-celery-beat
    command: celery -A app.core.celery_app beat --loglevel=info
    env_file: .env
    environment:
       - DATABASE_URL=postgresql+asyncpg://predator:${POSTGRES_PASSWORD}@postgres:5432/predator_db
       - REDIS_URL=redis://redis:6379/0
    networks:
      predator-network:
        ipv4_address: 172.20.0.11
    depends_on:
      - backend
      - redis

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  opensearch_data:
  ollama_data:
