name: Secrets Checker

on:
  workflow_dispatch:

jobs:
  check-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Check required secrets and variables
        run: |
          set -e
          missing=()
          # List of required secrets for Predator v45 | Neural Analytics.0
          for s in GITHUB_TOKEN GHCR_PAT OPENAI_API_KEY ANTHROPIC_API_KEY GROQ_API_KEY; do
            if ! gh secret list | grep -q "^$s"; then
              missing+=("secret:$s")
            fi
          done
          # Optional/Advanced secrets (just log them, don't fail)
          for v in HUGGINGFACE_API_KEY MISTRAL_API_KEY COHERE_API_KEY TELEGRAM_BOT_TOKEN; do
            if ! gh secret list | grep -q "^$v"; then
              echo "Warning: Optional secret $v is not set."
            fi
          done
          if [ ${#missing[@]} -eq 0 ]; then
            echo "All required secrets and variables are present."
          else
            echo "Missing: ${missing[*]}" && exit 1
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}