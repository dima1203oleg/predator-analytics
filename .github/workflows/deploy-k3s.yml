name: 🚀 Deploy to K3s (NVIDIA Server)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  K3S_SERVER: 192.168.0.48
  SSH_USER: dima
  SSH_PORT: 6666
  SSH_KEY: ~/.ssh/id_rsa_nvidia

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker images
        run: |
          docker compose -f docker-compose.prod.yml build
          docker tag predator-backend ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend:latest
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ArgoCD CLI
        run: |
          curl -sSL -o argocd-linux-amd64 https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          sudo install -m 555 argocd-linux-amd64 /usr/local/bin/argocd
          rm argocd-linux-amd64

      - name: Deploy to K3s via ArgoCD
        run: |
          eval $(ssh-agent -s)
          ssh-add - <<< "${{ secrets.SSH_PRIVATE_KEY }}"
          ssh -o StrictHostKeyChecking=no -p ${{ env.SSH_PORT }} ${{ env.SSH_USER }}@${{ env.K3S_SERVER }} \
            "argocd login ${{ env.K3S_SERVER }}:6666 --username admin --password ${{ secrets.ARGOCD_PASSWORD }} --insecure && \
             argocd app sync predator-analytics"