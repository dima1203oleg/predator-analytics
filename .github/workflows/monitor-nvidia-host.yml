name: Monitor NVIDIA Host Connectivity

on:
  schedule:
    - cron: '0 */2 * * *' # Кожні 2 години
  workflow_dispatch:

jobs:
  check-connectivity:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check SSH Reachability
        id: check-ssh
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
        run: |
          if [ -z "$SSH_HOST" ]; then
            echo "::warning title=Missing Secret::SSH_HOST secret not set. Skipping connectivity check."
            exit 0
          fi
          
          SCRIPT_PATH="scripts/archive/check_remote_ssh.sh"
          if [ ! -f "$SCRIPT_PATH" ]; then
            echo "::error title=Script Missing::Workflow script not found at $SCRIPT_PATH"
            exit 1
          fi
          
          chmod +x "$SCRIPT_PATH"
          ./"$SCRIPT_PATH" "$SSH_HOST" 22 5 > ssh_check.log 2>&1 || true
          cat ssh_check.log
          
          if grep -q "SUCCESS" ssh_check.log; then
            echo "status=success" >> "$GITHUB_OUTPUT"
          else
            echo "status=failure" >> "$GITHUB_OUTPUT"
            exit 1
          fi


      - name: Upload Diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: nvidia-host-diagnostics
          path: ssh_check.log
