name: Predator v45 | Neural Analytics CI/CD

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  # Correct format for GitHub Container Registry: owner/repo
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # 1. Quality Assurance
  quality-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # POLICY: Enforce Python 3.12
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Linting Tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Lint with Ruff (Python 3.12)
        run: |
          # Fails on syntax errors or critical issues
          ruff check . --select=E9,F63,F7,F82 --target-version=py312
          # Statistics info
          ruff check . --exit-zero --target-version=py312 --statistics

      # Security Scan (Filesystem)
      - name: Run Trivy vulnerability scanner (FS)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'
          exit-code: '0' # Report only for now

  # 2. Build & Push Containers
  build-push-containers:
    needs: quality-check
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        service: [backend, telegram-bot]
        include:
          - service: backend
            dockerfile: apps/backend/Dockerfile
            context: .
          - service: telegram-bot
            dockerfile: apps/telegram-bot/Dockerfile
            context: .

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.service }}
          tags: |
            type=sha,format=long
            type=ref,event=branch
            latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # 3. GitOps Update (ArgoCD)
  # This step would update the k8s manifests with the new image tag
  update-gitops:
    needs: build-push-containers
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Simulate GitOps Update
        run: |
          echo "Simulating Kustomize image update..."
          # In a real setup, we would run:
          # kustomize edit set image ghcr.io/${{ github.repository }}/backend=...sha...
          # git commit -am "Update image tag"
          # git push
