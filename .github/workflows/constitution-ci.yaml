name: Constitution CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'services/**'
      - 'libs/**'
      - 'deploy/helm/**'
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

env:
  PREDATOR_VERSION: v55.1

jobs:
  constitution-check:
    name: "🏛️ Конституційна перевірка"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Перевірити HARD RULES (HR-07 — no SELECT *)
        run: |
          echo "Перевірка HR-07: Заборона SELECT * в SQL..."
          if grep -rn 'SELECT \*' services/ libs/ --include='*.py' | grep -v '# noqa' | grep -v '__pycache__'; then
            echo "❌ HR-07 ПОРУШЕНО: знайдено SELECT * без # noqa"
            exit 1
          fi
          echo "✅ HR-07: OK"

      - name: Перевірити HR-06 (секрети не в коді)
        run: |
          echo "Перевірка HR-06: Секрети не захардкожені..."
          if grep -rn 'password\s*=\s*"[^"]\+"' services/ libs/ --include='*.py' | grep -v 'test' | grep -v '#'; then
            echo "⚠️ HR-06: Можливі захардкожені паролі"
          fi
          echo "✅ HR-06: OK"

      - name: Перевірити HR-04 (англійська в UI)
        run: |
          echo "Перевірка HR-04: Англійська в UI..."
          # Перевіряємо на типові англійські фрази у UI-текстах (не в коді)
          echo "✅ HR-04: Потребує ручної перевірки"

  security-scan:
    name: "🔍 Сканування безпеки"
    runs-on: ubuntu-latest
    needs: constitution-check

    steps:
      - uses: actions/checkout@v4

      - name: Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
