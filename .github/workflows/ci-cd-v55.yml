name: PREDATOR v55.2 CI/CD Pipeline

on:
  push:
    branches: [main]
    paths:
      - "services/core-api/**"
      - "services/mcp-router/**"
      - "services/graph-service/**"
      - "services/cerebro/**"
      - "services/rtb-engine/**"
      - "services/ingestion-worker/**"
      - "apps/predator-analytics-ui/**"
      - "infra/helm/**"
      - ".github/workflows/ci-cd-v55.yml"
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}

jobs:
  # ── 1. Build & Push Docker Images ──────────────────────────
  build-images:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: core-api
            context: .
            dockerfile: services/core-api/Dockerfile
            image: predator-core-api
            paths: services/core-api/**
          - service: mcp-router
            context: .
            dockerfile: services/mcp-router/Dockerfile
            image: predator-mcp-router
            paths: services/mcp-router/**
          - service: graph-service
            context: .
            dockerfile: services/graph-service/Dockerfile
            image: predator-graph-service
            paths: services/graph-service/**
          - service: cerebro
            context: .
            dockerfile: services/cerebro/Dockerfile
            image: predator-cerebro
            paths: services/cerebro/**
          - service: rtb-engine
            context: .
            dockerfile: services/rtb-engine/Dockerfile
            image: predator-rtb-engine
            paths: services/rtb-engine/**
          - service: ingestion-worker
            context: .
            dockerfile: services/ingestion-worker/Dockerfile
            image: predator-ingestion-worker
            paths: services/ingestion-worker/**
          - service: frontend
            context: ./apps/predator-analytics-ui
            dockerfile: Dockerfile
            image: predator-frontend
            paths: apps/predator-analytics-ui/**

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.context }}/${{ matrix.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ matrix.image }}:latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ matrix.image }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 2. Helm Lint ───────────────────────────────────────────
  helm-lint:
    name: Helm Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: 'v3.14.0'
      - name: Lint Umbrella Chart
        run: |
          cd infra/helm/umbrella
          helm dependency build
          helm lint .

  # ── 3. GitOps — Update Helm values.yaml with new SHA tags ──
  update-gitops:
    name: GitOps Update
    needs: [build-images, helm-lint]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Update Image Tags
        run: |
          SHA="${{ github.sha }}"
          VALUES="infra/helm/umbrella/values.yaml"
          yq -i ".core-api.image.tag = \"$SHA\"" "$VALUES"
          yq -i ".frontend.image.tag = \"$SHA\"" "$VALUES"
          yq -i ".mcp-router.image.tag = \"$SHA\"" "$VALUES"
          yq -i ".graph-service.image.tag = \"$SHA\"" "$VALUES"
          yq -i ".cerebro.image.tag = \"$SHA\"" "$VALUES"
          yq -i ".rtb-engine.image.tag = \"$SHA\"" "$VALUES"
          yq -i ".ingestion-worker.image.tag = \"$SHA\"" "$VALUES"

      - name: Commit & Push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add infra/helm/umbrella/values.yaml
          git diff --staged --quiet || git commit -m "chore(gitops): update images to ${{ github.sha }}"
          git push
