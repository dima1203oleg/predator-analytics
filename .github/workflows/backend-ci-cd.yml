# ═══════════════════════════════════════════════════════════════
# 🦅 PREDATOR Analytics v55.0 — Backend CI/CD Pipeline
# Lint → Test → Build → Push → GitOps → ArgoCD Sync
# ═══════════════════════════════════════════════════════════════

name: Backend CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - "app/**"
      - "services/**"
      - "libs/**"
      - "deploy/helm/predator/**"
      - ".github/workflows/backend-ci-cd.yml"
  pull_request:
    branches: [main]
    paths:
      - "app/**"
      - "services/**"
      - "libs/**"
  workflow_dispatch: {}

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}

jobs:
  # ── 1. Code Quality & Testing ──────────────────────────────
  lint-test:
    name: "🔍 Lint & Test"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy pytest pytest-asyncio pytest-cov

      - name: Ruff Linter
        run: ruff check app/ services/ libs/ --config ruff.toml --exit-non-zero-on-fix

      - name: Mypy Type Checking
        run: mypy app/ services/ libs/ --ignore-missing-imports --strict-optional

      - name: Pytest with Coverage
        run: |
          pytest app/ services/ libs/ --cov=app --cov=services --cov-report=xml --cov-report=html

      - name: Upload Coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}

  # ── 2. Security Scan ───────────────────────────────────────
  security:
    name: "🔒 Security Scan"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

  # ── 3. Build & Push Docker Images ──────────────────────────
  build-push:
    name: "🐳 Build ${{ matrix.service }}"
    needs: [lint-test, security]
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: core-api
            context: ./app
            dockerfile: app/Dockerfile
            image: predator-core-api
          - service: graph-service
            context: ./services/graph-service
            dockerfile: services/graph-service/Dockerfile
            image: predator-graph-service
          - service: ingestion-worker
            context: ./services/ingestion-worker
            dockerfile: services/ingestion-worker/Dockerfile
            image: predator-ingestion-worker

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=v55.0.0,enable={{is_default_branch}}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  # ── 4. GitOps Update Helm Values ──────────────────────────
  gitops-update:
    name: "🔄 GitOps Update"
    needs: build-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Update Image Tags
        run: |
          SHA="${{ github.sha }}"
          VALUES="deploy/helm/predator/values.yaml"
          yq -i ".coreApi.image.tag = \"$SHA\"" "$VALUES"
          yq -i ".graphService.image.tag = \"$SHA\"" "$VALUES"
          yq -i ".ingestionWorker.image.tag = \"$SHA\"" "$VALUES"

      - name: Commit & Push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add deploy/helm/predator/values.yaml
          git diff --staged --quiet || git commit -m "chore(gitops): оновити бекенд образи до ${{ github.sha }} [skip ci]"
          git push

  # ── 5. ArgoCD Sync ─────────────────────────────────────────
  argocd-sync:
    name: "🚀 ArgoCD Sync"
    needs: gitops-update
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Trigger ArgoCD Refresh
        env:
          ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}
          ARGOCD_TOKEN: ${{ secrets.ARGOCD_TOKEN }}
        run: |
          if [ -n "$ARGOCD_SERVER" ] && [ -n "$ARGOCD_TOKEN" ]; then
            echo "🚀 Triggering ArgoCD sync for predator-backend..."
            curl -sSL -X POST \
              -k \
              -H "Authorization: Bearer $ARGOCD_TOKEN" \
              "https://$ARGOCD_SERVER/api/v1/applications/predator-backend/sync" \
              -H "Content-Type: application/json" \
              -d '{"prune": true}' || echo "⚠️ ArgoCD sync request failed"
          else
            echo "ℹ️ ArgoCD secrets not configured. Sync will happen via polling."
          fi
