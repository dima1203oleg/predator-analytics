# PREDATOR v56.0 — Terraform CI/CD Pipeline
name: "🏗️ Terraform Infrastructure"

on:
  pull_request:
    paths: ['infra/terraform/**']
  push:
    branches: [main]
    paths: ['infra/terraform/**']

env:
  TF_VERSION: "1.7.0"
  WORKING_DIR: "infra/terraform/environments"

permissions:
  contents: read
  pull-requests: write

jobs:
  # Формат та валідація
  validate:
    name: "🔍 Validate"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        env: [dev, prod]
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}/${{ matrix.env }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: terraform fmt
        run: terraform fmt -check -recursive
      - name: terraform init
        run: terraform init -backend=false
      - name: terraform validate
        run: terraform validate

  # Plan (тільки на PR)
  plan:
    name: "📋 Plan (${{ matrix.env }})"
    needs: validate
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        env: [dev, prod]
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}/${{ matrix.env }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: terraform init
        run: terraform init
      - name: terraform plan
        run: terraform plan -no-color -out=tfplan 2>&1 | tee plan.txt
      - name: Коментар до PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('${{ env.WORKING_DIR }}/${{ matrix.env }}/plan.txt', 'utf8');
            const body = `### Terraform Plan — \`${{ matrix.env }}\`\n\`\`\`\n${plan.slice(0, 65000)}\n\`\`\``;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
