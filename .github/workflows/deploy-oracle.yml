---
name: Deploy Oracle
permissions:
  contents: write
  packages: write

on:
  workflow_dispatch:

concurrency:
  group: deploy-oracle
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "apps/predator-analytics-ui/package-lock.json"

      - name: Install frontend dependencies
        run: |
          cd apps/predator-analytics-ui
          npm ci

      - name: Build frontend
        run: |
          cd apps/predator-analytics-ui
          npm run build
        env:
          VITE_API_URL: "http://localhost:9080"

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./apps/predator-analytics-ui
          platforms: linux/amd64
          push: true
          tags: ghcr.io/${{ github.repository }}/frontend:v55.1.${{ github.run_number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push backend
        if: hashFiles('services/core-api/Dockerfile') != ''
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/core-api/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ghcr.io/${{ github.repository }}/core-api:v55.1.${{ github.run_number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Update Helm values for oracle
        run: |
          if [ -f environments/oracle/values.yaml ]; then
            yq -i ".frontend.image.tag = \"v55.1.${{ github.run_number }}\"" environments/oracle/values.yaml
            yq -i ".coreApi.image.tag = \"v55.1.${{ github.run_number }}\"" environments/oracle/values.yaml
          fi

      - name: Commit updated values
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          git add environments/oracle/values.yaml
          git diff --staged --quiet || git commit -m "chore(oracle): оновити образи до v55.1.${{ github.run_number }} [skip ci]"
          git push || echo "⚠️ Push failed — можливо немає прав запису"

  argocd-sync:
    needs: build-and-push
    runs-on: ubuntu-latest
    env:
      ARGOCD_ORACLE_URL: ${{ secrets.ARGOCD_ORACLE_URL }}
      ARGOCD_ORACLE_TOKEN: ${{ secrets.ARGOCD_ORACLE_TOKEN }}
    steps:
      - name: Sync ArgoCD
        if: ${{ env.ARGOCD_ORACLE_URL != '' && env.ARGOCD_ORACLE_TOKEN != '' }}
        run: |
          curl -X POST "${{ env.ARGOCD_ORACLE_URL }}/api/v1/applications/predator-oracle/sync" \
            -H "Authorization: Bearer ${{ env.ARGOCD_ORACLE_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{}' || echo "⚠️ ArgoCD sync request failed"

      - name: Wait for healthy
        if: ${{ env.ARGOCD_ORACLE_URL != '' && env.ARGOCD_ORACLE_TOKEN != '' }}
        run: |
          for i in {1..20}; do
            RESPONSE=$(curl -sS "${{ env.ARGOCD_ORACLE_URL }}/api/v1/applications/predator-oracle" \
              -H "Authorization: Bearer ${{ env.ARGOCD_ORACLE_TOKEN }}" || true)
            STATUS=$(echo "$RESPONSE" | jq -r '.status.health.status' 2>/dev/null || echo "<no-json>")
            if [ "$STATUS" = "Healthy" ]; then
              echo "✅ Application is healthy"
              exit 0
            fi
            echo "⏳ [$i/20] Status: $STATUS"
            sleep 15
          done
          echo "⚠️ Timeout — app may still be syncing"

      - name: Пропуск (секрети не налаштовані)
        if: ${{ env.ARGOCD_ORACLE_URL == '' || env.ARGOCD_ORACLE_TOKEN == '' }}
        run: |
          echo "ℹ️ ArgoCD секрети не налаштовані — sync пропущено"
