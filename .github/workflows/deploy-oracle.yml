---
name: Deploy Oracle
permissions:
  contents: write
  packages: write

on:
  workflow_dispatch:

concurrency:
  group: deploy-oracle
  cancel-in-progress: false

env:
  CI_WORKFLOW: 'ci-cd-unified.yml'

jobs:
  ci-cd-gate:
    name: Verify CI/CD Pipeline Success
    runs-on: ubuntu-latest
    outputs:
      ci_status: ${{ steps.wait.outputs.conclusion }}
    steps:
      - name: Wait for CI/CD workflow
        id: wait
        uses: lewagon/wait-on-check-action@v1.3.1
        with:
          ref: ${{ github.sha }}
          check-name: 'PREDATOR v61.0-ELITE Unified Pipeline'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 30
        timeout-minutes: 10

      - name: Fail if CI/CD didn't run or failed
        if: steps.wait.outputs.conclusion != 'success'
        run: |
          echo "❌ CI/CD pipeline (ci-cd-unified.yml) ${CONCLUSION:-has not run}."
          echo "Ensure 'services/**' or 'apps/**' changes trigger CI/CD first."
          exit 1

  test:
    runs-on: ubuntu-latest
    needs: ci-cd-gate
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "apps/predator-analytics-ui/package-lock.json"

      - name: Install frontend dependencies
        run: |
          cd apps/predator-analytics-ui
          npm ci

      - name: Build frontend
        run: |
          cd apps/predator-analytics-ui
          npm run build
        env:
          VITE_API_URL: "http://localhost:9080"

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./apps/predator-analytics-ui
          platforms: linux/amd64
          push: true
          tags: ghcr.io/${{ github.repository }}/frontend:v61.0.${{ github.run_number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push backend
        if: hashFiles('services/core-api/Dockerfile') != ''
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/core-api/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ghcr.io/${{ github.repository }}/core-api:v61.0.${{ github.run_number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Update Helm values for oracle
        run: |
          if [ -f environments/oracle/values.yaml ]; then
            yq -i ".frontend.image.tag = \"v61.0.${{ github.run_number }}\"" environments/oracle/values.yaml
            yq -i ".coreApi.image.tag = \"v61.0.${{ github.run_number }}\"" environments/oracle/values.yaml
          fi

      - name: Commit updated values
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          git add environments/oracle/values.yaml
          git diff --staged --quiet || git commit -m "chore(oracle): оновити образи до v61.0.${{ github.run_number }} [skip ci]"
          git push || echo "⚠️ Push failed — можливо немає прав запису"

  argocd-sync:
    needs: build-and-push
    runs-on: ubuntu-latest
    env:
      ARGOCD_ORACLE_URL: ${{ secrets.ARGOCD_ORACLE_URL }}
      ARGOCD_ORACLE_TOKEN: ${{ secrets.ARGOCD_ORACLE_TOKEN }}
    steps:
      - name: Sync ArgoCD
        if: ${{ env.ARGOCD_ORACLE_URL != '' && env.ARGOCD_ORACLE_TOKEN != '' }}
        run: |
          curl -X POST "${{ env.ARGOCD_ORACLE_URL }}/api/v1/applications/predator-oracle/sync" \
            -H "Authorization: Bearer ${{ env.ARGOCD_ORACLE_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{}' || echo "⚠️ ArgoCD sync request failed"

      - name: Wait for healthy
        id: health-check
        if: ${{ env.ARGOCD_ORACLE_URL != '' && env.ARGOCD_ORACLE_TOKEN != '' }}
        run: |
          # Capture current version for rollback
          CURRENT_VERSION=$(curl -sS "${{ env.ARGOCD_ORACLE_URL }}/api/v1/applications/predator-oracle" \
            -H "Authorization: Bearer ${{ env.ARGOCD_ORACLE_TOKEN }}" | \
            jq -r '.status.sync.revision // "unknown"')
          echo "CURRENT_VERSION=$CURRENT_VERSION"
          echo "CURRENT_VERSION=$CURRENT_VERSION" >> $GITHUB_OUTPUT

          for i in {1..20}; do
            RESPONSE=$(curl -sS "${{ env.ARGOCD_ORACLE_URL }}/api/v1/applications/predator-oracle" \
              -H "Authorization: Bearer ${{ env.ARGOCD_ORACLE_TOKEN }}" || true)
            STATUS=$(echo "$RESPONSE" | jq -r '.status.health.status' 2>/dev/null || echo "<no-json>")
            SYNC_STATUS=$(echo "$RESPONSE" | jq -r '.status.sync.status' 2>/dev/null || echo "<no-json>")

            if [ "$STATUS" = "Healthy" ] && [ "$SYNC_STATUS" = "Synced" ]; then
              echo "✅ Application is healthy and synced"
              exit 0
            fi

            # Check for sync failure
            if [ "$SYNC_STATUS" = "Failed" ] || [ "$SYNC_STATUS" = "Unknown" ]; then
              echo "❌ ERROR: ArgoCD sync failed"
              echo "$RESPONSE" | jq -r '.status.operationState.message // "No message"'
              exit 1
            fi

            echo "⏳ [$i/20] Health: $STATUS | Sync: $SYNC_STATUS"
            sleep 15
          done
          echo "❌ ERROR: Health check timeout"
          exit 1

      - name: Rollback on Failure
        if: failure() && steps.health-check.outputs.CURRENT_VERSION != 'unknown' && env.ARGOCD_ORACLE_URL != '' && env.ARGOCD_ORACLE_TOKEN != ''
        run: |
          echo "::notice title=Rollback Executed::Rolling back Oracle deployment"

          # Revert values to previous version (use v61.0-ELITE as safe fallback)
          PREV_VERSION="v61.0-ELITE"

          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

          if [ -f environments/oracle/values.yaml ]; then
            yq -i ".frontend.image.tag = \"$PREV_VERSION\"" environments/oracle/values.yaml
            yq -i ".coreApi.image.tag = \"$PREV_VERSION\"" environments/oracle/values.yaml

            git config --global user.name 'github-actions'
            git config --global user.email 'github-actions@github.com'
            git add environments/oracle/values.yaml
            git commit -m "fix(oracle): rollback to $PREV_VERSION [skip ci]"
            git push || echo "⚠️ Rollback commit push failed"

            # Trigger sync of rollback
            curl -X POST "${{ env.ARGOCD_ORACLE_URL }}/api/v1/applications/predator-oracle/sync" \
              -H "Authorization: Bearer ${{ env.ARGOCD_ORACLE_TOKEN }}" \
              -H "Content-Type: application/json" \
              -d '{"prune": true}' || echo "⚠️ Rollback sync failed"

            echo "✅ Rollback initiated. Monitoring..."
            sleep 30

            # Verify rollback health
            for i in {1..10}; do
              STATUS=$(curl -sS "${{ env.ARGOCD_ORACLE_URL }}/api/v1/applications/predator-oracle" \
                -H "Authorization: Bearer ${{ env.ARGOCD_ORACLE_TOKEN }}" | \
                jq -r '.status.health.status // "Unknown"')
              echo "[$i/10] Rollback health: $STATUS"
              if [ "$STATUS" = "Healthy" ]; then
                echo "✅ Rollback successful"
                exit 0
              fi
              sleep 15
            done
            echo "❌ CRITICAL: Rollback verification failed"
          fi

      - name: Пропуск (секрети не налаштовані)
        if: ${{ env.ARGOCD_ORACLE_URL == '' || env.ARGOCD_ORACLE_TOKEN == '' }}
        run: |
          echo "ℹ️ ArgoCD секрети не налаштовані — sync пропущено"
