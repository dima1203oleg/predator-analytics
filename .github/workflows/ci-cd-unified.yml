# ═══════════════════════════════════════════════════════════════
# 🦅 PREDATOR Analytics v56.0 — Unified CI/CD Pipeline
# Єдиний пайплайн: Lint → Build → GitOps → ArgoCD Sync
# ═══════════════════════════════════════════════════════════════

name: PREDATOR v56.0 Unified Pipeline

on:
  push:
    branches: [main, develop]
    paths:
      - "services/**"
      - "apps/**"
      - "libs/**"
      - "deploy/helm/predator/**"
      - "infra/helm/umbrella/**"
      - ".github/workflows/ci-cd-unified.yml"
  pull_request:
    branches: [main]
  workflow_dispatch: {}

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}

jobs:
  # ── 1. Code Quality & Testing ──────────────────────────────
  validate-code:
    name: "🔍 Lint & Test"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python dependencies
        run: |
          pip install ruff mypy pytest pytest-asyncio

      - name: Ruff Linter (Python)
        run: ruff check . --config pyproject.toml || ruff check . || true

      - name: Mypy Type Checking
        run: mypy services/ libs/ --ignore-missing-imports || true

      - name: Frontend Lint & Type Check
        working-directory: ./apps/predator-analytics-ui
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi
          npm run lint --if-present || true
          npm run type-check --if-present || true

  # ── 2. Helm Lint ───────────────────────────────────────────
  helm-lint:
    name: "⎈ Helm Lint"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: 'v3.14.0'

      - name: Lint Predator Base Chart
        run: |
          helm lint deploy/helm/predator/ || true

      - name: Lint Umbrella Chart
        run: |
          cd infra/helm/umbrella
          helm dependency build || true
          helm lint . || true

  # ── 3. Build & Push Docker Images ──────────────────────────
  build-images:
    name: "🐳 Build ${{ matrix.service }}"
    needs: validate-code
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: core-api
            context: .
            dockerfile: services/core-api/Dockerfile
            image: predator-core-api
          - service: graph-service
            context: .
            dockerfile: services/graph-service/Dockerfile
            image: predator-graph-service
          - service: ingestion-worker
            context: .
            dockerfile: services/ingestion-worker/Dockerfile
            image: predator-ingestion-worker
          - service: frontend
            context: ./apps/predator-analytics-ui
            dockerfile: apps/predator-analytics-ui/Dockerfile
            image: predator-frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ matrix.image }}:latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ matrix.image }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ matrix.image }}:v55.1.0
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 4. GitOps — Update Helm values.yaml ────────────────────
  update-gitops:
    name: "🔄 GitOps Update"
    needs: [build-images, helm-lint]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Update Image Tags in Umbrella Chart
        run: |
          SHA="${{ github.sha }}"
          VALUES="infra/helm/umbrella/values.yaml"
          yq -i ".core-api.image.tag = \"$SHA\"" "$VALUES"
          yq -i ".frontend.image.tag = \"$SHA\"" "$VALUES"
          yq -i ".graph-service.image.tag = \"$SHA\"" "$VALUES"
          yq -i ".ingestion-worker.image.tag = \"$SHA\"" "$VALUES"

      - name: Update Image Tags in Predator Chart
        run: |
          SHA="${{ github.sha }}"
          VALUES="deploy/helm/predator/values.yaml"
          yq -i ".coreApi.image.tag = \"$SHA\"" "$VALUES"
          yq -i ".frontend.image.tag = \"$SHA\"" "$VALUES"
          yq -i ".graphService.image.tag = \"$SHA\"" "$VALUES"
          yq -i ".ingestionWorker.image.tag = \"$SHA\"" "$VALUES"

      - name: Commit & Push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add infra/helm/umbrella/values.yaml deploy/helm/predator/values.yaml
          git diff --staged --quiet || git commit -m "chore(gitops): оновити образи до ${{ github.sha }} [skip ci]"
          git push

  # ── 5. ArgoCD Sync ─────────────────────────────────────────
  argocd-sync:
    name: "🚀 ArgoCD Sync"
    needs: update-gitops
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Trigger ArgoCD Refresh
        env:
          ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}
          ARGOCD_TOKEN: ${{ secrets.ARGOCD_TOKEN }}
        run: |
          if [ -n "$ARGOCD_SERVER" ] && [ -n "$ARGOCD_TOKEN" ]; then
            echo "🚀 Triggering ArgoCD sync for predator-v56..."
            curl -sSL -X POST \
              -H "Authorization: Bearer $ARGOCD_TOKEN" \
              "https://$ARGOCD_SERVER/api/v1/applications/predator-v56/sync" \
              -H "Content-Type: application/json" \
              -d '{"prune": true}' || echo "⚠️ ArgoCD sync request failed"
          else
            echo "ℹ️ ArgoCD secrets not configured. Sync will happen via polling."
          fi
