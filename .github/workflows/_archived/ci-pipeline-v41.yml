# ═══════════════════════════════════════════════════════════════
# 🦁 PREDATOR Analytics v4.1 — Канонічний CI Pipeline
# Запускається на: push до main/develop, pull requests
# ═══════════════════════════════════════════════════════════════

name: CI Pipeline v4.1

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ═══════════════════════════════════════════════════════════
  # BACKEND — Lint & Type Check
  # ═══════════════════════════════════════════════════════════
  backend-lint:
    name: "🔍 Backend Lint & Type Check"
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Встановити Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Встановити залежності
        run: pip install -e ".[dev]"

      - name: Ruff — перевірка стилю
        run: ruff check . --output-format=github

      - name: Ruff — перевірка форматування
        run: ruff format --check .

  # ═══════════════════════════════════════════════════════════
  # BACKEND — Tests
  # ═══════════════════════════════════════════════════════════
  backend-test:
    name: "🧪 Backend Tests"
    runs-on: self-hosted
    needs: backend-lint
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: predator
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: predator_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Встановити Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Встановити залежності
        run: pip install -e ".[dev]"

      - name: Запустити pytest
        env:
          DATABASE_URL: postgresql+asyncpg://predator:testpassword@localhost/predator_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret-key-for-ci-minimum-32-chars!!
          ENVIRONMENT: testing
        run: |
          pytest \
            --cov=app \
            --cov-report=xml:coverage/backend.xml \
            -v \
            --tb=short

      - name: Завантажити звіт покриття
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: coverage/backend.xml

  # ═══════════════════════════════════════════════════════════
  # FRONTEND — Lint & Type Check
  # ═══════════════════════════════════════════════════════════
  frontend-lint:
    name: "🔍 Frontend Lint & Type Check"
    runs-on: self-hosted
    defaults:
      run:
        working-directory: apps/predator-analytics-ui
    steps:
      - uses: actions/checkout@v4

      - name: Встановити Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/predator-analytics-ui/package-lock.json

      - name: Встановити залежності
        run: npm ci

      - name: ESLint — перевірка стилю
        run: npm run lint || true

      - name: TypeScript — перевірка типів
        run: npx tsc --noEmit || true

  # ═══════════════════════════════════════════════════════════
  # FRONTEND — Tests
  # ═══════════════════════════════════════════════════════════
  frontend-test:
    name: "🧪 Frontend Tests"
    runs-on: self-hosted
    needs: frontend-lint
    defaults:
      run:
        working-directory: apps/predator-analytics-ui
    steps:
      - uses: actions/checkout@v4

      - name: Встановити Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/predator-analytics-ui/package-lock.json

      - name: Встановити залежності
        run: npm ci

      - name: Vitest — запустити тести
        run: npx vitest run || true

      - name: Завантажити звіт покриття
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage
          path: apps/predator-analytics-ui/coverage/

  # ═══════════════════════════════════════════════════════════
  # BUILD & PUSH (тільки main)
  # ═══════════════════════════════════════════════════════════
  build-push:
    name: "🐳 Build & Push Docker Images"
    runs-on: self-hosted
    needs: [backend-test, frontend-test]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Логін до GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-

      - name: Збудувати та відправити образ
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
