name: Helm Lint & Template

on:
  pull_request:
    branches: [main]
    paths:
      - 'deploy/helm/**'
      - 'infra/helm/**'
      - 'environments/**'
  workflow_dispatch: {}

jobs:
  helm-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: 'v3.14.0'

      - name: Lint Predator Base Chart
        run: |
          helm dependency build deploy/helm/predator/ || true
          helm lint deploy/helm/predator/ || true

      - name: Lint Umbrella Chart
        working-directory: ./infra/helm/umbrella
        run: |
          helm dependency build . || true
          helm lint . || true

      - name: Render templates (Predator base)
        run: |
          helm dependency build deploy/helm/predator/ || true
          helm template predator deploy/helm/predator/ --debug || true

      - name: Lint Environment Charts
        run: |
          for env_dir in environments/*/; do
            if [ -f "$env_dir/Chart.yaml" ]; then
              echo "📋 Linting $env_dir..."
              helm dependency build "$env_dir" || true
              helm lint "$env_dir" || true
            fi
          done
