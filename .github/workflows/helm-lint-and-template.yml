name: Helm Lint & Template

on:
  pull_request:
    branches: [main]
    paths:
      - 'deploy/helm/**'
      - 'infra/helm/**'

jobs:
  helm-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: 'v3.14.0'

      - name: Lint Predator Base Chart
        run: |
          helm lint deploy/helm/predator/

      - name: Lint Umbrella Chart
        working-directory: ./infra/helm/umbrella
        run: |
          helm dependency build . || true
          helm lint .

      - name: Render templates (Predator base)
        run: |
          helm template predator deploy/helm/predator/ --debug || true

      - name: Render templates (Umbrella dev values)
        working-directory: ./infra/helm/umbrella
        run: |
          helm dependency build . || true
          helm template predator-umbrella . -f values-dev.yaml --debug || true
