name: Helm Lint & Template

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  helm-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: '3.12.4'

      - name: Run helm lint for umbrella chart
        working-directory: ./helm/predator-umbrella
        run: |
          helm lint . || true # don't fail lint (optional)

      - name: Build helm dependencies
        working-directory: ./helm/predator-umbrella
        run: |
          helm dependency build . || true

      - name: Render templates (dev values)
        working-directory: ./helm/predator-umbrella
        run: |
          helm template predator-umbrella . -f values-dev.yaml --debug
