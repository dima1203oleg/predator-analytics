---
name: Deploy NVIDIA
permissions:
  contents: write
  packages: write

on:
  push:
    branches: [main]
    paths:
      - 'apps/predator-analytics-ui/**'
      - 'environments/nvidia/**'
      - '.github/workflows/build-nvidia.yml'
  workflow_dispatch:

# HR-06: Не запускати якщо коміт з [skip ci]
# Concurrency: не скасовувати runs на main — уникаємо race conditions при швидких фіксах
concurrency:
  group: build-nvidia-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_VERSION: "20"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: "apps/predator-analytics-ui/package-lock.json"

      - name: Install frontend dependencies
        run: |
          cd apps/predator-analytics-ui
          npm ci --no-audit --no-fund

      - name: Build frontend
        run: |
          cd apps/predator-analytics-ui
          npm run build
        env:
          VITE_API_URL: "http://localhost:9080"
          NODE_OPTIONS: "--max-old-space-size=4096"

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/predator-analytics-ui/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ghcr.io/${{ github.repository }}/frontend:v61.0.${{ github.run_number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Update Helm values for nvidia
        run: |
          if [ -f environments/nvidia/values.yaml ]; then
            yq -i ".frontend.image.tag = \"v61.0.${{ github.run_number }}\"" environments/nvidia/values.yaml
          fi

      - name: Commit updated values
        if: "!contains(github.event.head_commit.message, '[skip ci]')"
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          git add environments/nvidia/values.yaml
          git diff --staged --quiet || git commit -m "chore(nvidia): оновити frontend образ до v61.0.${{ github.run_number }} [skip ci]"
          git push || echo "⚠️ Push failed"
