---
name: Deploy NVIDIA
permissions:
  contents: write
  packages: write

on:
  push:
    paths:
      - 'apps/predator-analytics-ui/**'
      - 'environments/nvidia/**'
      - '.github/workflows/build-nvidia.yml'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
        if: ${{ hashFiles('apps/predator-analytics-ui/package.json') != '' }}

      - name: Install frontend dependencies
        if: ${{ hashFiles('apps/predator-analytics-ui/package.json') != '' }}
        run: |
          cd apps/predator-analytics-ui
          npm install

      - name: Build frontend
        if: ${{ hashFiles('apps/predator-analytics-ui/package.json') != '' }}
        run: |
          cd apps/predator-analytics-ui
          npm run build

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend
        if: ${{ hashFiles('apps/predator-analytics-ui/Dockerfile') != '' }}
        uses: docker/build-push-action@v5
        with:
          context: ./apps/predator-analytics-ui
          platforms: linux/amd64
          push: true
          tags: ghcr.io/${{ github.repository }}/frontend:v55.1.${{ github.run_number }}

      - name: Update Helm values for nvidia
        run: |
          if [ -f environments/nvidia/values.yaml ]; then
            sed -i "s|tag:.*|tag: v55.1.${{ github.run_number }}|" environments/nvidia/values.yaml
          fi

      - name: Commit updated values
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          git add environments/nvidia/values.yaml
          git commit -m "chore(nvidia): оновити frontend образ до v55.1.${{ github.run_number }}" || echo "No changes"
          if ! git push; then
            echo "git push failed (probably no write permission). Skipping push." >&2
          fi
