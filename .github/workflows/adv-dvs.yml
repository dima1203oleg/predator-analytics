name: ADV-DVS CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f services/adv-dvs/requirements.txt ]; then pip install -r services/adv-dvs/requirements.txt; fi
          pip install 

      - name: Run ADV-DVS validator
        run: python -m services.adv-dvs.main

      - name: Run tests
        run: |
          pytest services/adv-dvs/tests
