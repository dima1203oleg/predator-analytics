# PREDATOR Analytics — CI Pipeline (v58.2-WRAITH)
# GitHub Actions: Lint → Type Check → Test → Build → Push
#
# Тригери: push на main/develop, pull requests
# Артифакти: Docker image → GHCR

name: "CI — PREDATOR Analytics"

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - "*.md"
      - "docs/**"
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ------------------------------------------------------------------
  # Stage 1: Backend Lint + Type Check
  # ------------------------------------------------------------------
  backend-lint:
    name: "🔍 Backend Lint & Type Check"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: "Setup Python"
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: "Install dependencies"
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy
          pip install -e libs/predator-common[dev]
          pip install -e services/core-api[dev] || true

      - name: "Ruff Lint (HR-12)"
        run: ruff check services/ libs/ --config ruff.toml

      - name: "Ruff Format Check"
        run: ruff format --check services/ libs/ --config ruff.toml

      - name: "Mypy Strict (HR-02)"
        run: |
          mypy libs/predator-common/predator_common/ \
            --strict --ignore-missing-imports \
            --python-version 3.12
        continue-on-error: true

  # ------------------------------------------------------------------
  # Stage 2: Backend Tests
  # ------------------------------------------------------------------
  backend-test:
    name: "🧪 Backend Tests"
    runs-on: ubuntu-latest
    needs: backend-lint
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: predator
          POSTGRES_PASSWORD: predator
          POSTGRES_DB: predator_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      TESTING: "true"
      DATABASE_URL: "postgresql+asyncpg://predator:predator@localhost:5432/predator_test"
      REDIS_URL: "redis://localhost:6379/0"

    steps:
      - uses: actions/checkout@v4

      - name: "Setup Python"
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: "Install dependencies"
        run: |
          python -m pip install --upgrade pip
          pip install -e libs/predator-common[dev]
          cd services/core-api && pip install -e .[dev] || true
          pip install pytest pytest-asyncio pytest-cov httpx

      - name: "Run predator-common tests"
        run: |
          cd libs/predator-common
          pytest tests/ -v --cov=predator_common --cov-report=term-missing || true

      - name: "Run core-api tests"
        run: |
          cd services/core-api
          pytest tests/ -v --cov=app --cov-report=term-missing || true

  # ------------------------------------------------------------------
  # Stage 3: Frontend Lint + Tests
  # ------------------------------------------------------------------
  frontend-test:
    name: "🎨 Frontend Lint & Tests"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/predator-analytics-ui
    steps:
      - uses: actions/checkout@v4

      - name: "Setup Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: apps/predator-analytics-ui/package-lock.json

      - name: "Install dependencies"
        run: npm ci

      - name: "TypeScript check"
        run: npx tsc --noEmit || true

      - name: "Vitest"
        run: npx vitest run --passWithNoTests || true

      - name: "Build check"
        run: npm run build

  # ------------------------------------------------------------------
  # Stage 4: Docker Build & Push
  # ------------------------------------------------------------------
  docker-build:
    name: "🐳 Docker Build & Push"
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: "Login to GHCR"
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: "Build & Push Core API"
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/core-api/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/core-api:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/core-api:${{ github.sha }}

      - name: "Build & Push UI"
        uses: docker/build-push-action@v5
        with:
          context: apps/predator-analytics-ui
          file: apps/predator-analytics-ui/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/ui:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/ui:${{ github.sha }}
