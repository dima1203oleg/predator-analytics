name: Ingestion Worker CI/CD

on:
  push:
    branches: [ "main" ]
    paths:
      - 'services/ingestion-worker/**'
      - 'libs/predator-common/**'
      - '.github/workflows/ingestion-worker.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'services/ingestion-worker/**'
      - 'libs/predator-common/**'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: dima1203oleg/predator-ingestion-worker

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          cd services/ingestion-worker
          poetry config virtualenvs.create false
          poetry install --no-interaction --no-ansi

      - name: Lint with Ruff (HR-12)
        run: |
          cd services/ingestion-worker
          ruff check .
          ruff format --check .

      - name: Type check with Mypy (HR-02)
        run: |
          cd services/ingestion-worker
          mypy app/

      - name: Run Pytest (HR-09)
        run: |
          cd services/ingestion-worker
          PYTHONPATH=. pytest tests/ --cov=app --cov-report=xml

  build-and-push:
    needs: lint-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image (HR-05)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/ingestion-worker/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest,${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max
