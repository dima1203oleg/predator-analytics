name: 🦅 Predator E2E Tests v3.0

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: '0 2 * * *'  # Щодня о 2:00 ранку

env:
  PLAYWRIGHT_BASE_URL: http://localhost:3030
  BACKEND_MODE: auto
  MAX_ITERATIONS: 10

jobs:
  # ============================================
  # Job 1: Запуск тестового оточення
  # ============================================
  setup-test-environment:
    name: 🐳 Setup Test Environment
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Compose
        run: |
          docker-compose -f deploy/docker-compose.test.yml up -d
      
      - name: Wait for services to be ready
        run: |
          echo "Waiting for services to be ready..."
          sleep 30
          
          # Перевірка PostgreSQL
          until docker exec predator-postgres-test pg_isready -U predator_test; do
            echo "Waiting for PostgreSQL..."
            sleep 5
          done
          
          # Перевірка Redis
          until docker exec predator-redis-test redis-cli ping; do
            echo "Waiting for Redis..."
            sleep 5
          done
          
          echo "All services are ready!"
      
      - name: Check service health
        run: |
          docker-compose -f deploy/docker-compose.test.yml ps

  # ============================================
  # Job 2: Unit тести з Vitest
  # ============================================
  unit-tests:
    name: 🧪 Unit Tests (Vitest)
    runs-on: ubuntu-latest
    needs: setup-test-environment
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/predator-analytics-ui/package-lock.json
      
      - name: Install dependencies
        working-directory: ./apps/predator-analytics-ui
        run: npm ci
      
      - name: Run Vitest tests
        working-directory: ./apps/predator-analytics-ui
        run: npm run test:unit
      
      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        with:
          files: ./apps/predator-analytics-ui/coverage/coverage-final.json
          flags: unit-tests
          name: unit-tests-coverage

  # ============================================
  # Job 3: E2E тести з Playwright
  # ============================================
  e2e-tests:
    name: 🎭 E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: setup-test-environment
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/predator-analytics-ui/package-lock.json
      
      - name: Install dependencies
        working-directory: ./apps/predator-analytics-ui
        run: npm ci
      
      - name: Install Playwright browsers
        working-directory: ./apps/predator-analytics-ui
        run: npx playwright install --with-deps
      
      - name: Run Playwright tests
        working-directory: ./apps/predator-analytics-ui
        run: npm run test:e2e
        env:
          CI: true
      
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/predator-analytics-ui/playwright-report/
          retention-days: 30
      
      - name: Upload Playwright traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: apps/predator-analytics-ui/test-results/
          retention-days: 30

  # ============================================
  # Job 4: Валідація баз даних
  # ============================================
  database-validation:
    name: 🗄️ Database Validation
    runs-on: ubuntu-latest
    needs: setup-test-environment
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
          pip install qdrant-client opensearch-py neo4j redis-py httpx
      
      - name: Run database validation
        run: python3 tests/e2e/validate_8_dbs.py
      
      - name: Upload validation results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: database-validation-results
          path: tests/e2e/reports/
          retention-days: 30

  # ============================================
  # Job 5: Валідація AI-чату
  # ============================================
  ai-chat-validation:
    name: 🤖 AI Chat Validation
    runs-on: ubuntu-latest
    needs: setup-test-environment
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install Python dependencies
        run: |
          pip install httpx
      
      - name: Run AI chat validation
        run: python3 tests/e2e/ai_chat_validator.py
      
      - name: Upload AI validation results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-chat-validation-results
          path: tests/e2e/reports/
          retention-days: 30

  # ============================================
  # Job 6: Перевірка консистентності
  # ============================================
  consistency-check:
    name: 🔗 Consistency Check
    runs-on: ubuntu-latest
    needs: setup-test-environment
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install Python dependencies
        run: |
          pip install httpx
      
      - name: Run consistency check
        run: python3 tests/e2e/consistency_checker.py
      
      - name: Upload consistency results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: consistency-check-results
          path: tests/e2e/reports/
          retention-days: 30

  # ============================================
  # Job 7: Навантажувальні тести
  # ============================================
  load-tests:
    name: ⚡ Load Tests (Artillery)
    runs-on: ubuntu-latest
    needs: setup-test-environment
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install Artillery
        run: npm install -g artillery
      
      - name: Run load tests
        run: artillery run tests/e2e/load-tests/default.yml
      
      - name: Upload load test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: load-test-results
          path: tests/e2e/load-tests/reports/
          retention-days: 30

  # ============================================
  # Job 8: Генерація звітів
  # ============================================
  generate-reports:
    name: 📊 Generate Reports
    runs-on: ubuntu-latest
    needs: [e2e-tests, database-validation, ai-chat-validation, consistency-check]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: tests/e2e/reports/
      
      - name: Generate final reports
        run: python3 tests/e2e/report_generator.py
      
      - name: Upload final reports
        uses: actions/upload-artifact@v4
        with:
          name: final-reports
          path: tests/e2e/reports/
          retention-days: 90
      
      - name: Comment PR with results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reportPath = 'tests/e2e/reports/autonomous_e2e_report_*.md';
            const report = fs.readFileSync(reportPath, 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: report
            });

  # ============================================
  # Job 9: Очищення тестового оточення
  # ============================================
  cleanup:
    name: 🧹 Cleanup Test Environment
    runs-on: ubuntu-latest
    needs: [generate-reports]
    if: always()
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Stop Docker Compose
        run: |
          docker-compose -f deploy/docker-compose.test.yml down -v
          docker system prune -f

  # ============================================
  # Job 10: Повідомлення про результати
  # ============================================
  notify:
    name: 📢 Notify Results
    runs-on: ubuntu-latest
    needs: [generate-reports]
    if: always()
    
    steps:
      - name: Send Slack notification
        if: success()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "🦅 Predator E2E Tests v3.0 Completed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Test Results*\n\nE2E Tests: Success\nDatabase Validation: Success\nAI Chat Validation: Success\nConsistency Check: Success"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      
      - name: Send Slack notification on failure
        if: failure()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "🦅 Predator E2E Tests v3.0 Failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Test Results - FAILED*\n\nPlease check the logs for details."
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
