# ArgoCD Application for Predator Analytics v55.2-SM-EXTENDED
# GitOps deployment — GKE NVIDIA Server

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: predator-umbrella
  namespace: argocd
  labels:
    app.kubernetes.io/name: predator-umbrella
    app.kubernetes.io/part-of: predator-system
    app.kubernetes.io/version: "55.2.0"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/dima1203oleg/predator-analytics.git
    targetRevision: main
    path: infra/helm/umbrella

    helm:
      valueFiles:
        - values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: predator

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
      - ApplyOutOfSyncOnly=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

  revisionHistoryLimit: 10

  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
