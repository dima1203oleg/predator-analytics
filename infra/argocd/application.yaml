# ArgoCD Application for Predator Analytics v45.0
# GitOps deployment configuration (App-of-Apps pattern or single Umbrella)

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: predator-umbrella
  namespace: argocd
  labels:
    app.kubernetes.io/name: predator-umbrella
    app.kubernetes.io/part-of: predator-system
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/dima1203oleg/predator-analytics.git
    targetRevision: main
    path: infra/helm/umbrella

    helm:
      valueFiles:
        - values.yaml
        - values-prod.yaml

      parameters:
        - name: global.imageTag
          value: "v45.0.0"
        - name: backend.replicas
          value: "2"
        - name: frontend.replicas
          value: "2"

  destination:
    server: https://kubernetes.default.svc
    namespace: predator-nvidia

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

  revisionHistoryLimit: 10

  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
    - group: ""
      kind: Secret
      jsonPointers:
        - /data
