# ═══════════════════════════════════════════════════════════════
# 🦁 PREDATOR Analytics v4.1 — Канонічний Docker Compose (Dev)
# Локальна розробка з усіма сервісами
# Запуск: docker compose -f infra/docker/docker-compose.yml up -d
# ═══════════════════════════════════════════════════════════════

name: predator-analytics

services:
  # ── PostgreSQL 16 (Основна БД) ─────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: predator-postgres
    environment:
      POSTGRES_USER: predator
      POSTGRES_PASSWORD: devpassword
      POSTGRES_DB: predator
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U predator"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Redis 7 (Кеш + Celery Broker) ─────────────────────────
  redis:
    image: redis:7-alpine
    container_name: predator-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ── Neo4j 5 (Графова БД) ──────────────────────────────────
  neo4j:
    image: neo4j:5.19-community
    container_name: predator-neo4j
    environment:
      NEO4J_AUTH: neo4j/devpassword
      NEO4J_PLUGINS: '["apoc", "graph-data-science"]'
      NEO4J_dbms_memory_heap_initial__size: 512m
      NEO4J_dbms_memory_heap_max__size: 2G
    ports:
      - "7474:7474" # HTTP Browser
      - "7687:7687" # Bolt
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:7474"]
      interval: 15s
      timeout: 10s
      retries: 10
    restart: unless-stopped

  # ── OpenSearch 2 (Повнотекстовий пошук) ───────────────────
  opensearch:
    image: opensearchproject/opensearch:2.13.0
    container_name: predator-opensearch
    environment:
      - discovery.type=single-node
      - plugins.security.disabled=true
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=DevPassword123!
    ports:
      - "9200:9200"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -sf http://localhost:9200/_cluster/health || exit 1",
        ]
      interval: 15s
      timeout: 10s
      retries: 10
    restart: unless-stopped

  # ── Qdrant (Векторна БД для RAG) ──────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.9.2
    container_name: predator-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  # ── Keycloak 24 (Автентифікація) ──────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: predator-keycloak
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: devpassword
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres/keycloak
      KC_DB_USERNAME: predator
      KC_DB_PASSWORD: devpassword
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ── Grafana 10 (Дашборди моніторингу) ─────────────────────
  grafana:
    image: grafana/grafana:10.4.2
    container_name: predator-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: devpassword
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    restart: unless-stopped

  # ── Prometheus (Метрики) ──────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: predator-prometheus
    ports:
      - "9090:9090"
    volumes:
      - prometheus_data:/prometheus
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  neo4j_data:
  neo4j_logs:
  opensearch_data:
  qdrant_data:
  grafana_data:
  prometheus_data:

networks:
  default:
    name: predator-network
