# ═══════════════════════════════════════════════════════════════
# 🔐 HashiCorp Vault — PREDATOR Analytics v56.0
# Helm Chart values для розгортання Vault в Kubernetes
# ═══════════════════════════════════════════════════════════════

global:
  enabled: true
  tlsDisable: false

server:
  # Standalone mode для dev/staging, HA для production
  ha:
    enabled: false  # Увімкнути для production
    replicas: 3
    raft:
      enabled: true
      config: |
        ui = true

        listener "tcp" {
          tls_disable = 0
          address = "[::]:8200"
          cluster_address = "[::]:8201"
          tls_cert_file = "/vault/userconfig/vault-tls/tls.crt"
          tls_key_file = "/vault/userconfig/vault-tls/tls.key"
        }

        storage "raft" {
          path = "/vault/data"
          retry_join {
            leader_api_addr = "https://vault-0.vault-internal:8200"
          }
          retry_join {
            leader_api_addr = "https://vault-1.vault-internal:8200"
          }
          retry_join {
            leader_api_addr = "https://vault-2.vault-internal:8200"
          }
        }

        service_registration "kubernetes" {}

  # Dev mode для локального тестування
  dev:
    enabled: false

  # Ресурси
  resources:
    requests:
      memory: 256Mi
      cpu: 250m
    limits:
      memory: 512Mi
      cpu: 500m

  # Persistence
  dataStorage:
    enabled: true
    size: 10Gi
    storageClass: local-path

  # Audit logging
  auditStorage:
    enabled: true
    size: 5Gi

  # Standalone config (для dev/staging)
  standalone:
    enabled: true
    config: |
      ui = true

      listener "tcp" {
        tls_disable = 1
        address = "[::]:8200"
        cluster_address = "[::]:8201"
      }

      storage "file" {
        path = "/vault/data"
      }

  # Service Account для Kubernetes Auth
  serviceAccount:
    create: true
    name: vault
    annotations: {}

# Vault Agent Injector — автоматичний інжект секретів
injector:
  enabled: true
  replicas: 1
  resources:
    requests:
      memory: 64Mi
      cpu: 50m
    limits:
      memory: 128Mi
      cpu: 100m
  # Webhook конфігурація
  webhook:
    failurePolicy: Ignore  # Не блокувати pods якщо Vault недоступний
  # Agent defaults
  agentDefaults:
    cpuRequest: 50m
    memRequest: 64Mi
    cpuLimit: 100m
    memLimit: 128Mi

# UI
ui:
  enabled: true
  serviceType: ClusterIP
  servicePort: 8200

# CSI Driver (альтернатива Injector)
csi:
  enabled: false
