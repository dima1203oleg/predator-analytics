{{- if .Values.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "cerebro.fullname" . }}
spec:
  type: {{ .Values.service.type }}
  selector: {{- include "cerebro.selectorLabels" . | nindent 4 }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}
{{- end }}
