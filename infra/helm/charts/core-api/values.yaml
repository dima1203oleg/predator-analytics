enabled: true
replicaCount: 1

image:
  repository: "europe-west3-docker.pkg.dev/project-b63e383c-4a98-418d-837/predator-repo/core-api"
  tag: "latest"
  pullPolicy: Always

service:
  type: ClusterIP
  port: 8000

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

env:
  ENV: "production"
  MCP_ROUTER_URL: "http://predator-mcp-router:8080/v1/query"
  GRAPH_SERVICE_URL: "http://predator-graph-service:8002"
  NEO4J_URI: "bolt://predator-neo4j:7687"
  KAFKA_BOOTSTRAP_SERVERS: "predator-redpanda:9092"

hpa:
  enabled: false
  minReplicas: 1
  maxReplicas: 4
  targetCPU: 70
