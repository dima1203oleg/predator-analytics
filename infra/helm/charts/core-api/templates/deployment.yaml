{{- if .Values.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "core-api.fullname" . }}
  labels: {{- include "core-api.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels: {{- include "core-api.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels: {{- include "core-api.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: core-api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.port }}
          env:
            - name: DATABASE_URL
              value: "postgresql+asyncpg://{{ .Values.global.postgres.user }}:{{ .Values.global.postgres.password }}@{{ .Values.global.postgres.host }}:{{ .Values.global.postgres.port }}/{{ .Values.global.postgres.db }}"
            - name: REDIS_URL
              value: "redis://{{ .Values.global.redis.host }}:{{ .Values.global.redis.port }}/0"
            - name: QDRANT_URL
              value: "http://{{ .Values.global.qdrant.host }}:{{ .Values.global.qdrant.port }}"
            - name: OPENSEARCH_URL
              value: "http://{{ .Values.global.opensearch.host }}:{{ .Values.global.opensearch.port }}"
            - name: NEO4J_URI
              value: "{{ .Values.env.NEO4J_URI }}"
            - name: MCP_ROUTER_URL
              value: "{{ .Values.env.MCP_ROUTER_URL }}"
            - name: GRAPH_SERVICE_URL
              value: "{{ .Values.env.GRAPH_SERVICE_URL }}"
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "{{ .Values.env.KAFKA_BOOTSTRAP_SERVERS }}"
            - name: ENV
              value: "{{ .Values.env.ENV }}"
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.service.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.service.port }}
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
{{- end }}
