{{- if .Values.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "core-api.fullname" . }}
  labels: {{- include "core-api.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels: {{- include "core-api.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels: {{- include "core-api.selectorLabels" . | nindent 8 }}
      annotations:
        # 🔐 Інтеграція з Vault
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "core-api"
        # Секрет БД
        vault.hashicorp.com/agent-inject-secret-database.env: "secret/data/predator/database/postgres"
        vault.hashicorp.com/agent-inject-template-database.env: |
          {{- "{{" }} with secret "secret/data/predator/database/postgres" {{ "}}" }}
          export DATABASE_URL="{{- "{{" }} .Data.data.connection_string {{ "}}" }}"
          {{- "{{" }} end {{ "}}" }}
        # Секрет Redis
        vault.hashicorp.com/agent-inject-secret-redis.env: "secret/data/predator/redis/main"
        vault.hashicorp.com/agent-inject-template-redis.env: |
          {{- "{{" }} with secret "secret/data/predator/redis/main" {{ "}}" }}
          export REDIS_URL="{{- "{{" }} .Data.data.url {{ "}}" }}"
          {{- "{{" }} end {{ "}}" }}
        # 📊 Моніторинг (Prometheus)
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ .Values.service.port }}"
        prometheus.io/path: "/metrics"
        # 🔗 Service Mesh
        linkerd.io/inject: "enabled"
    spec:
      serviceAccountName: core-api
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: core-api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          # Запуск Vault source перед стартом (щоб завантажити export змінні)
          command: ["/bin/sh", "-c"]
          args:
            - source /vault/secrets/database.env &&
              source /vault/secrets/redis.env &&
              exec uvicorn app.main:app --host 0.0.0.0 --port {{ .Values.service.port }}
          ports:
            - containerPort: {{ .Values.service.port }}
          env:
            # Секрети (Postgres, Redis) більше не тут, вони inject-яться через Vault!
            - name: QDRANT_URL
              value: "http://{{ .Values.global.qdrant.host }}:{{ .Values.global.qdrant.port }}"
            - name: OPENSEARCH_URL
              value: "http://{{ .Values.global.opensearch.host }}:{{ .Values.global.opensearch.port }}"
            - name: NEO4J_URI
              value: "{{ .Values.env.NEO4J_URI }}"
            - name: MCP_ROUTER_URL
              value: "{{ .Values.env.MCP_ROUTER_URL }}"
            - name: GRAPH_SERVICE_URL
              value: "{{ .Values.env.GRAPH_SERVICE_URL }}"
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "{{ .Values.env.KAFKA_BOOTSTRAP_SERVERS }}"
            - name: ENV
              value: "{{ .Values.env.ENV }}"
            # 📡 OpenTelemetry 
            - name: OTEL_SERVICE_NAME
              value: "core-api"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otel-collector.monitoring:4317"
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "deployment.environment={{ .Values.env.ENV }}"
            - name: OTEL_LOGS_EXPORTER
              value: "none"
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.service.port }}
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.service.port }}
            initialDelaySeconds: 45
            periodSeconds: 30
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
{{- end }}
