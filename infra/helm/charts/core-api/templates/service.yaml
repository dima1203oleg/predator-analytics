{{- if .Values.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "core-api.fullname" . }}
  labels: {{- include "core-api.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector: {{- include "core-api.selectorLabels" . | nindent 4 }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}
      protocol: TCP
{{- end }}
