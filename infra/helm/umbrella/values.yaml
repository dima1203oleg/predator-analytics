global:
  imageTag: "latest"
  imagePullSecrets:
    - name: ghcr-creds

  postgres:
    host: "predator-postgres"
    port: 5432
    db: "predator_db"
    user: "predator"
    password: "predator_password"

  redis:
    host: "predator-redis"
    port: 6379

  opensearch:
    host: "predator-opensearch"
    port: 9200

  qdrant:
    host: "predator-qdrant"
    port: 6333

core-api:
  enabled: true
  replicaCount: 1
  image:
    repository: "ghcr.io/dima1203oleg/predator-core-api"
    tag: "latest" # CORE_API_TAG

frontend:
  enabled: true
  replicaCount: 1
  image:
    repository: "ghcr.io/dima1203oleg/predator-frontend"
    tag: "latest" # FRONTEND_TAG

mcp-router:
  enabled: true
  replicaCount: 1
  image:
    repository: "ghcr.io/dima1203oleg/predator-mcp-router"
    tag: "latest" # MCP_ROUTER_TAG

graph-service:
  enabled: true
  replicaCount: 1
  image:
    repository: "ghcr.io/dima1203oleg/predator-graph-service"
    tag: "latest" # GRAPH_SERVICE_TAG

cerebro:
  enabled: true
  replicaCount: 1
  image:
    repository: "ghcr.io/dima1203oleg/predator-cerebro"
    tag: "latest" # CEREBRO_TAG

rtb-engine:
  enabled: true
  replicaCount: 1
  image:
    repository: "ghcr.io/dima1203oleg/predator-rtb-engine"
    tag: "latest" # RTB_ENGINE_TAG

ingestion-worker:
  enabled: true
  replicaCount: 1
  image:
    repository: "ghcr.io/dima1203oleg/predator-ingestion-worker"
    tag: "latest" # INGESTION_WORKER_TAG

# Legacy charts (keep enabled)
backend:
  enabled: false  # Replaced by core-api
parser:
  enabled: false
processor:
  enabled: false
indexer:
  enabled: false
