# ═══════════════════════════════════════════════════════════════
# 🪐 Backstage System Catalog v63.0-ELITE
# PREDATOR Analytics — повна архітектурна топологія
# ═══════════════════════════════════════════════════════════════

---
apiVersion: backstage.io/v1alpha1
kind: System
metadata:
  name: predator-analytics
  description: OSINT-платформа для митної аналітики України
spec:
  owner: dima1203oleg

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: core-api
  description: Головний FastAPI Backend (async-first, pgbouncer, read replicas)
  links:
    - title: Swagger UI
      url: http://localhost:8000/docs
    - title: GraphQL Playground
      url: http://localhost:8000/graphql
  annotations:
    github.com/project-slug: dima1203oleg/predator-analytics
    argocd/app-name: predator
spec:
  type: service
  lifecycle: production
  owner: dima1203oleg
  system: predator-analytics
  providesApis:
    - predator-core-api
  dependsOn:
    - resource:predator-postgresql
    - resource:predator-redis
    - resource:predator-kafka

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: graph-service
  description: Neo4j GDS алгоритми (Louvain, PageRank, Node2Vec)
spec:
  type: service
  lifecycle: production
  owner: dima1203oleg
  system: predator-analytics
  dependsOn:
    - resource:predator-neo4j

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: ingestion-worker
  description: Kafka ETL Worker (Avro + Schema Registry)
spec:
  type: worker
  lifecycle: production
  owner: dima1203oleg
  system: predator-analytics
  dependsOn:
    - resource:predator-kafka
    - resource:predator-clickhouse
    - resource:predator-opensearch

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: litellm
  description: AI Gateway (LiteLLM) з семантичним кешем
spec:
  type: service
  lifecycle: production
  owner: dima1203oleg
  system: predator-analytics
  dependsOn:
    - resource:predator-qdrant
    - resource:predator-redis

---
# ── Resources (Бази даних) ──────────────────────────────────

apiVersion: backstage.io/v1alpha1
kind: Resource
metadata:
  name: predator-postgresql
  description: PostgreSQL 16 — SSOT (метадані, транзакції, RLS, WORM)
spec:
  type: database
  owner: dima1203oleg

---
apiVersion: backstage.io/v1alpha1
kind: Resource
metadata:
  name: predator-neo4j
  description: Neo4j 5 — Graph DB (схеми власності, фрод-ланцюжки)
spec:
  type: database
  owner: dima1203oleg

---
apiVersion: backstage.io/v1alpha1
kind: Resource
metadata:
  name: predator-clickhouse
  description: ClickHouse — OLAP (агрегації, materialized views)
spec:
  type: database
  owner: dima1203oleg

---
apiVersion: backstage.io/v1alpha1
kind: Resource
metadata:
  name: predator-opensearch
  description: OpenSearch 2.12 — Full-text + Hybrid search (BM25+Vector)
spec:
  type: database
  owner: dima1203oleg

---
apiVersion: backstage.io/v1alpha1
kind: Resource
metadata:
  name: predator-qdrant
  description: Qdrant 1.8 — Vector memory (embeddings, semantic cache)
spec:
  type: database
  owner: dima1203oleg

---
apiVersion: backstage.io/v1alpha1
kind: Resource
metadata:
  name: predator-redis
  description: Redis 7 — Cache + queues + sessions
spec:
  type: database
  owner: dima1203oleg

---
apiVersion: backstage.io/v1alpha1
kind: Resource
metadata:
  name: predator-minio
  description: MinIO — S3 storage (документи, скани, моделі)
spec:
  type: storage
  owner: dima1203oleg

---
apiVersion: backstage.io/v1alpha1
kind: Resource
metadata:
  name: predator-kafka
  description: Kafka (KRaft) — Event streaming (9 topics)
spec:
  type: message-broker
  owner: dima1203oleg
