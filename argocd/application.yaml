apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: predator-analytics
  namespace: argocd
spec:
  project: default
  source:
    path: helm/predator-analytics
    repoURL: https://github.com/predator-analytics/predator
    targetRevision: main
  destination:
    server: https://kubernetes.default.svc
    namespace: predator-analytics
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
