apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: predator-v55
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: "https://github.com/dima1203oleg/predator-analytics"
    targetRevision: main
    path: infra/helm/umbrella
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: "https://kubernetes.default.svc"
    namespace: predator-v55
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
