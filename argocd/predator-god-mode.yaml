apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: predator-god-mode
  namespace: argocd
  annotations:
    # ArgoCD: Дозволяє плавне вмикання нових Pods (Zero Downtime)
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: 'https://github.com/dima1203oleg/predator-analytics'
    targetRevision: HEAD
    path: helm/predator-god-mode
    helm:
      # ArgoCD підтягне values.yaml автоматично
      valueFiles:
        - values.yaml
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: predator-system

  # Вмикаємо тотальну автоматизацію
  syncPolicy:
    automated:
      prune: true     # Видаляти застарілі ресурси
      selfHeal: true  # Відновлювати стан, якщо хтось вніс ручні зміни (GitOps Force)
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
