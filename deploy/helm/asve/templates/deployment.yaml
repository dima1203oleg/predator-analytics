apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "asve.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "asve.name" . }}
    helm.sh/chart: {{ include "asve.chart" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "asve.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "asve.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: NEO4J_URL
              value: "bolt://neo4j:7687"
            - name: REDPANDA
              value: "redpanda:9092"
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
