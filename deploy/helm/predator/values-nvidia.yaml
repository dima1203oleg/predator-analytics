# NVIDIA Server spec values (v61.0-ELITE Production-Grade)
# Focus: Production Deployment (Backend, Databases, Ingress, Frontend, AI Gateway, Observability)
# Виправлено: persistence, HPA, ingress, redis, monitoring, security hardening

global:
  domain: "194.177.1.240.nip.io"
  imagePullPolicy: IfNotPresent
  imagePullSecrets:
    - name: ghcr-secret
  postgres:
    host: predator-postgresql
    port: 5432
  redis:
    host: predator-redis-master
    port: 6379
  neo4j:
    host: predator-neo4j
    port: 7687
  opensearch:
    host: opensearch-cluster-master
    port: 9200
  qdrant:
    host: predator-qdrant
    port: 6333

ingress:
  enabled: false
  className: traefik
  tls:
    enabled: true
    issuer: letsencrypt-prod
    secretName: predator-tls
    email: "admin@predator.analytics"

frontend:
  enabled: true
  replicaCount: 1
  image:
    repository: predator/frontend
    tag: v61.0-ELITE
    pullPolicy: IfNotPresent
  service:
    type: NodePort
    port: 80
    targetPort: 80
    nodePort: 30080
  ingress:
    enabled: false
    hosts:
      - host: "{{ .Values.global.domain }}"
        paths:
          - path: "/"
            pathType: Prefix
    tls:
      - secretName: predator-tls
        hosts:
          - "{{ .Values.global.domain }}"
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 70
  env:
    VITE_API_URL: "https://api.194.177.1.240.nip.io/api/v1"
    NODE_ENV: "production"
  livenessProbe:
    httpGet:
      path: /
      port: 3030
    initialDelaySeconds: 10
    periodSeconds: 30
    timeoutSeconds: 3
    failureThreshold: 3
  readinessProbe:
    httpGet:
      path: /
      port: 3030
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 2

mcpRouter:
  enabled: true
  replicaCount: 1
  image:
    repository: predator/mcp-router
    tag: v61.0-ELITE
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8080
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi
  env:
    MCP_ROUTER_URL: "{{ .Values.mcpRouter.url }}"
  url: "http://{{ include \"predator.fullname\" . }}-mcp-router:{{ .Values.mcpRouter.service.port }}"
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 70

coreApi:
  enabled: true
  replicaCount: 1
  image:
    repository: predator/core-api
    tag: v61.0-ELITE
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8000
    targetPort: 8000
  resources:
    limits:
      cpu: 2000m
      memory: 2Gi
    requests:
      cpu: 500m
      memory: 512Mi
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70
  livenessProbe:
    httpGet:
      path: /health
      port: 8000
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  readinessProbe:
    httpGet:
      path: /ready
      port: 8000
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3
  startupProbe:
    httpGet:
      path: /health
      port: 8000
    initialDelaySeconds: 10
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 12
  env:
    LITELLM_GATEWAY_URL: "http://{{ include \"predator.fullname\" . }}-litellm:4000"
graphService:
  enabled: true
  replicaCount: 1
  image:
    repository: predator/graph-service
    tag: v61.0-ELITE
    pullPolicy: IfNotPresent
  resources:
    limits:
      cpu: 1000m
      memory: 1Gi
    requests:
      cpu: 200m
      memory: 256Mi
  livenessProbe:
    httpGet:
      path: /health
      port: 8001
    initialDelaySeconds: 30
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 3
  readinessProbe:
    httpGet:
      path: /health
      port: 8001
    initialDelaySeconds: 15
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3

ingestionWorker:
  enabled: true
  replicaCount: 1
  image:
    repository: predator/ingestion-worker
    tag: v61.0-ELITE
    pullPolicy: IfNotPresent
  resources:
    limits:
      cpu: 2000m
      memory: 2Gi
    requests:
      cpu: 500m
      memory: 512Mi
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70
  livenessProbe:
    httpGet:
      path: /api/v1/health
      port: 9100
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  readinessProbe:
    httpGet:
      path: /api/v1/ready
      port: 9100
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3

osintService:
  enabled: true
  replicaCount: 1
  image:
    repository: ghcr.io/dima1203oleg/predator-analytics/osint-service
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 9200
  resources:
    limits:
      cpu: 1000m
      memory: 1Gi
    requests:
      cpu: 200m
      memory: 256Mi
  livenessProbe:
    httpGet:
      path: /health
      port: 9200
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  readinessProbe:
    httpGet:
      path: /ready
      port: 9200
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3

postgresql:
  enabled: true
  global:
    postgresql:
      auth:
        database: predator
        username: predator
        password: predator_db_secret
  primary:
    persistence:
      enabled: true
      size: 100Gi
      storageClass: local-path
    resources:
      limits:
        cpu: 1000m
        memory: 2Gi
      requests:
        cpu: 200m
        memory: 512Mi

neo4j:
  enabled: true
  neo4j:
    password: predator_graph_secret
    name: predator-graph
  volumes:
    data:
      mode: defaultStorageClass
  resources:
    limits:
      cpu: 1500m
      memory: 2Gi
    requests:
      cpu: 500m
      memory: 1Gi

clickhouse:
  enabled: true
  persistence:
    enabled: true
    size: 100Gi
    storageClass: local-path
  resources:
    limits:
      cpu: 2000m
      memory: 6Gi
    requests:
      cpu: 500m
      memory: 2Gi

opensearch:
  enabled: true
  persistence:
    enabled: true
    size: 200Gi
    storageClass: local-path
  extraEnvs:
    - name: OPENSEARCH_INITIAL_ADMIN_PASSWORD
      valueFrom:
        secretKeyRef:
          name: predator-opensearch-admin
          key: password
  resources:
    limits:
      cpu: 2000m
      memory: 8Gi
    requests:
      cpu: 500m
      memory: 2Gi
  ilm:
    enabled: true
    hotAge: "7d"
    warmAge: "30d"
    coldAge: "90d"
    logsAge: "7d"

qdrant:
  enabled: true
  persistence:
    enabled: true
    size: 100Gi
    storageClass: local-path
  resources:
    limits:
      cpu: 1000m
      memory: 2Gi
    requests:
      cpu: 200m
      memory: 512Mi

minio:
  enabled: true
  persistence:
    enabled: true
    size: 500Gi
    storageClass: local-path
  resources:
    limits:
      cpu: 1000m
      memory: 1Gi
    requests:
      cpu: 200m
      memory: 256Mi
  provisioning:
    enabled: true

redis:
  enabled: true
  architecture: standalone
  auth:
    enabled: true
    password: predator_redis_secret
  master:
    persistence:
      enabled: true
      size: 10Gi
      storageClass: local-path
    resources:
      limits:
        cpu: 500m
        memory: 1Gi
      requests:
        cpu: 100m
        memory: 256Mi

kafka:
  enabled: false
  replicaCount: 1
  persistence:
    enabled: true
    size: 50Gi
    storageClass: local-path
  resources:
    limits:
      cpu: 1000m
      memory: 2Gi
    requests:
      cpu: 200m
      memory: 512Mi
  zookeeper:
    enabled: false
  kraft:
    enabled: true
  provisioning:
    enabled: true
    defaultCleanupPolicy: true

litellm:
  enabled: true
  replicaCount: 1
  service:
    type: ClusterIP
    port: 4000
  resources:
    limits:
      cpu: 1000m
      memory: 1Gi
    requests:
      cpu: 200m
      memory: 256Mi
  livenessProbe:
    httpGet:
      path: /health
      port: 4000
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  readinessProbe:
    httpGet:
      path: /health
      port: 4000
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3

ollama:
  enabled: true
  nodeSelector:
    accelerator: nvidia
  tolerations:
    - key: nvidia.com/gpu
      operator: Exists
      effect: NoSchedule
  resources:
    limits:
      nvidia.com/gpu: 1
      memory: 8Gi
    requests:
      memory: 4Gi

priorityClass:
  enabled: true
  classes:
    - name: predator-critical
      value: 1000000
      description: "Critical PREDATOR services"
    - name: predator-high
      value: 100000
      description: "High priority services"
    - name: predator-default
      value: 10000
      description: "Default priority"
    - name: predator-low
      value: 1000
      description: "Low priority batch jobs"

backup:
  enabled: true
  velero:
    enabled: true
    namespace: velero
    schedule: "0 2 * * *"
    dbSchedule: "0 */6 * * *"
    ttl: "720h0m0s"
    dbTtl: "168h0m0s"
    storageLocation: default
    volumeSnapshotLocation: default
    annotations:
      backup.velero.io/backup-volumes: data
      backup.velero.io/include-resources: persistentvolumeclaims

monitoring:
  enabled: true
  prometheus:
    enabled: true
    retention: 30d
  grafana:
    enabled: true
    adminPassword: ""
    dashboards:
      enabled: true
  loki:
    enabled: true
  serviceMonitor:
    enabled: true
    interval: 30s
  prometheusRelease: predator
  prometheusRule:
    enabled: true
  alertmanager:
    enabled: true
    slack:
      enabled: false
      webhookUrl: ""
    email:
      enabled: false
      to: "admin@predator.analytics"
      from: "alertmanager@predator.analytics"
      smarthost: "smtp:587"

security:
  networkPolicy:
    enabled: true
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    fsGroup: 2000
  containerSecurityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL
  zeroTrust:
    enabled: true
    spire:
      enabled: false
    opa:
      enabled: true
    falco:
      enabled: true
    trivy:
      enabled: true
  resourceQuota:
    enabled: true
    hard:
      requestsCpu: "16"
      requestsMemory: "32Gi"
      limitsCpu: "32"
      limitsMemory: "64Gi"
      pods: "50"
      services: "20"
      pvcs: "20"
      secrets: "30"
      configmaps: "30"
      storage: "2Ti"
    defaultLimit:
      cpu: "500m"
      memory: "512Mi"
    defaultRequest:
      cpu: "100m"
      memory: "128Mi"

argocd:
  enabled: true
  appName: predator
  namespace: argocd
  project: predator
  repoURL: "https://github.com/dima1203oleg/predator-analytics.git"
  targetRevision: main
  destination:
    server: "https://kubernetes.default.svc"
    namespace: predator
  syncPolicy:
    prune: true
    selfHeal: true

sealedSecrets:
  enabled: true
  encrypted:
    databaseUrl: "AgAAAAAA..."
    redisUrl: "AgAAAAAA..."
    neo4jPassword: "AgAAAAAA..."
    opensearchPassword: "AgAAAAAA..."
    minioAccessKey: "AgAAAAAA..."
    minioSecretKey: "AgAAAAAA..."
    jwtSecret: "AgAAAAAA..."
    secretKey: "AgAAAAAA..."
    youcontrolApiKey: "AgAAAAAA..."
    geminiApiKey: "AgAAAAAA..."

serviceMesh:
  enabled: false
  type: none
  mtls: true
  autoInject: true

otel:
  enabled: true
  collector:
    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 128Mi
  tempo:
    enabled: true
    resources:
      limits:
        cpu: 500m
        memory: 1Gi
      requests:
        cpu: 100m
        memory: 256Mi
  loki:
    enabled: true

rbac:
  enabled: true
  serviceAccounts:
    coreApi: true
    graphService: true
    ingestionWorker: true
    frontend: true
    osintService: true
    litellm: true

initContainers:
  enabled: true

topologySpread:
  enabled: true

namespace:
  create: true
  name: predator
  podSecurity:
    enforce: restricted
    enforceVersion: latest
    audit: restricted
    auditVersion: latest
    warn: restricted
    warnVersion: latest
    dbExemptions: "postgresql-neo4j-opensearch-clickhouse-redis-kafka-qdrant-minio"

database:
  migration:
    enabled: true
    seed: true
  backup:
    enabled: true
    pgSchedule: "0 3 * * *"
    chSchedule: "0 4 * * *"
    storage: 50Gi
  replicas:
    enabled: true
    count: 2

externalDns:
  enabled: false
  provider: rfc2136
  rfc2136:
    host: "194.177.1.240"
    zone: "nip.io"
    tsigKeyName: "predator-dns-key"
    tsigSecret: ""
    tsigAlgorithm: "hmac-sha256"

healthAggregator:
  enabled: true

cicd:
  argoRollouts:
    enabled: true
  cosign:
    enabled: true
  renovate:
    enabled: true

pgbouncer:
  enabled: true
  poolSize: 25
  minPoolSize: 5
  reservePoolSize: 5
  maxDbConnections: 50
  maxUserConnections: 50
  pgPassword: "devpassword"

costOptimization:
  enabled: true
  kubecost: true
  karpenter: true
  vpa: true

testing:
  enabled: true
  locust: true
  chaosMesh: true
  pact: true

performance:
  enabled: true
  http3: true
  brotli: true
  tls13: true

uaRegistryGateway:
  enabled: true
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi
