# 🦅 PREDATOR Analytics v63.0-ELITE — Full Kaggle Node Configuration
# 8 Баз даних + Core API (CPU Optimized)

global:
  domain: kaggle.predator.ua
  tenantId: kaggle-reserve
  storageClass: local-path

# --- [1] PostgreSQL (SSOT) ---
postgresql:
  enabled: true
  primary:
    resources:
      limits: { memory: 512Mi, cpu: 500m }
      requests: { memory: 256Mi, cpu: 100m }

# --- [2] Neo4j (Graph) ---
neo4j:
  enabled: true
  resources:
    limits: { memory: 2Gi, cpu: 1000m }
    requests: { memory: 1Gi, cpu: 500m }

# --- [3] OpenSearch (Search) ---
opensearch:
  enabled: true
  singleNode: true
  resources:
    limits: { memory: 2Gi, cpu: 1000m }
    requests: { memory: 1Gi, cpu: 500m }
  config:
    opensearch.yml: |
      cluster.name: predator-search
      discovery.type: single-node
      bootstrap.memory_lock: false

# --- [4] Qdrant (Vector) ---
qdrant:
  enabled: true
  resources:
    limits: { memory: 512Mi, cpu: 500m }
    requests: { memory: 256Mi, cpu: 100m }

# --- [5] ClickHouse (OLAP) ---
clickhouse:
  enabled: true
  resources:
    limits: { memory: 2Gi, cpu: 1000m }
    requests: { memory: 1Gi, cpu: 500m }

# --- [6] Redis (Cache) ---
redis:
  enabled: true
  master:
    resources:
      limits: { memory: 256Mi, cpu: 200m }
      requests: { memory: 128Mi, cpu: 100m }

# --- [7] MinIO (S3) ---
minio:
  enabled: true
  resources:
    limits: { memory: 512Mi, cpu: 500m }
    requests: { memory: 256Mi, cpu: 100m }

# --- [8] Redpanda (Kafka Substitute) ---
redpanda:
  enabled: true
  resources:
    limits: { memory: 2Gi, cpu: 1000m }
    requests: { memory: 1Gi, cpu: 500m }

# --- [Core API] ---
coreApi:
  replicaCount: 1
  resources:
    limits: { memory: 1Gi, cpu: 1000m }
    requests: { memory: 512Mi, cpu: 200m }
  env:
    ENV: "production"
    FF_KAFKA_ENABLED: "true"
    FF_OPENSEARCH_ENABLED: "true"
    FF_QDRANT_ENABLED: "true"
    VRAM_LIMIT_MB: "0"

# --- [LiteLLM] ---
litellm:
  enabled: true
  resources:
    limits: { memory: 512Mi, cpu: 500m }
    requests: { memory: 256Mi, cpu: 100m }
