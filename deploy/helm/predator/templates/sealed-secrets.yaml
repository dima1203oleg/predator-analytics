{{- if .Values.sealedSecrets.enabled }}
# SealedSecret для PREDATOR — усі секрети зашифровані для GitOps
# Генерація: kubectl create secret generic predator-secrets --dry-run=client -o yaml | kubeseal -o yaml
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: {{ include "predator.fullname" . }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "predator.labels" . | nindent 4 }}
    app: secrets
  annotations:
    sealedsecrets.bitnami.com/cluster-wide: "true"
spec:
  encryptedData:
    # Зашифровані значення генеруються через kubeseal
    # kubectl create secret generic predator-secrets \
    #   --from-literal=DATABASE_URL='postgresql+asyncpg://predator:PASSWORD@predator-postgresql:5432/predator' \
    #   --from-literal=REDIS_URL='redis://:PASSWORD@predator-redis-master:6379/0' \
    #   --from-literal=NEO4J_PASSWORD='PASSWORD' \
    #   --from-literal=OPENSEARCH_ADMIN_PASSWORD='PASSWORD' \
    #   --from-literal=MINIO_ACCESS_KEY='ACCESS_KEY' \
    #   --from-literal=MINIO_SECRET_KEY='SECRET_KEY' \
    #   --from-literal=JWT_SECRET='JWT_SECRET' \
    #   --from-literal=SECRET_KEY='SECRET_KEY' \
    #   --from-literal=YOUCONTROL_API_KEY='API_KEY' \
    #   --from-literal=GEMINI_API_KEY='API_KEY' \
    #   --dry-run=client -o yaml | kubeseal -o yaml > sealed-secret.yaml
    DATABASE_URL: {{ .Values.sealedSecrets.encrypted.databaseUrl | default "AgAAAAAA..." | quote }}
    REDIS_URL: {{ .Values.sealedSecrets.encrypted.redisUrl | default "AgAAAAAA..." | quote }}
    NEO4J_PASSWORD: {{ .Values.sealedSecrets.encrypted.neo4jPassword | default "AgAAAAAA..." | quote }}
    OPENSEARCH_ADMIN_PASSWORD: {{ .Values.sealedSecrets.encrypted.opensearchPassword | default "AgAAAAAA..." | quote }}
    MINIO_ACCESS_KEY: {{ .Values.sealedSecrets.encrypted.minioAccessKey | default "AgAAAAAA..." | quote }}
    MINIO_SECRET_KEY: {{ .Values.sealedSecrets.encrypted.minioSecretKey | default "AgAAAAAA..." | quote }}
    JWT_SECRET: {{ .Values.sealedSecrets.encrypted.jwtSecret | default "AgAAAAAA..." | quote }}
    SECRET_KEY: {{ .Values.sealedSecrets.encrypted.secretKey | default "AgAAAAAA..." | quote }}
    YOUCONTROL_API_KEY: {{ .Values.sealedSecrets.encrypted.youcontrolApiKey | default "AgAAAAAA..." | quote }}
    GEMINI_API_KEY: {{ .Values.sealedSecrets.encrypted.geminiApiKey | default "AgAAAAAA..." | quote }}
  template:
    metadata:
      labels:
        {{- include "predator.labels" . | nindent 8 }}
        app: secrets
{{- end }}
