apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "predator.fullname" . }}-ingress
  labels:
    {{- include "predator.labels" . | nindent 4 }}
  annotations:
    kubernetes.io/ingress.class: "traefik"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  rules:
    - host: {{ .Values.global.domain }}
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ include "predator.fullname" . }}-core-api
                port:
                  number: {{ .Values.coreApi.service.port }}
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "predator.fullname" . }}-frontend
                port:
                  number: 80
