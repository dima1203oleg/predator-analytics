{{- /*
Секрет з адмінським паролем OpenSearch.
Згідно з вимогами OpenSearch 2.12+ — потрібен OPENSEARCH_INITIAL_ADMIN_PASSWORD
для першого запуску security plugin.

Логіка:
- Якщо секрет ще не існує — генерується випадковий 32-символьний пароль (randAlphaNum).
- Якщо існує — повторно зчитується, щоб не перетворювати pod на CrashLoop при ре-синку.
- Пароль НЕ зберігається у values/Git (HR-06). Виключно у k8s Secret.
*/ -}}
{{- if .Values.opensearch.enabled }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace "predator-opensearch-admin" }}
{{- $password := "" }}
{{- if and $existing $existing.data $existing.data.password }}
  {{- $password = $existing.data.password | b64dec }}
{{- else }}
  {{- $password = printf "Predator!%s" (randAlphaNum 24) }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: predator-opensearch-admin
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "predator.labels" . | nindent 4 }}
    app.kubernetes.io/component: opensearch-admin
  annotations:
    # ArgoCD: уникнути перезапису пароля при кожному ре-синку
    argocd.argoproj.io/sync-options: Prune=false
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  password: {{ $password | quote }}
{{- end }}
