apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "predator.fullname" . }}-chrome-viewer
  labels:
    {{- include "predator.labels" . | nindent 4 }}
    app.kubernetes.io/component: chrome-viewer
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "predator.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: chrome-viewer
  template:
    metadata:
      labels:
        {{- include "predator.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: chrome-viewer
    spec:
      containers:
        - name: chrome
          image: selenium/standalone-chrome:latest
          ports:
            - name: http
              containerPort: 4444
              protocol: TCP
            - name: vnc
              containerPort: 5900
              protocol: TCP
          resources:
            limits:
              cpu: 1000m
              memory: 2Gi
            requests:
              cpu: 500m
              memory: 1Gi
          env:
            - name: START_XVFB
              value: "false"
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "predator.fullname" . }}-chrome-viewer
  labels:
    {{- include "predator.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 4444
      targetPort: http
      protocol: TCP
      name: http
    - port: 5900
      targetPort: vnc
      protocol: TCP
      name: vnc
  selector:
    {{- include "predator.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: chrome-viewer
