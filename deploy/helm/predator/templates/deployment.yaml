apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "predator.fullname" . }}-graph-service
  labels:
    {{- include "predator.labels" . | nindent 4 }}
    app: graph-service
spec:
  replicas: {{ .Values.graphService.replicaCount }}
  selector:
    matchLabels:
      {{- include "predator.selectorLabels" . | nindent 6 }}
      app: graph-service
  template:
    metadata:
      labels:
        {{- include "predator.selectorLabels" . | nindent 8 }}
        app: graph-service
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      containers:
        - name: graph-service
          image: "{{ .Values.graphService.image.repository }}:{{ .Values.graphService.image.tag }}"
          ports:
            - containerPort: 8002
          env:
            - name: NEO4J_URI
              value: "bolt://{{ .Release.Name }}-neo4j:7687"
            - name: NEO4J_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-neo4j
                  key: neo4j-password
          livenessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            {{- toYaml .Values.graphService.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "predator.fullname" . }}-ingestion-worker
  labels:
    {{- include "predator.labels" . | nindent 4 }}
    app: ingestion-worker
spec:
  # Replicas managed by KEDA if enabled
  {{- if not .Values.ingestionWorker.keda.enabled }}
  replicas: {{ .Values.ingestionWorker.replicaCount | default 1 }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "predator.selectorLabels" . | nindent 6 }}
      app: ingestion-worker
  template:
    metadata:
      labels:
        {{- include "predator.selectorLabels" . | nindent 8 }}
        app: ingestion-worker
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      containers:
        - name: ingestion-worker
          image: "{{ .Values.ingestionWorker.image.repository }}:{{ .Values.ingestionWorker.image.tag }}"
          env:
            {{- range $key, $val := .Values.ingestionWorker.env }}
            - name: {{ $key }}
              value: {{ tpl ($val | toString) $ | quote }}
            {{- end }}
          livenessProbe:
            {{- toYaml .Values.ingestionWorker.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.ingestionWorker.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.ingestionWorker.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "predator.fullname" . }}-frontend
  labels:
    {{- include "predator.labels" . | nindent 4 }}
    app: frontend
spec:
  {{- if not .Values.frontend.autoscaling.enabled }}
  replicas: {{ .Values.frontend.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "predator.selectorLabels" . | nindent 6 }}
      app: frontend
  template:
    metadata:
      labels:
        {{- include "predator.selectorLabels" . | nindent 8 }}
        app: frontend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
        - name: frontend
          image: "{{ .Values.frontend.image.repository }}:{{ .Values.frontend.image.tag }}"
          imagePullPolicy: {{ .Values.frontend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3030
              protocol: TCP
          env:
            {{- range $key, $val := .Values.frontend.env }}
            - name: {{ $key }}
              value: {{ tpl ($val | toString) $ | quote }}
            {{- end }}
            - name: API_UPSTREAM
              value: "http://{{ include "predator.fullname" . }}-core-api:{{ .Values.coreApi.service.port }}"
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 2
          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
      volumes:
        {{- if .Values.frontend.persistence.enabled }}
        - name: nginx-cache
          persistentVolumeClaim:
            claimName: {{ include "predator.fullname" . }}-frontend-cache
        {{- else }}
        - name: nginx-cache
          emptyDir: {}
        {{- end }}
        - name: nginx-run
          emptyDir: {}
