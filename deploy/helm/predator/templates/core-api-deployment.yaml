apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "predator.fullname" . }}-core-api
spec:
  replicas: {{ .Values.coreApi.replicaCount }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: core-api
  template:
    metadata:
      labels:
        app: core-api
    spec:
      priorityClassName: {{ include "predator.priorityClassName" (list $ "predator-critical") }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      containers:
        - name: core-api
          image: "{{ .Values.coreApi.image.repository }}:{{ .Values.coreApi.image.tag }}"
          imagePullPolicy: {{ .Values.coreApi.image.pullPolicy | default .Values.global.imagePullPolicy }}
          ports:
            - containerPort: 8000
          livenessProbe:
            {{- toYaml .Values.coreApi.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.coreApi.readinessProbe | nindent 12 }}
          {{- if .Values.coreApi.startupProbe }}
          startupProbe:
            {{- toYaml .Values.coreApi.startupProbe | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.coreApi.resources | nindent 12 }}
          env:
            {{- range $key, $val := .Values.coreApi.env }}
            - name: {{ $key }}
              value: {{ tpl ($val | toString) $ | quote }}
            {{- end }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
