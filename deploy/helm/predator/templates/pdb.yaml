{{- define "predator.pdb" -}}
{{- $name := index . 0 -}}
{{- $enabled := index . 1 -}}
{{- $fullname := index . 2 -}}
{{- $labels := index . 3 -}}
{{- if $enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ $fullname }}-{{ $name }}
  labels:
    {{- $labels | nindent 4 }}
    app: {{ $name }}
spec:
  minAvailable: 1
  selector:
    matchLabels:
      {{- $labels | nindent 6 }}
      app: {{ $name }}
{{- end }}
{{- end }}

{{ include "predator.pdb" (list "frontend" .Values.frontend.enabled (include "predator.fullname" .) (include "predator.labels" .)) }}
---
{{ include "predator.pdb" (list "core-api" .Values.coreApi.enabled (include "predator.fullname" .) (include "predator.labels" .)) }}
---
{{ include "predator.pdb" (list "graph-service" .Values.graphService.enabled (include "predator.fullname" .) (include "predator.labels" .)) }}
---
{{ include "predator.pdb" (list "ingestion-worker" .Values.ingestionWorker.enabled (include "predator.fullname" .) (include "predator.labels" .)) }}
---
{{ include "predator.pdb" (list "osint-service" .Values.osintService.enabled (include "predator.fullname" .) (include "predator.labels" .)) }}
