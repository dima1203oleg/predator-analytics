apiVersion: v1
kind: Service
metadata:
  name: {{ include "predator.fullname" . }}-analytics-hub-ui
  labels:
    {{- include "predator.labels" . | nindent 4 }}
    app.kubernetes.io/component: analytics-hub-ui
spec:
  type: {{ .Values.analyticsHubUi.service.type }}
  ports:
    - port: {{ .Values.analyticsHubUi.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "predator.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: analytics-hub-ui
