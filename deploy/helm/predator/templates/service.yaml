apiVersion: v1
kind: Service
metadata:
  name: {{ include "predator.fullname" . }}-core-api
  labels:
    {{- include "predator.labels" . | nindent 4 }}
    app: core-api
spec:
  type: {{ .Values.coreApi.service.type }}
  ports:
    - port: {{ .Values.coreApi.service.port }}
      targetPort: 8000
      protocol: TCP
      name: http
  selector:
    {{- include "predator.selectorLabels" . | nindent 4 }}
    app: core-api
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "predator.fullname" . }}-graph-service
  labels:
    {{- include "predator.labels" . | nindent 4 }}
    app: graph-service
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.graphService.service.port }}
      targetPort: 8001
      protocol: TCP
      name: http
  selector:
    {{- include "predator.selectorLabels" . | nindent 4 }}
    app: graph-service
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "predator.fullname" . }}-frontend
  labels:
    {{- include "predator.labels" . | nindent 4 }}
    app: frontend
spec:
  type: {{ .Values.frontend.service.type }}
  ports:
    - port: {{ .Values.frontend.service.port }}
      targetPort: {{ .Values.frontend.service.targetPort }}
      protocol: TCP
      name: http
  selector:
    {{- include "predator.selectorLabels" . | nindent 4 }}
    app: frontend
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "predator.fullname" . }}-osint-service
  labels:
    {{- include "predator.labels" . | nindent 4 }}
    app: osint-service
spec:
  type: {{ .Values.osintService.service.type }}
  ports:
    - port: {{ .Values.osintService.service.port }}
      targetPort: 9200
      protocol: TCP
      name: http
  selector:
    {{- include "predator.selectorLabels" . | nindent 4 }}
    app: osint-service
