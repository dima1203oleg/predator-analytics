{{- if .Values.healthAggregator.enabled }}
# Health Aggregator: єдина точка перевірки здоров'я всіх PREDATOR сервісів
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "predator.fullname" . }}-health-aggregator
  labels:
    {{- include "predator.labels" . | nindent 4 }}
    app: health-aggregator
data:
  health-check.sh: |
    #!/bin/sh
    set -e
    STATUS="healthy"
    FAILURES=""

    check_service() {
      local name=$1
      local url=$2
      local timeout=5

      if wget -q -O /dev/null --timeout=$timeout "$url" 2>/dev/null; then
        echo "✅ $name: UP"
      else
        echo "❌ $name: DOWN ($url)"
        STATUS="degraded"
        FAILURES="$FAILURES $name"
      fi
    }

    echo "=== PREDATOR Health Check ==="
    echo ""

    # Сервіси
    check_service "core-api" "http://{{ include "predator.fullname" . }}-core-api:8000/health"
    check_service "graph-service" "http://{{ include "predator.fullname" . }}-graph-service:8001/health"
    check_service "osint-service" "http://{{ include "predator.fullname" . }}-osint-service:9200/health"
    check_service "frontend" "http://{{ include "predator.fullname" . }}-frontend:80/"
    check_service "litellm" "http://{{ include "predator.fullname" . }}-litellm:4000/health"

    # Бази даних
    check_service "postgresql" "http://{{ include "predator.fullname" . }}-postgresql:5432/"
    check_service "redis" "http://{{ include "predator.fullname" . }}-redis-master:6379/"
    check_service "opensearch" "http://{{ include "predator.fullname" . }}-opensearch:9200/"
    check_service "kafka" "http://{{ include "predator.fullname" . }}-kafka:9092/"

    echo ""
    if [ "$STATUS" = "healthy" ]; then
      echo "=== Загальний статус: ✅ HEALTHY ==="
      exit 0
    else
      echo "=== Загальний статус: ⚠️ DEGRADED ==="
      echo "Неробочі сервіси:$FAILURES"
      exit 1
    fi
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "predator.fullname" . }}-health
  labels:
    {{- include "predator.labels" . | nindent 4 }}
    app: health-aggregator
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"
spec:
  type: ClusterIP
  ports:
    - name: health
      port: 8080
      targetPort: 8080
      protocol: TCP
  selector:
    {{- include "predator.selectorLabels" . | nindent 4 }}
    app: health-aggregator
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "predator.fullname" . }}-health-aggregator
  labels:
    {{- include "predator.labels" . | nindent 4 }}
    app: health-aggregator
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "predator.selectorLabels" . | nindent 6 }}
      app: health-aggregator
  template:
    metadata:
      labels:
        {{- include "predator.selectorLabels" . | nindent 8 }}
        app: health-aggregator
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
    spec:
      priorityClassName: {{ include "predator.priorityClassName" (list $ "predator-low") }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      serviceAccountName: {{ include "predator.fullname" . }}-core-api
      containers:
        - name: health-aggregator
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - |
              while true; do
                /scripts/health-check.sh > /tmp/health-result.txt 2>&1
                EXIT_CODE=$?
                if [ $EXIT_CODE -eq 0 ]; then
                  echo -ne "HTTP/1.1 200 OK\r\nContent-Type: text/plain\r\n\r\n" > /tmp/health-response.txt
                else
                  echo -ne "HTTP/1.1 503 Service Unavailable\r\nContent-Type: text/plain\r\n\r\n" > /tmp/health-response.txt
                fi
                cat /tmp/health-result.txt >> /tmp/health-response.txt
                sleep 10
              done &
              # Простой HTTP server
              while true; do
                cat /tmp/health-response.txt | nc -l -p 8080 -q 0 > /dev/null 2>&1
              done
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: scripts
              mountPath: /scripts
          resources:
            limits:
              cpu: 100m
              memory: 64Mi
            requests:
              cpu: 20m
              memory: 32Mi
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: scripts
          configMap:
            name: {{ include "predator.fullname" . }}-health-aggregator
            defaultMode: 0755
{{- end }}
