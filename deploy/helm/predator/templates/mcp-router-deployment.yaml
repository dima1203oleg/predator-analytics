{{- if .Values.mcpRouter.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "predator.mcpRouter.fullname" . }}
  labels:
    {{- include "predator.labels" . | nindent 4 }}
    app: mcp-router
spec:
  replicas: {{ .Values.mcpRouter.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "predator.mcpRouter.name" . }}
  template:
    metadata:
      labels:
        {{- include "predator.labels" . | nindent 8 }}
    spec:
      containers:
        - name: mcp-router
          image: {{ .Values.mcpRouter.image.repository }}:{{ .Values.mcpRouter.image.tag }}
          imagePullPolicy: {{ .Values.mcpRouter.image.pullPolicy | default "IfNotPresent" }}
          ports:
            - containerPort: {{ .Values.mcpRouter.service.port }}
          env:
            - name: MCP_ROUTER_URL
              value: "{{ .Values.mcpRouter.url }}"
          resources:
            {{- toYaml .Values.mcpRouter.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.mcpRouter.service.port }}
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.mcpRouter.service.port }}
            initialDelaySeconds: 5
            periodSeconds: 5
{{- end }}
