{{- if .Values.costOptimization.enabled }}
# KubeCost: видимість витрат per-namespace
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "predator.fullname" . }}-kubecost-config
  labels:
    {{- include "predator.labels" . | nindent 4 }}
    app: kubecost
data:
  kubecost.yaml: |
    prometheus:
      server: "http://{{ include "predator.fullname" . }}-prometheus:9090"
    networkCosts:
      enabled: true
    savings:
      spot: true
      reserved: true
---
# Karpenter: автоматичне масштабування нод (-30% витрат)
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "predator.fullname" . }}-karpenter-config
  labels:
    {{- include "predator.labels" . | nindent 4 }}
    app: karpenter
data:
  karpenter.yaml: |
    apiVersion: karpenter.sh/v1beta1
    kind: NodePool
    metadata:
      name: predator-default
    spec:
      template:
        spec:
          requirements:
            - key: kubernetes.io/arch
              operator: In
              values: ["amd64"]
            - key: kubernetes.io/os
              operator: In
              values: ["linux"]
            - key: karpenter.sh/capacity-type
              operator: In
              values: ["on-demand", "spot"]
          nodeClassRef:
            name: predator-default
      limits:
        cpu: 100
        memory: 400Gi
      disruption:
        consolidationPolicy: WhenUnderutilized
        consolidateAfter: 30m
---
# VPA (Vertical Pod Autoscaler) в recommend mode
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "predator.fullname" . }}-vpa-config
  labels:
    {{- include "predator.labels" . | nindent 4 }}
    app: vpa
data:
  vpa-core-api.yaml: |
    apiVersion: autoscaling.k8s.io/v1
    kind: VerticalPodAutoscaler
    metadata:
      name: {{ include "predator.fullname" . }}-core-api-vpa
    spec:
      targetRef:
        apiVersion: apps/v1
        kind: Deployment
        name: {{ include "predator.fullname" . }}-core-api
      updatePolicy:
        updateMode: "Off"
      resourcePolicy:
        containerPolicies:
          - containerName: core-api
            minAllowed:
              cpu: 100m
              memory: 128Mi
            maxAllowed:
              cpu: 2000m
              memory: 4Gi
{{- end }}
