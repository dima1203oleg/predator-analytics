{{- define "predator.hpa" -}}
{{- $name := index . 0 -}}
{{- $values := index . 1 -}}
{{- $fullname := index . 2 -}}
{{- $labels := index . 3 -}}
{{- if $values.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ $fullname }}-{{ $name }}
  labels:
    {{- $labels | nindent 4 }}
    app: {{ $name }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ $fullname }}-{{ $name }}
  minReplicas: {{ $values.autoscaling.minReplicas }}
  maxReplicas: {{ $values.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ $values.autoscaling.targetCPUUtilizationPercentage }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
        - type: Pods
          value: 2
          periodSeconds: 30
      selectPolicy: Max
{{- end }}
{{- end }}

{{ include "predator.hpa" (list "frontend" .Values.frontend (include "predator.fullname" .) (include "predator.labels" .)) }}
---
{{ include "predator.hpa" (list "core-api" .Values.coreApi (include "predator.fullname" .) (include "predator.labels" .)) }}
---
{{ include "predator.hpa" (list "ingestion-worker" .Values.ingestionWorker (include "predator.fullname" .) (include "predator.labels" .)) }}
