{{- if .Values.performance.enabled }}
# Traefik Middleware: HTTP/3 + Brotli + Security Headers
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ include "predator.fullname" . }}-performance-headers
  labels:
    {{- include "predator.labels" . | nindent 4 }}
spec:
  headers:
    customResponseHeaders:
      # Security
      X-Content-Type-Options: "nosniff"
      X-Frame-Options: "DENY"
      X-XSS-Protection: "1; mode=block"
      Referrer-Policy: "strict-origin-when-cross-origin"
      Permissions-Policy: "camera=(), microphone=(), geolocation=()"
      # Performance
      Cache-Control: "public, max-age=31536000, immutable"
    customRequestHeaders:
      X-Forwarded-Proto: "https"
  compress:
    excludedContentTypes:
      - text/event-stream
---
# Traefik IngressRoute: HTTP/3 (QUIC) + TLS 1.3
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ include "predator.fullname" . }}-secure
  labels:
    {{- include "predator.labels" . | nindent 4 }}
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`{{ .Values.global.domain }}`)
      middlewares:
        - name: {{ include "predator.fullname" . }}-performance-headers
      services:
        - name: {{ include "predator.fullname" . }}-frontend
          port: 80
  tls:
    secretName: {{ .Values.ingress.tls.secretName | default (printf "%s-tls" (include "predator.fullname" .)) }}
    options:
      name: {{ include "predator.fullname" . }}-tls-options
---
# TLS Options: TLS 1.3 + modern ciphers
apiVersion: traefik.io/v1alpha1
kind: TLSOption
metadata:
  name: {{ include "predator.fullname" . }}-tls-options
  labels:
    {{- include "predator.labels" . | nindent 4 }}
spec:
  minVersion: VersionTLS13
  cipherSuites:
    - TLS_AES_256_GCM_SHA384
    - TLS_CHACHA20_POLY1305_SHA256
  sniStrict: true
---
# Resource Hints ConfigMap (preconnect, dns-prefetch)
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "predator.fullname" . }}-resource-hints
  labels:
    {{- include "predator.labels" . | nindent 4 }}
data:
  index.html: |
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="dns-prefetch" href="https://api.predator.ua">
    <link rel="preload" href="/assets/vendor-react.js" as="script">
    <link rel="preload" href="/assets/vendor-cytoscape.js" as="script">
{{- end }}
