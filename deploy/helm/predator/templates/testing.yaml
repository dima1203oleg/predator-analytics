{{- if .Values.testing.enabled }}
# Locust: load testing конфігурація
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "predator.fullname" . }}-locust-tests
  labels:
    {{- include "predator.labels" . | nindent 4 }}
    app: locust
data:
  locustfile.py: |
    from locust import HttpUser, task, between
    import random

    class PredatorUser(HttpUser):
        wait_time = between(1, 3)

        def on_start(self):
            self.client.get("/health")

        @task(3)
        def search_companies(self):
            queries = ["ТОВ", "експорт", "імпорт", "зерно", "метал"]
            self.client.get(f"/api/v1/companies/search?q={random.choice(queries)}")

        @task(2)
        def get_analytics(self):
            self.client.get("/api/v1/analytics/summary")

        @task(1)
        def assess_risk(self):
            self.client.post("/api/v1/risk/assess", json={
                "declaration_id": f"test-{random.randint(1, 1000)}"
            })

        @task(1)
        def graph_query(self):
            self.client.get("/api/v1/graph/communities?min_size=3")
---
# Chaos Mesh: щотижневі game days
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "predator.fullname" . }}-chaos-experiments
  labels:
    {{- include "predator.labels" . | nindent 4 }}
    app: chaos-mesh
data:
  pod-kill.yaml: |
    apiVersion: chaos-mesh.org/v1alpha1
    kind: PodChaos
    metadata:
      name: predator-pod-kill-weekly
    spec:
      action: pod-kill
      mode: one
      selector:
        namespaces:
          - predator
        labelSelectors:
          app: core-api
      scheduler:
        cron: "0 10 * * 1"
      duration: "30s"

  network-partition.yaml: |
    apiVersion: chaos-mesh.org/v1alpha1
    kind: NetworkChaos
    metadata:
      name: predator-network-partition
    spec:
      action: partition
      mode: all
      selector:
        namespaces:
          - predator
        labelSelectors:
          app: core-api
      direction: to
      target:
        selector:
          namespaces:
            - predator
          labelSelectors:
            app.kubernetes.io/name: postgresql
        mode: all
      scheduler:
        cron: "0 11 * * 3"
      duration: "60s"
---
# Pact: consumer-driven contract testing
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "predator.fullname" . }}-pact-broker
  labels:
    {{- include "predator.labels" . | nindent 4 }}
    app: pact-broker
data:
  pact-config.yaml: |
    pact_broker:
      url: "http://pact-broker:9292"
      consumer_version: "${GIT_COMMIT}"
    contracts:
      - consumer: frontend
        provider: core-api
        interactions:
          - description: "Пошук компаній"
            request:
              method: GET
              path: /api/v1/companies/search
              query: q=ТОВ
            response:
              status: 200
              body:
                type: array
                items:
                  type: object
                  properties:
                    id: { type: string }
                    name: { type: string }
                    risk_score: { type: number }
{{- end }}
