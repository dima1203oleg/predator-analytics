{{- if .Values.security.networkPolicy.enabled }}
# NetworkPolicy: Frontend — приймає від Ingress, ходить до core-api
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "predator.fullname" . }}-frontend-netpol
  labels:
    {{- include "predator.labels" . | nindent 4 }}
    app: frontend
spec:
  podSelector:
    matchLabels:
      {{- include "predator.selectorLabels" . | nindent 6 }}
      app: frontend
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: kube-system
      ports:
        - protocol: TCP
          port: 3030
    - from:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: 3030
  egress:
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
    - to:
        - podSelector:
            matchLabels:
              app: core-api
      ports:
        - protocol: TCP
          port: 8000
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 80
---
# NetworkPolicy: Core API — приймає від frontend/ingestion, ходить до всіх БД
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "predator.fullname" . }}-core-api-netpol
  labels:
    {{- include "predator.labels" . | nindent 4 }}
    app: core-api
spec:
  podSelector:
    matchLabels:
      app: core-api
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: frontend
      ports:
        - protocol: TCP
          port: 8000
    - from:
        - podSelector:
            matchLabels:
              app: ingestion-worker
      ports:
        - protocol: TCP
          port: 8000
    - from:
        - podSelector:
            matchLabels:
              app: osint-service
      ports:
        - protocol: TCP
          port: 8000
  egress:
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
    - to:
        - podSelector:
            matchLabels:
              app: graph-service
      ports:
        - protocol: TCP
          port: 8001
    # PostgreSQL
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: postgresql
      ports:
        - protocol: TCP
          port: 5432
    # Redis
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: redis
      ports:
        - protocol: TCP
          port: 6379
    # OpenSearch
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: opensearch
      ports:
        - protocol: TCP
          port: 9200
    # Kafka
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: kafka
      ports:
        - protocol: TCP
          port: 9092
    # Neo4j
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: neo4j
      ports:
        - protocol: TCP
          port: 7687
    # MinIO
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: minio
      ports:
        - protocol: TCP
          port: 9000
    # LiteLLM
    - to:
        - podSelector:
            matchLabels:
              app: litellm
      ports:
        - protocol: TCP
          port: 4000
---
