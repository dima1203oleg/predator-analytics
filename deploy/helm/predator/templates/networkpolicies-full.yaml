# NetworkPolicy: Ingestion Worker — приймає від Kafka, ходить до БД
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "predator.fullname" . }}-ingestion-worker-netpol
  labels:
    {{- include "predator.labels" . | nindent 4 }}
    app: ingestion-worker
spec:
  podSelector:
    matchLabels:
      {{- include "predator.selectorLabels" . | nindent 6 }}
      app: ingestion-worker
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: core-api
      ports:
        - protocol: TCP
          port: 9100
  egress:
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
    # Kafka
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: kafka
      ports:
        - protocol: TCP
          port: 9092
    # PostgreSQL
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: postgresql
      ports:
        - protocol: TCP
          port: 5432
    # ClickHouse
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: clickhouse
      ports:
        - protocol: TCP
          port: 8123
    # OpenSearch
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: opensearch
      ports:
        - protocol: TCP
          port: 9200
    # MinIO
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: minio
      ports:
        - protocol: TCP
          port: 9000
    # Core API (зворотній зв'язок)
    - to:
        - podSelector:
            matchLabels:
              app: core-api
      ports:
        - protocol: TCP
          port: 8000
---
# NetworkPolicy: OSINT Service — приймає від core-api, ходить до зовнішніх API + БД
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "predator.fullname" . }}-osint-service-netpol
  labels:
    {{- include "predator.labels" . | nindent 4 }}
    app: osint-service
spec:
  podSelector:
    matchLabels:
      {{- include "predator.selectorLabels" . | nindent 6 }}
      app: osint-service
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: core-api
      ports:
        - protocol: TCP
          port: 9200
  egress:
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
    # Зовнішні OSINT API
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 80
    # PostgreSQL
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: postgresql
      ports:
        - protocol: TCP
          port: 5432
    # OpenSearch
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: opensearch
      ports:
        - protocol: TCP
          port: 9200
    # Qdrant
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: qdrant
      ports:
        - protocol: TCP
          port: 6333
    # Core API
    - to:
        - podSelector:
            matchLabels:
              app: core-api
      ports:
        - protocol: TCP
          port: 8000
    # Kafka
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: kafka
      ports:
        - protocol: TCP
          port: 9092
---
# NetworkPolicy: LiteLLM — приймає від core-api, ходить до Ollama + зовнішніх LLM
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "predator.fullname" . }}-litellm-netpol
  labels:
    {{- include "predator.labels" . | nindent 4 }}
    app: litellm
spec:
  podSelector:
    matchLabels:
      app: litellm
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: core-api
      ports:
        - protocol: TCP
          port: 4000
  egress:
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
    # Зовнішні LLM API (Gemini, Groq, Azure)
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 443
    # Ollama (локальний LLM)
    - to:
        - podSelector:
            matchLabels:
              app: ollama
      ports:
        - protocol: TCP
          port: 11434
    # PostgreSQL (моделі/конфіг)
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: postgresql
      ports:
        - protocol: TCP
          port: 5432
---
# NetworkPolicy: Deny-all default — блокує неспецифічний трафік
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "predator.fullname" . }}-deny-all
  labels:
    {{- include "predator.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "predator.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress: []
  egress: []
{{- end }}
