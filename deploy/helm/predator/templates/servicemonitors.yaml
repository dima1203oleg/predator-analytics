{{- if and .Values.monitoring.enabled .Values.monitoring.serviceMonitor.enabled }}
# ServiceMonitor: Core API
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "predator.fullname" . }}-core-api
  labels:
    {{- include "predator.labels" . | nindent 4 }}
    app: core-api
    release: {{ .Values.monitoring.prometheusRelease | default "predator" }}
spec:
  selector:
    matchLabels:
      {{- include "predator.selectorLabels" . | nindent 6 }}
      app: core-api
  endpoints:
    - port: http
      path: /metrics
      interval: {{ .Values.monitoring.serviceMonitor.interval | default "30s" }}
      scrapeTimeout: 10s
      honorLabels: true
---
