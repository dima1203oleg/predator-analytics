{{- if .Values.security.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "predator.fullname" . }}-frontend
  labels:
    {{- include "predator.labels" . | nindent 4 }}
    app: frontend
spec:
  podSelector:
    matchLabels:
      {{- include "predator.selectorLabels" . | nindent 6 }}
      app: frontend
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow from Ingress controller
    - from:
        - namespaceSelector:
            matchLabels:
              name: kube-system
      ports:
        - protocol: TCP
          port: 3030
    # Allow from same namespace
    - from:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: 3030
  egress:
    # Allow DNS
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
    # Allow to core-api
    - to:
        - podSelector:
            matchLabels:
              app: core-api
      ports:
        - protocol: TCP
          port: 8000
    # Allow to external (for CDN, APIs)
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 80
{{- end }}
