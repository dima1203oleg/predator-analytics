apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: {{ include "predator.fullname" . }}-core-api
spec:
  replicas: {{ .Values.coreApi.replicaCount }}
  strategy:
    canary:
      analysis:
        templates:
          - templateName: success-rate
      steps:
        - setWeight: 20
        - pause: {duration: 5m}
        - setWeight: 50
        - pause: {duration: 5m}
  selector:
    matchLabels:
      app: core-api
  template:
    metadata:
      labels:
        app: core-api
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      containers:
        - name: core-api
          image: "{{ .Values.coreApi.image.repository }}:{{ .Values.coreApi.image.tag }}"
          ports:
            - containerPort: 8000
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            {{- toYaml .Values.coreApi.resources | nindent 12 }}
          env:
            - name: DATABASE_URL
              value: "postgresql+asyncpg://predator:{{ .Values.global.postgres.auth.password }}@{{ .Values.global.postgres.host }}:5432/{{ .Values.global.postgres.auth.database }}"
            - name: REDIS_URL
              value: "redis://{{ .Values.global.redis.host }}:6379/0"
            - name: NEO4J_URI
              value: "bolt://{{ .Values.global.neo4j.host }}:7687"
            - name: NEO4J_USER
              value: "neo4j"
            - name: NEO4J_PASSWORD
              value: "{{ .Values.neo4j.neo4j.password }}"
            - name: LITELLM_GATEWAY_URL
              value: {{ tpl .Values.coreApi.env.LITELLM_GATEWAY_URL . | quote }}
            - name: ANTIGRAVITY_ENABLED
              value: {{ tpl .Values.coreApi.env.ANTIGRAVITY_ENABLED . | quote }}
            - name: ANTIGRAVITY_AGENT_MODEL
              value: {{ tpl .Values.coreApi.env.ANTIGRAVITY_AGENT_MODEL . | quote }}
            - name: SECRET_KEY
              value: {{ tpl .Values.coreApi.env.SECRET_KEY . | quote }}
            - name: ENV
              value: {{ tpl .Values.coreApi.env.ENV . | quote }}
            - name: DEBUG
              value: {{ tpl .Values.coreApi.env.DEBUG . | quote }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
