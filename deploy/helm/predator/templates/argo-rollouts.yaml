{{- if .Values.cicd.argoRollouts.enabled }}
# Argo Rollouts: Blue/Green + Canary для Core API
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: {{ include "predator.fullname" . }}-core-api-rollout
  labels:
    {{- include "predator.labels" . | nindent 4 }}
    app: core-api
spec:
  replicas: {{ .Values.coreApi.replicaCount | default 2 }}
  strategy:
    canary:
      steps:
        - setWeight: 10
        - pause: { duration: 60s }
        - setWeight: 30
        - pause: { duration: 120s }
        - setWeight: 50
        - pause: { duration: 120s }
        - setWeight: 100
      analysis:
        templates:
          - templateName: predator-error-rate-check
        startingStep: 2
  selector:
    matchLabels:
      {{- include "predator.selectorLabels" . | nindent 6 }}
      app: core-api
  template:
    metadata:
      labels:
        {{- include "predator.selectorLabels" . | nindent 8 }}
        app: core-api
    spec:
      priorityClassName: {{ include "predator.priorityClassName" (list $ "predator-critical") }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      containers:
        - name: core-api
          image: "{{ .Values.coreApi.image.repository }}:{{ .Values.coreApi.image.tag }}"
          ports:
            - containerPort: 8000
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
---
# AnalysisTemplate: перевірка error rate під час canary
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: predator-error-rate-check
  labels:
    {{- include "predator.labels" . | nindent 4 }}
spec:
  metrics:
    - name: error-rate
      interval: 30s
      count: 5
      successCondition: result < 0.05
      failureLimit: 2
      provider:
        prometheus:
          address: "http://{{ include "predator.fullname" . }}-prometheus:9090"
          query: |
            rate(http_requests_total{job="predator-core-api",code=~"5.."}[5m]) /
            rate(http_requests_total{job="predator-core-api"}[5m])
---
# Cosign: підпис Docker образів (sigstore)
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "predator.fullname" . }}-cosign-policy
  labels:
    {{- include "predator.labels" . | nindent 4 }}
    app: cosign-policy
data:
  policy.yaml: |
    apiVersion: policy.sigstore.dev/v1beta1
    kind: ClusterImagePolicy
    metadata:
      name: predator-image-policy
    spec:
      images:
        - glob: "ghcr.io/dima1203oleg/predator-*"
      authorities:
        - key:
            data: |
              -----BEGIN PUBLIC KEY-----
              MFkwEwYHKoZIzj0CAQYIKoZIzj0DAQcDQgAE...
              -----END PUBLIC KEY-----
          ctlog:
            url: https://rekor.sigstore.dev
---
# Renovate Bot: автоматичне оновлення залежностей
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "predator.fullname" . }}-renovate-config
  labels:
    {{- include "predator.labels" . | nindent 4 }}
    app: renovate-config
data:
  renovate.json: |
    {
      "$schema": "https://docs.renovatebot.com/renovate-schema.json",
      "extends": ["config:recommended"],
      "packageRules": [
        {
          "matchPackagePatterns": ["*"],
          "matchUpdateTypes": ["minor", "patch"],
          "automerge": true,
          "automergeType": "pr"
        },
        {
          "matchPackageNames": ["python"],
          "allowedVersions": "3.12"
        }
      ],
      "labels": ["dependencies", "renovate"],
      "schedule": ["before 6am on Monday"]
    }
{{- end }}
