apiVersion: v2
name: predator
description: PREDATOR Analytics v60.5-ELITE Full Stack Chart
type: application
version: 60.5.0
appVersion: "60.5-ELITE"

dependencies:
  - name: postgresql
    version: 15.5.0
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
  - name: neo4j
    version: 5.21.0
    repository: https://helm.neo4j.com/neo4j
    condition: neo4j.enabled
  - name: clickhouse
    version: 0.1.0
    repository: https://clickhouse.github.io/charts
    condition: clickhouse.enabled
  - name: opensearch
    version: 2.16.0
    repository: https://opensearch-project.github.io/helm-charts
    condition: opensearch.enabled
  - name: qdrant
    version: 0.1.0
    repository: https://qdrant.github.io/helm-charts
    condition: qdrant.enabled

