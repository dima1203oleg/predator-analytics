apiVersion: v2
name: predator
description: PREDATOR Analytics v60.5-ELITE Full Stack Chart
type: application
version: 61.0.0
appVersion: "61.0-ELITE"

dependencies:
  - name: postgresql
    version: 15.5.0
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
  - name: neo4j
    version: 5.21.0
    repository: https://helm.neo4j.com/neo4j
    condition: neo4j.enabled
  - name: clickhouse
    version: 0.1.0
    repository: https://radondb.github.io/clickhouse-cluster-helm/
    condition: clickhouse.enabled
  - name: opensearch
    version: 2.16.0
    repository: https://opensearch-project.github.io/helm-charts
    condition: opensearch.enabled
  - name: qdrant
    version: 0.1.0
    repository: https://qdrant.github.io/qdrant-helm
    condition: qdrant.enabled
  - name: valkey
    version: 6.2.0
    repository: https://charts.bitnami.com/bitnami
    condition: valkey.enabled
  - name: kafka
    version: 29.3.0
    repository: https://charts.bitnami.com/bitnami
    condition: kafka.enabled
  - name: dve
    version: 0.1.0
    repository: file://../dve
    condition: dve.enabled
  - name: keycloak
    version: 21.4.2
    repository: https://charts.bitnami.com/bitnami
    condition: keycloak.enabled

