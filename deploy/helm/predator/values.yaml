# Default values for predator.
# This is a YAML-formatted file.

global:
  domain: internal.predator.ua
  tenantId: default
  imagePullPolicy: IfNotPresent

# Infrastructure
postgresql:
  enabled: true
  global:
    postgresql:
      auth:
        database: predator
        username: predator
        password: predator_db_secret

neo4j:
  enabled: true
  neo4j:
    password: predator_graph_secret
    name: predator-graph
  clusterDomain: cluster.local
  volumes:
    data:
      mode: defaultStorageClass

# Frontend (predator-analytics-ui)
frontend:
  enabled: true
  replicaCount: 2
  image:
    repository: ghcr.io/dima1203oleg/predator-frontend
    tag: v56.5-ELITE
    pullPolicy: IfNotPresent
  service:
    type: LoadBalancer
    port: 80
    targetPort: 3030
  ingress:
    enabled: true
    className: traefik
    annotations:
      cert-manager.io/cluster-issuer: "letsencrypt-prod"
      traefik.ingress.kubernetes.io/router.middlewares: "predator-https-redirect@kubernetescrd"
    hosts:
      - host: "{{ .Values.global.domain }}"
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: predator-tls
        hosts:
          - "{{ .Values.global.domain }}"
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70
  env:
    VITE_API_URL: "https://api.{{ .Values.global.domain }}/api/v1"
    NODE_ENV: "production"
  persistence:
    enabled: false
    size: 1Gi
    storageClass: local-path

# Core API Service
coreApi:
  replicaCount: 2
  image:
    repository: ghcr.io/dima1203oleg/predator-core-api
    tag: v56.5-ELITE
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8000
  resources:
    limits:
      cpu: 1000m
      memory: 1Gi
    requests:
      cpu: 250m
      memory: 256Mi
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 4
    targetCPUUtilizationPercentage: 70
  env:
    ENV: "production"
    DATABASE_URL: "postgresql+asyncpg://predator:{{ .Values.postgresql.global.postgresql.auth.password }}@{{ .Values.global.postgres.host }}:5432/{{ .Values.global.postgresql.auth.database }}"
    REDIS_URL: "redis://{{ .Values.global.redis.host }}:6379/0"
    NEO4J_URI: "bolt://{{ .Values.global.neo4j.host }}:7687"
    NEO4J_USER: "neo4j"
    NEO4J_PASSWORD: "{{ .Values.neo4j.neo4j.password }}"
    OPENSEARCH_URL: "http://{{ .Values.global.opensearch.host }}:9200"
    QDRANT_URL: "http://{{ .Values.global.qdrant.host }}:6333"
    KAFKA_BOOTSTRAP_SERVERS: "predator-v55-redpanda:9092"
    LITELLM_GATEWAY_URL: "http://{{ include \"predator.fullname\" . }}-litellm:4000"
    ANTIGRAVITY_ENABLED: "true"
    ANTIGRAVITY_AGENT_MODEL: "qwen3:8b"
    SECRET_KEY: "{{ .Values.global.secretKey | default \"changeme-production-secret-key-32-chars\" }}"
    YOUCONTROL_API_KEY: "{{ .Values.global.osint.youcontrolApiKey | default \"mock\" }}"
    DEBUG: "false"
  livenessProbe:
    httpGet:
      path: /health
      port: 8000
    initialDelaySeconds: 30
    periodSeconds: 10
  readinessProbe:
    httpGet:
      path: /ready
      port: 8000
    initialDelaySeconds: 5
    periodSeconds: 5

# Graph Service
graphService:
  replicaCount: 1
  image:
    repository: ghcr.io/dima1203oleg/predator-graph-service
    tag: v55.0.0
  service:
    type: ClusterIP
    port: 8002
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi
  env:
    NEO4J_URI: "bolt://{{ .Values.global.neo4j.host }}:7687"
    NEO4J_USER: "neo4j"
    NEO4J_PASSWORD: "{{ .Values.neo4j.neo4j.password }}"
    DEBUG: "false"
  livenessProbe:
    httpGet:
      path: /health
      port: 8002
    initialDelaySeconds: 15
    periodSeconds: 10
  readinessProbe:
    httpGet:
      path: /ready
      port: 8002
    initialDelaySeconds: 5
    periodSeconds: 5

# Ingestion Worker
ingestionWorker:
  replicaCount: 2
  image:
    repository: ghcr.io/dima1203oleg/predator-ingestion-worker
    tag: v56.5-ELITE
    pullPolicy: IfNotPresent
  resources:
    limits:
      cpu: 750m
      memory: 768Mi
    requests:
      cpu: 200m
      memory: 256Mi
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 4
    targetCPUUtilizationPercentage: 70
  env:
    KAFKA_BOOTSTRAP_SERVERS: "predator-v55-redpanda:9092"
    DATABASE_URL: "postgresql+asyncpg://predator:{{ .Values.postgresql.global.postgresql.auth.password }}@{{ .Values.global.postgres.host }}:5432/{{ .Values.global.postgresql.auth.database }}"
    OPENSEARCH_URL: "http://{{ .Values.global.opensearch.host }}:9200"
    QDRANT_URL: "http://{{ .Values.global.qdrant.host }}:6333"
    MINIO_ENDPOINT: "predator-v55-minio:9000"
    MINIO_ACCESS_KEY: "{{ .Values.global.minio.accessKey | default \"minioadmin\" }}"
    MINIO_SECRET_KEY: "{{ .Values.global.minio.secretKey | default \"minioadmin\" }}"
    YOUCONTROL_API_KEY: "{{ .Values.global.osint.youcontrolApiKey | default \"mock\" }}"
    DEBUG: "false"
  livenessProbe:
    exec:
      command:
        - /bin/sh
        - -c
        - "ps aux | grep '[p]ython' || exit 1"
    initialDelaySeconds: 30
    periodSeconds: 10
  readinessProbe:
    exec:
      command:
        - /bin/sh
        - -c
        - "python -c 'import kafka; print(\"ok\")' || exit 1"
    initialDelaySeconds: 10
    periodSeconds: 10
  keda:
    enabled: false

# Security
security:
  mTLS:
    enabled: false
  networkPolicy:
    enabled: true
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    fsGroup: 2000
  containerSecurityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL

# Monitoring
monitoring:
  enabled: true
  serviceMonitor:
    enabled: true
    interval: 30s
    path: /metrics
  prometheusRule:
    enabled: true
    groups:
      - name: predator.rules
        rules:
          - alert: PredatorDown
            expr: up{job="predator"} == 0
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "PREDATOR service is down"
              description: "PREDATOR {{ $labels.service }} has been down for more than 5 minutes."

# Global defaults
global:
  postgres:
    host: predator-postgresql
    port: 5432
    auth:
      database: predator
      username: predator
      password: predator_db_secret
  redis:
    host: predator-redis-master
    port: 6379
  neo4j:
    host: predator-neo4j
    port: 7687
  opensearch:
    host: opensearch-cluster-master
    port: 9200
  qdrant:
    host: predator-qdrant
    port: 6333
  minio:
    accessKey: minioadmin
    secretKey: minioadmin
  secretKey: changeme-production-secret-key-32-chars
  osint:
    youcontrolApiKey: "YOUR_PRO_API_KEY_HERE"

# Additional Monitoring
monitoring:
  prometheus:
    enabled: true
  grafana:
    enabled: true

# AI AGI Stack (Antigravity Core)
litellm:
  enabled: true
  replicaCount: 1
  image:
    repository: ghcr.io/berriai/litellm
    tag: main-stable
  service:
    type: ClusterIP
    port: 4000
  resources:
    limits:
      cpu: 1000m
      memory: 1Gi
    requests:
      cpu: 500m
      memory: 512Mi
  config:
    path: "/app/config.yaml"
    content: |
      model_list:
        - model_name: qwen3:8b
          litellm_params:
            model: ollama/qwen3:8b
            api_base: "http://{{ .Release.Name }}-ollama:11434"
        - model_name: deepseek-r1:7b
          litellm_params:
            model: ollama/deepseek-r1:7b
            api_base: "http://{{ .Release.Name }}-ollama:11434"

ollama:
  enabled: true
  image:
    repository: ollama/ollama
    tag: latest
  service:
    type: ClusterIP
    port: 11434
  resources:
    limits:
      nvidia.com/gpu: 1
      memory: 8Gi
    requests:
      nvidia.com/gpu: 1
      memory: 4Gi
  persistence:
    enabled: true
    size: 50Gi
    storageClass: local-path
  models:
    - qwen3:8b
    - deepseek-r1:7b
    - gemma3:4b
