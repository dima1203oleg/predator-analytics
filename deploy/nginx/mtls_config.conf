# mTLS Configuration Template for Predator Analytics v56.5-ELITE
# TZ v5.0 §15.5

# Цей конфігураційний файл призначений для Kong або Nginx Ingress
# для забезпечення взаємної автентифікації між сервісами.

server {
    listen 443 ssl;
    server_name predator-core-api.internal;

    # Сертифікат сервера
    ssl_certificate /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;

    # mTLS: Перевірка клієнтського сертифіката
    ssl_client_certificate /etc/nginx/certs/ca.crt;
    ssl_verify_client on; # Обов'язкова перевірка
    ssl_verify_depth 2;

    location / {
        # Передача інформації про клієнтський сертифікат у заголовках
        proxy_set_header X-Client-Verify $ssl_client_verify;
        proxy_set_header X-Client-DN $ssl_client_s_dn;
        
        proxy_pass http://core-api:8000;
    }

    # Посилення SSL/TLS
    ssl_protocols TLSv1.3;
    ssl_prefer_server_ciphers off;
}
