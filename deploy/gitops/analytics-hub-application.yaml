apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: predator-analytics-hub
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/dima1203oleg/predator-analytics.git'
    path: deploy/helm/predator
    targetRevision: HEAD
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: predator
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
