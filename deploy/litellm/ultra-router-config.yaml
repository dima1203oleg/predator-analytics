# ================================================================
# Загальні налаштування LiteLLM (Без БД)
# ================================================================
general_settings:
  master_key: ${LITELLM_MASTER_KEY}
  database_url: null
  store_model_in_db: false

litellm_settings:
  routing_strategy: "least-busy"
  num_retries: 5
  request_timeout: 45
  fallbacks_verbose: false
  
  # ВИМКНЕНО БАЗУ ДАНИХ ТА ЛОГУВАННЯ (Fixing 400 error)
  success_callback: []
  failure_callback: []
  metadata_callback: []
  
  fallbacks:
    - {"ultra-router-coding": ["ultra-router-fast"]}
    - {"ultra-router-fast": ["ultra-router-coding"]}
    - {"ultra-router-reasoning": ["ultra-router-coding"]}
    - {"ultra-router-chat": ["ultra-router-fast"]}
    - {"ultra-router-elite": ["ultra-router-reasoning"]}

router_settings:
  routing_strategy: "least-busy"
  num_retries: 5
  timeout: 120
  retry_after: 3
  cooldown_time: 1
