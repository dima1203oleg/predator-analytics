# ================================================================
# Nginx — Безпечний проксі для Ultra-Router v5.0
# Rate limiting + захист від зловживань
# ================================================================

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" rt=$request_time';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    client_max_body_size 50M;
    server_tokens off;

    # Стиснення відповідей
    gzip on;
    gzip_types application/json text/plain;
    gzip_min_length 1000;

    # Rate limiting — захист від зловживань
    # 60 запитів/хвилину на IP
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=60r/m;
    limit_req_status 429;

    # ─────────────────────────────────────────────────────────────
    # HTTP → HTTPS редирект
    # ─────────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ─────────────────────────────────────────────────────────────
    # HTTPS — основний проксі до LiteLLM
    # ─────────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name _;

        # SSL сертифікати (self-signed або Let's Encrypt)
        ssl_certificate     /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # Заголовки безпеки
        add_header X-Content-Type-Options nosniff;
        add_header X-Frame-Options DENY;
        add_header X-XSS-Protection "1; mode=block";
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # ── API Proxy (з rate limiting) ──────────────────────────
        location /v1/ {
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass http://ultra-router:4000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            # Таймаути для стрімінгу (SSE/streaming responses)
            proxy_read_timeout 120s;
            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;

            # Стрімінг
            proxy_buffering off;
            proxy_cache off;
        }

        # ── Health check (без авторизації) ──────────────────────
        location /health {
            proxy_pass http://ultra-router:4000/health;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            access_log off;
        }

        # ── Моделі (з rate limiting) ─────────────────────────────
        location /models {
            limit_req zone=api_limit burst=10 nodelay;
            proxy_pass http://ultra-router:4000/models;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # Блокуємо всі інші шляхи
        location / {
            return 404;
        }
    }

    # ─────────────────────────────────────────────────────────────
    # HTTP fallback (якщо SSL не налаштовано) — тільки локально
    # ─────────────────────────────────────────────────────────────
    server {
        listen 4001;
        server_name localhost 127.0.0.1 194.177.1.240;

        location / {
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass http://ultra-router:4000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 120s;
            proxy_buffering off;
            proxy_cache off;
        }
    }
}
