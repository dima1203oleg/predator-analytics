services:
  ultra-router:
    image: ghcr.io/berriai/litellm:main-stable
    container_name: ultra-router-v5.0
    env_file:
      - .env.ultra-router-optimized
    ports:
      - "4000:4000"
    environment:
      LOG_LEVEL: "INFO"
    command: ["--config", "/app/config.yaml", "--port", "4000", "--detailed_debug"]
    volumes:
      - ./config-antigravity-optimized.yaml:/app/config.yaml:ro
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s
