services:
  ultra-router:
    image: ghcr.io/berriai/litellm:main-stable
    container_name: ultra-router-v5.0
    env_file:
      - .env.ultra-router
    ports:
      - "4000:4000"
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-sk-antigravity-master-2026}
      MISTRAL_API_KEY_1: ${MISTRAL_API_KEY_1}
      MISTRAL_API_KEY_2: ${MISTRAL_API_KEY_2}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GROQ_API_KEY_1: ${GROQ_API_KEY_1}
      GROQ_API_KEY_2: ${GROQ_API_KEY_2}
      LOG_LEVEL: "INFO"
    command: ["--config", "/app/config.yaml", "--port", "4000", "--detailed_debug"]
    volumes:
      - ./config-antigravity.yaml:/app/config.yaml:ro
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s
