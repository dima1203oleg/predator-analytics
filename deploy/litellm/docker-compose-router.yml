version: '3.9'

services:
  # ═══════════════════════════════════════════════════════════════
  # 🚀 ULTRA-ROUTER v55.3 — LiteLLM Proxy (STATELESS)
  # ═══════════════════════════════════════════════════════════════
  ultra-router:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ultra-router-v55.3
    ports:
      - "4000:4000"
    environment:
      # 🚀 GROQ API KEYS (10 шт)
      GROQ_API_KEY_1: "${GROQ_API_KEY_1:-gsk_test_1}"
      GROQ_API_KEY_2: "${GROQ_API_KEY_2:-gsk_test_2}"
      GROQ_API_KEY_3: "${GROQ_API_KEY_3:-gsk_test_3}"
      GROQ_API_KEY_4: "${GROQ_API_KEY_4:-gsk_test_4}"
      GROQ_API_KEY_5: "${GROQ_API_KEY_5:-gsk_test_5}"
      
      # 📚 HUGGINGFACE
      HF_API_KEY: "${HF_API_KEY:-hf_test_key}"
      
      # 🤝 TOGETHER AI
      TOGETHER_API_KEY: "${TOGETHER_API_KEY:-together_test_key}"
      
      # 🖥️ OLLAMA
      OLLAMA_API_URL: "http://194.177.1.240:11434"
      
      # 📊 LOGGING
      LOG_LEVEL: "INFO"
      PYTHONUNBUFFERED: "1"
    
    volumes:
      - ./logs:/app/logs
      - ./config-stateless.yaml:/app/config.yaml:ro
    
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    
    networks:
      - predator-network
    
    # Resource limits (PREDATOR規則 HR-08)
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G
    
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  predator-network:
    driver: bridge
