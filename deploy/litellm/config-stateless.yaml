model_list:
  # 🚀 GROQ (ОСНОВНА) — 10 ключів
  - model_name: "groq-fast"
    litellm_params:
      model: "groq/llama-3.3-70b-versatile"
      api_key: "gsk_test_1"
      timeout: 30
      temperature: 0.7
      max_tokens: 2048

  - model_name: "groq-fast-2"
    litellm_params:
      model: "groq/llama-3.3-70b-versatile"
      api_key: "gsk_test_2"
      timeout: 30

  - model_name: "groq-fast-3"
    litellm_params:
      model: "groq/llama-3.3-70b-versatile"
      api_key: "gsk_test_3"
      timeout: 30

  - model_name: "groq-fast-4"
    litellm_params:
      model: "groq/llama-3.3-70b-versatile"
      api_key: "gsk_test_4"
      timeout: 30

  - model_name: "groq-fast-5"
    litellm_params:
      model: "groq/llama-3.3-70b-versatile"
      api_key: "gsk_test_5"
      timeout: 30

  # 📚 HUGGINGFACE (резерв)
  - model_name: "hf-llama2"
