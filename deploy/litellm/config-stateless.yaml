  # 🖥️ OLLAMA (локально)
  - model_name: "ollama-llama2"
    litellm_params:
      model: "ollama/llama2"
      api_base: "http://194.177.1.240:11434"
      timeout: 120
      temperature: 0.7

# ═══════════════════════════════════════════════════════════════
# ROUTER (маршрутизація)
# ═══════════════════════════════════════════════════════════════

router_settings:
  enable_model_routing: true
  track_cost_per_token: false  # ❌ БЕЗ ПІДКЛЮЧЕННЯ ДО БД
  track_all_requests: false    # ❌ БЕЗ ПІДКЛЮЧЕННЯ ДО БД
  enable_rotation: true
  rotation_strategy: "round_robin"

# ═══════════════════════════════════════════════════════════════
# ЛОГУВАННЯ (в файл, без БД)
# ═══════════════════════════════════════════════════════════════

logging_config:
  version: 1
  disable_existing_loggers: false
  formatters:
    standard:
      format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  handlers:
    file:
      class: logging.handlers.RotatingFileHandler
      level: INFO
      formatter: standard
      filename: /var/log/litellm/router.log
      maxBytes: 10485760
      backupCount: 5
    console:
      class: logging.StreamHandler
      level: INFO
      formatter: standard
  root:
    level: INFO
    handlers:
      - file
      - console
