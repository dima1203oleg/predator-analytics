# ================================================================
# Ultra-Router для PREDATOR Analytics v61.0-ELITE
# Оновлено: 2026-04-27 — Gemini 2.5 Flash (Free Tier)
# ================================================================
# Провайдери: Gemini (ОСНОВНИЙ), DeepSeek, Groq, Mistral
# Стратегія: least-busy з fallback між групами
# ================================================================

model_list:
  # ==============================================================
  # CODING — Кодинг-спеціалізовані моделі
  # ==============================================================
  - model_name: ultra-router-coding
    litellm_params:
      model: gemini/gemini-2.5-flash
      api_key: ${GEMINI_API_KEY}
  - model_name: ultra-router-coding
    litellm_params:
      model: gemini/gemini-2.5-flash
      api_key: ${GEMINI_API_KEY_2}
  - model_name: ultra-router-coding
    litellm_params:
      model: gemini/gemini-2.5-flash
      api_key: ${GEMINI_API_KEY_3}

  - model_name: ultra-router-coding
    litellm_params:
      model: mistral/codestral-latest
      api_key: ${MISTRAL_API_KEY}
      api_base: https://api.mistral.ai/v1
  - model_name: ultra-router-coding
    litellm_params:
      model: deepseek/deepseek-coder
      api_key: ${DEEPSEEK_API_KEY}
      api_base: https://api.deepseek.com/v1

  # ==============================================================
  # FAST — Швидкі відповіді, низька латентність
  # ==============================================================
  - model_name: ultra-router-fast
    litellm_params:
      model: gemini/gemini-2.5-flash
      api_key: ${GEMINI_API_KEY}
  - model_name: ultra-router-fast
    litellm_params:
      model: gemini/gemini-2.5-flash
      api_key: ${GEMINI_API_KEY_2}
  - model_name: ultra-router-fast
    litellm_params:
      model: gemini/gemini-2.5-flash
      api_key: ${GEMINI_API_KEY_3}

  - model_name: ultra-router-fast
    litellm_params:
      model: groq/llama-3.3-70b-versatile
      api_key: ${GROQ_API_KEY}
  - model_name: ultra-router-fast
    litellm_params:
      model: groq/llama-3.3-70b-versatile
      api_key: ${GROQ_API_KEY_2}
  - model_name: ultra-router-fast
    litellm_params:
      model: groq/llama-3.3-70b-versatile
      api_key: ${GROQ_API_KEY_3}

  # ==============================================================
  # REASONING — Глибокий аналіз та міркування
  # ==============================================================
  - model_name: ultra-router-reasoning
    litellm_params:
      model: gemini/gemini-2.5-flash
      api_key: ${GEMINI_API_KEY}
  - model_name: ultra-router-reasoning
    litellm_params:
      model: gemini/gemini-2.5-flash
      api_key: ${GEMINI_API_KEY_2}
  - model_name: ultra-router-reasoning
    litellm_params:
      model: together_ai/Qwen/Qwen2.5-72B-Instruct-Turbo
      api_key: ${TOGETHER_API_KEY}
      api_base: https://api.together.xyz/v1

  # ==============================================================
  # CHAT — Загальний чат / AI Copilot
  # ==============================================================
  - model_name: ultra-router-chat
    litellm_params:
      model: gemini/gemini-2.5-flash
      api_key: ${GEMINI_API_KEY}
  - model_name: ultra-router-chat
    litellm_params:
      model: gemini/gemini-2.5-flash
      api_key: ${GEMINI_API_KEY_2}
  - model_name: ultra-router-chat
    litellm_params:
      model: gemini/gemini-2.5-flash
      api_key: ${GEMINI_API_KEY_3}

  # ==============================================================
  # EMBEDDING — Векторні ембедінги для Qdrant
  # ==============================================================
  - model_name: ultra-router-embedding
    litellm_params:
      model: gemini/text-embedding-004
      api_key: ${GEMINI_API_KEY}

# ================================================================
# Загальні налаштування LiteLLM (Без БД)
# ================================================================
general_settings:
  master_key: ${LITELLM_MASTER_KEY}
  database_url: null
  store_model_in_db: false

litellm_settings:
  routing_strategy: "least-busy"
  num_retries: 5
  request_timeout: 45
  fallbacks_verbose: false

  # ВИМКНЕНО БАЗУ ДАНИХ ТА ЛОГУВАННЯ
  success_callback: []
  failure_callback: []
  metadata_callback: []

  fallbacks:
    - {"ultra-router-coding": ["ultra-router-fast"]}
    - {"ultra-router-fast": ["ultra-router-coding"]}
    - {"ultra-router-reasoning": ["ultra-router-coding"]}
    - {"ultra-router-chat": ["ultra-router-fast"]}

router_settings:
  routing_strategy: "least-busy"
  num_retries: 5
  timeout: 120
  retry_after: 3
  cooldown_time: 1
