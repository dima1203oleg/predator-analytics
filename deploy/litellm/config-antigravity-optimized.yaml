# ================================================================
# Ultra-Router v5.0 OPTIMIZED — Antigravity / Cline
# 4 основні моделі (FAST, CHAT, CODING, AUTO)
# + OLLAMA FALLBACK на NVIDIA сервері
# ================================================================

model_list:
  # 🟢 CHAT — Gemini Flash (простий чат)
  - model_name: ultra-router-chat
    litellm_params:
      model: gemini/gemini-2.5-flash
      api_key: os.environ/GEMINI_API_KEY
      timeout: 15

  # 🟠 FAST — Groq 2 ключі (швидке вивірення, балансування)
  - model_name: ultra-router-fast
    litellm_params:
      model: groq/llama-3.3-70b-versatile
      api_key: os.environ/GROQ_API_KEY_1
      timeout: 12

  - model_name: ultra-router-fast
    litellm_params:
      model: groq/llama-3.3-70b-versatile
      api_key: os.environ/GROQ_API_KEY_2
      timeout: 12

  # 🔵 CODING — Mistral 2 ключі (рефакторинг коду)
  - model_name: ultra-router-coding
    litellm_params:
      model: mistral/codestral-latest
      api_key: os.environ/MISTRAL_API_KEY_1
      timeout: 20

  - model_name: ultra-router-coding
    litellm_params:
      model: mistral/codestral-latest
      api_key: os.environ/MISTRAL_API_KEY_2
      timeout: 20

  # 🟣 LOCAL — Ollama NVIDIA Server (infinite fallback)
  - model_name: ultra-router-local
    litellm_params:
      model: ollama/deepseek-r1:7b
      api_base: http://194.177.1.240:11434
      timeout: 45

  - model_name: ultra-router-local
    litellm_params:
      model: ollama/qwen3:8b
      api_base: http://194.177.1.240:11434
      timeout: 45

  # 🤖 AUTO — Universal Router (auto-select по складності)
  - model_name: ultra-router-auto
    litellm_params:
      model: router

litellm_settings:
  master_key: ${LITELLM_MASTER_KEY:-sk-antigravity-master-2026}
  routing_strategy: "least-busy"
  num_retries: 3              # Менше ретраїв = швидше fallback
  request_timeout: 25         # Менше timeout = не гальмує
  allowed_fails: 1            # Одна помилка = fallback
  cooldown_time: 5
  fallback_strategy: "exponential_backoff"
  
  fallbacks:
    - {"ultra-router-chat": ["ultra-router-local"]}
    - {"ultra-router-fast": ["ultra-router-local"]}
    - {"ultra-router-coding": ["ultra-router-local"]}
  
  default_fallbacks: ["ultra-router-local"]

router_settings:
  routing_strategy: "least-busy"
  num_retries: 2
  timeout: 25
  cooldown_time: 5

general_settings:
  store_model_in_db: false
  disable_spend_logs: true
  disable_reset_budget: true
  log_level: "INFO"
