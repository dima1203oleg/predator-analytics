# ================================================================
# Ultra-Router v4.4 — Antigravity / Cline
# PREDATOR Analytics — 2×Mistral + 2×Groq + 1×Gemini
# Mistral = глобальний fallback ("останній рятівник")
# ================================================================

model_list:
  # ── CHAT (Gemini — стабільний для укр)
  - model_name: ultra-router-chat
    litellm_params:
      model: gemini/gemini-2.5-flash
      api_key: os.environ/GEMINI_API_KEY

  # ── FAST (два Groq — load-balance + failover між ключами)
  - model_name: ultra-router-fast
    litellm_params:
      model: groq/llama-3.3-70b-versatile
      api_key: os.environ/GROQ_API_KEY_1

  - model_name: ultra-router-fast
    litellm_params:
      model: groq/llama-3.3-70b-versatile
      api_key: os.environ/GROQ_API_KEY_2

  # ── CODING (два Mistral — load-balance + глобальний рятівник)
  - model_name: ultra-router-coding
    litellm_params:
      model: mistral/codestral-latest
      api_key: os.environ/MISTRAL_API_KEY_1

  - model_name: ultra-router-coding
    litellm_params:
      model: mistral/codestral-latest
      api_key: os.environ/MISTRAL_API_KEY_2

  # ── AUTO (Gemini → Mistral → Groq, least-busy)
  - model_name: ultra-router-auto
    litellm_params:
      model: gemini/gemini-2.5-flash
      api_key: os.environ/GEMINI_API_KEY

  - model_name: ultra-router-auto
    litellm_params:
      model: mistral/codestral-latest
      api_key: os.environ/MISTRAL_API_KEY_1

  - model_name: ultra-router-auto
    litellm_params:
      model: groq/llama-3.3-70b-versatile
      api_key: os.environ/GROQ_API_KEY_1

litellm_settings:
  routing_strategy: "least-busy"
  num_retries: 3
  request_timeout: 25
  allowed_fails: 3
  cooldown_time: 30
  success_callback: []
  failure_callback: []
  fallbacks:
    - {"ultra-router-chat": ["ultra-router-coding"]}
    - {"ultra-router-fast": ["ultra-router-coding"]}
    - {"ultra-router-auto": ["ultra-router-coding"]}
  default_fallbacks: ["ultra-router-coding"]

router_settings:
  routing_strategy: "least-busy"
  num_retries: 3
  timeout: 25
  retry_after: 3
  cooldown_time: 30

general_settings:
  store_model_in_db: false
  disable_spend_logs: true
  disable_reset_budget: true
