# ================================================================
# Ultra-Router v4.4 — Antigravity / Cline
# PREDATOR Analytics — 2×Mistral + 2×Groq + 1×Gemini
# Mistral = глобальний fallback ("останній рятівник")
# ================================================================

model_list:
  # ── CHAT (Gemini — стабільний для укр)
  - model_name: ultra-router-chat
    litellm_params:
      model: gemini/gemini-2.5-flash
      api_key: os.environ/GEMINI_API_KEY

  # ── FAST (два Groq — load-balance + failover між ключами)
  - model_name: ultra-router-fast
    litellm_params:
      model: groq/llama-3.3-70b-versatile
      api_key: os.environ/GROQ_API_KEY_1

  - model_name: ultra-router-fast
    litellm_params:
      model: groq/llama-3.3-70b-versatile
      api_key: os.environ/GROQ_API_KEY_2

  # ── CODING (два Mistral — load-balance + глобальний рятівник)
  - model_name: ultra-router-coding
    litellm_params:
      model: mistral/codestral-latest
      api_key: os.environ/MISTRAL_API_KEY_1

  - model_name: ultra-router-coding
    litellm_params:
      model: mistral/codestral-latest
      api_key: os.environ/MISTRAL_API_KEY_2

  # ── AUTO (всі 5 ключів — Gemini + Mistral×2 + Groq×2, least-busy + авторотація)
  - model_name: ultra-router-auto
    litellm_params:
      model: gemini/gemini-2.5-flash
      api_key: os.environ/GEMINI_API_KEY

  - model_name: ultra-router-auto
    litellm_params:
      model: mistral/codestral-latest
      api_key: os.environ/MISTRAL_API_KEY_1

  - model_name: ultra-router-auto
    litellm_params:
      model: mistral/codestral-latest
      api_key: os.environ/MISTRAL_API_KEY_2

  - model_name: ultra-router-auto
    litellm_params:
      model: groq/llama-3.3-70b-versatile
      api_key: os.environ/GROQ_API_KEY_1

  - model_name: ultra-router-auto
    litellm_params:
      model: groq/llama-3.3-70b-versatile
      api_key: os.environ/GROQ_API_KEY_2

litellm_settings:
  routing_strategy: "least-busy"
  num_retries: 5
  request_timeout: 60
  allowed_fails: 2
  cooldown_time: 10
  success_callback: []
  failure_callback: []
  fallbacks:
    - {"ultra-router-chat": ["ultra-router-auto"]}
    - {"ultra-router-fast": ["ultra-router-auto"]}
    - {"ultra-router-coding": ["ultra-router-auto"]}
  default_fallbacks: ["ultra-router-auto"]

router_settings:
  routing_strategy: "least-busy"
  num_retries: 5
  timeout: 60
  retry_after: 5
  cooldown_time: 10

general_settings:
  store_model_in_db: false
  disable_spend_logs: true
  disable_reset_budget: true
