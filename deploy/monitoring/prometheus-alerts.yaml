groups:
  # ============================================================
  # PREDATOR Analytics v55.1 — Правила алертингу
  # ============================================================

  - name: predator.api
    interval: 30s
    rules:
      # API недоступний
      - alert: PredatorCoreApiDown
        expr: up{job="predator-core-api"} == 0
        for: 1m
        labels:
          severity: critical
          service: core-api
        annotations:
          summary: "PREDATOR Core API недоступний"
          description: "Core API не відповідає більше 1 хвилини"

      # Висока latency
      - alert: PredatorApiHighLatency
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket{job="predator-core-api"}[5m])) > 2
        for: 5m
        labels:
          severity: warning
          service: core-api
        annotations:
          summary: "Висока затримка API (p95 > 2s)"
          description: "p95 латентність {{ $value }}s перевищує поріг 2s"

      # Висока кількість помилок
      - alert: PredatorApiHighErrorRate
        expr: rate(http_requests_total{job="predator-core-api",status=~"5.."}[5m]) / rate(http_requests_total{job="predator-core-api"}[5m]) > 0.05
        for: 2m
        labels:
          severity: critical
          service: core-api
        annotations:
          summary: "Висока кількість 5xx помилок (> 5%)"
          description: "Відсоток помилок: {{ $value | humanizePercentage }}"

  - name: predator.database
    interval: 60s
    rules:
      # PostgreSQL недоступний
      - alert: PostgresDown
        expr: up{job="postgres"} == 0
        for: 1m
        labels:
          severity: critical
          service: postgres
        annotations:
          summary: "PostgreSQL недоступний"
          description: "База даних PostgreSQL не відповідає"

      # Neo4j недоступний
      - alert: Neo4jDown
        expr: up{job="neo4j"} == 0
        for: 2m
        labels:
          severity: critical
          service: neo4j
        annotations:
          summary: "Neo4j недоступний"
          description: "База даних Neo4j не відповідає більше 2 хвилин"

      # Багато з'єднань PostgreSQL
      - alert: PostgresHighConnections
        expr: pg_stat_activity_count > 80
        for: 5m
        labels:
          severity: warning
          service: postgres
        annotations:
          summary: "Забагато з'єднань PostgreSQL (> 80)"
          description: "Поточна кількість: {{ $value }}"

  - name: predator.kafka
    interval: 30s
    rules:
      # Kafka недоступний
      - alert: KafkaDown
        expr: up{job="kafka"} == 0
        for: 2m
        labels:
          severity: critical
          service: kafka
        annotations:
          summary: "Kafka недоступний"
          description: "Kafka broker не відповідає більше 2 хвилин"

      # Затримка Consumer Group
      - alert: KafkaConsumerLag
        expr: kafka_consumer_group_lag{group="predator-ingestion-workers"} > 10000
        for: 10m
        labels:
          severity: warning
          service: kafka
        annotations:
          summary: "Висока затримка Kafka consumers (> 10k)"
          description: "Consumer lag: {{ $value }} повідомлень"

      # DLQ росте
      - alert: KafkaDLQGrowing
        expr: increase(kafka_topic_partition_current_offset{topic="predator.ingestion.dlq"}[10m]) > 100
        for: 5m
        labels:
          severity: warning
          service: kafka
        annotations:
          summary: "DLQ топік зростає (> 100 за 10 хв)"
          description: "Збільшення DLQ: {{ $value }} повідомлень"

  - name: predator.infrastructure
    interval: 60s
    rules:
      # Redis недоступний
      - alert: RedisDown
        expr: up{job="redis"} == 0
        for: 1m
        labels:
          severity: critical
          service: redis
        annotations:
          summary: "Redis недоступний"

      # OpenSearch недоступний
      - alert: OpenSearchDown
        expr: up{job="opensearch"} == 0
        for: 2m
        labels:
          severity: critical
          service: opensearch
        annotations:
          summary: "OpenSearch недоступний"

      # Мало вільного дискового місця
      - alert: LowDiskSpace
        expr: (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) < 0.15
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Залишилось менше 15% дискового місця"
          description: "Вільно: {{ $value | humanizePercentage }}"

  - name: predator.business
    interval: 60s
    rules:
      # Багато критичних компаній
      - alert: HighCriticalRiskCompanies
        expr: predator_companies_by_risk_level{level="critical"} > 100
        for: 30m
        labels:
          severity: info
          service: risk-scoring
        annotations:
          summary: "Більше 100 компаній з критичним ризиком"
          description: "Кількість: {{ $value }}"

      # Помилки інгестії
      - alert: IngestionHighErrorRate
        expr: rate(predator_ingestion_records_failed_total[5m]) / rate(predator_ingestion_records_total[5m]) > 0.1
        for: 5m
        labels:
          severity: warning
          service: ingestion
        annotations:
          summary: "Висока кількість помилок інгестії (> 10%)"
          description: "Відсоток помилок: {{ $value | humanizePercentage }}"
