apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: predator-ingestion-worker
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: 'https://github.com/dima1203oleg/predator-analytics.git'
    path: deploy/helm/predator/charts/ingestion-worker
    targetRevision: HEAD
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: predator-core
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
