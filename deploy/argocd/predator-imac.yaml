apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: predator-backend-imac
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/dima1203oleg/predator-analytics.git
    targetRevision: HEAD
    path: deploy/helm/predator
    helm:
      valueFiles:
        - values.yaml
        - values-imac.yaml
  destination:
    server: https://192.168.0.199:6443 # Зовнішній кластер iMac
    namespace: predator-prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
