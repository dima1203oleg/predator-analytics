version: '3.8'

services:
  # ---------------------------------------------
  # DATABASES (8 DB STACK)
  # ---------------------------------------------
  
  # 1. PostgreSQL + TimescaleDB + pgvector (SSOT + History + Hybrid Search)
  postgres:
    image: timescale/timescaledb-ha:pg16
    container_name: predator_postgres
    environment:
      - POSTGRES_PASSWORD=predator_secret
      - POSTGRES_USER=predator
      - POSTGRES_DB=predator_analytics
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - predator_net
    deploy:
      resources:
        limits:
          memory: 1G

  # 2. Qdrant (Vector DB for AI Embeddings)
  qdrant:
    image: qdrant/qdrant:latest
    container_name: predator_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - predator_net
    deploy:
      resources:
        limits:
          memory: 1G

  # 3. OpenSearch (Full-text & Logs)
  opensearch:
    image: opensearchproject/opensearch:latest
    container_name: predator_opensearch
    environment:
      - discovery.type=single-node
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=Predator_Secret123!
    ports:
      - "9200:9200"
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    networks:
      - predator_net
    deploy:
      resources:
        limits:
          memory: 1G

  # 4. MinIO (Object Storage)
  minio:
    image: minio/minio:latest
    container_name: predator_minio
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=predator
      - MINIO_ROOT_PASSWORD=predator_secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    networks:
      - predator_net
    deploy:
      resources:
        limits:
          memory: 512M

  # 5. Redpanda (Event Backbone - Persistence Layer)
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v23.2.2
    container_name: predator_redpanda
    command:
      - redpanda
      - start
      - --smp 1
      - --memory 1G
      - --reserve-memory 0M
      - --overprovisioned
      - --node-id 0
      - --check=false
      - --kafka-addr PLAINTEXT://0.0.0.0:29092,OUTSIDE://0.0.0.0:9092
      - --advertise-kafka-addr PLAINTEXT://redpanda:29092,OUTSIDE://localhost:9092
      - --pandaproxy-addr 0.0.0.0:8082
      - --advertise-pandaproxy-addr localhost:8082
    ports:
      - "9092:9092"
      - "29092:29092"
      - "8082:8082"
    volumes:
      - redpanda-data:/var/lib/redpanda/data
    networks:
      - predator_net

  # ---------------------------------------------
  # REALTIME STATE CACHE
  # ---------------------------------------------
  redis:
    image: redis:7.2-alpine
    container_name: predator_redis
    ports:
      - "6379:6379"
    networks:
      - predator_net

  # ---------------------------------------------
  # MICROSERVICES LAYER
  # ---------------------------------------------
  
  # 1. API GATEWAY (FastAPI + WebSockets)
  api-gateway:
    build:
      context: ../services/api-gateway-service
      dockerfile: Dockerfile
    container_name: predator_api_gateway
    ports:
      - "8000:8000"
    environment:
      - KAFKA_BROKER=redpanda:29092
      - REDIS_URL=redis://redis:6379
      - CORS_ORIGINS=http://localhost:3030,http://194.177.1.240:3030
    depends_on:
      - redpanda
      - redis
    networks:
      - predator_net

  # 2. GRAPH SERVICE
  graph-service:
    build:
      context: ../services/graph-service
      dockerfile: Dockerfile
    container_name: predator_graph_service
    environment:
      - KAFKA_BROKER=redpanda:29092
      - POSTGRES_URL=postgresql://predator:predator_secret@postgres:5432/predator_analytics
    depends_on:
      - redpanda
      - postgres
    networks:
      - predator_net

  # 3. RISK ENGINE SERVICE
  risk-engine:
    build:
      context: ../services/risk-engine-service
      dockerfile: Dockerfile
    container_name: predator_risk_engine
    environment:
      - KAFKA_BROKER=redpanda:29092
    depends_on:
      - redpanda
    networks:
      - predator_net

  # 4. AI EXPLAINABILITY SERVICE
  ai-explainability:
    build:
      context: ../services/ai-explainability-service
      dockerfile: Dockerfile
    container_name: predator_ai_explainability
    environment:
      - KAFKA_BROKER=redpanda:29092
      - OLLAMA_HOST=http://host.docker.internal:11434 # Заглушка для локального Ollama
    depends_on:
      - redpanda
    networks:
      - predator_net

  # 5. MOCK DATA GENERATOR
  mock-generator:
    build:
      context: ../services/mock-data-generator
      dockerfile: Dockerfile
    container_name: predator_mock_generator
    environment:
      - KAFKA_BROKER=redpanda:29092
    depends_on:
      - redpanda
    networks:
      - predator_net

networks:
  predator_net:
    driver: bridge

volumes:
  redpanda-data:
  postgres-data:
  qdrant-data:
  opensearch-data:
  minio-data:
