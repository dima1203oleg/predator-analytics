version: '3.8'

services:
  # ============================================================
  # 1. Frontend (React/Vite)
  # ============================================================
  ui:
    build:
      context: ../
      dockerfile: apps/predator-analytics-ui/Dockerfile
    ports:
      - "3030:3030"
    restart: always
    depends_on:
      - core-api
    networks:
      - predator-sovereign-net

  # ============================================================
  # 2. Core API (FastAPI)
  # ============================================================
  core-api:
    build:
      context: ../
      dockerfile: services/core-api/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    volumes:
      - ./logs/core-api:/app/logs
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    networks:
      - predator-sovereign-net
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2'

  # ============================================================
  # 2.1. Graph Service (Neo4j Algos)
  # ============================================================
  graph-service:
    build:
      context: ../
      dockerfile: services/graph-service/Dockerfile
    ports:
      - "8001:8001"
    env_file:
      - ../.env
    restart: always
    depends_on:
      neo4j:
        condition: service_healthy
    networks:
      - predator-sovereign-net
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1'

  # ============================================================
  # 3. Ingestion Worker
  # ============================================================
  ingestion-worker:
    build:
      context: ../
      dockerfile: services/ingestion-worker/Dockerfile
    env_file:
      - ../.env
    volumes:
      - ./logs/worker:/app/logs
      - ../data/kafka_offline:/app/data/kafka_offline
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    networks:
      - predator-sovereign-net
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1'

  # ============================================================
  # 4. Infrastructure
  # ============================================================
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: predator
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-predator_secret}
      POSTGRES_DB: predator_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../db/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U predator -d predator_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - predator-sovereign-net

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-predator_redis}
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-predator_redis}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - predator-sovereign-net

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v23.2.14
    command:
      - redpanda
      - start
      - --smp 1
      - --memory 1G
      - --reserve-memory 0M
      - --overprovisioned
      - --node-id 0
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
    ports:
      - "19092:19092"
    volumes:
      - redpandadata:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - predator-sovereign-net

  neo4j:
    image: neo4j:5.17.0
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-predator_neo4j}
      NEO4J_PLUGINS: '["apoc", "graph-data-science"]'
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4jdata:/data
      - neo4jplugins:/plugins
    networks:
      - predator-sovereign-net
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "${NEO4J_PASSWORD:-predator_neo4j}", "RETURN 1"]
      interval: 20s
      timeout: 10s
      retries: 5

  # ============================================================
  # 5. Advanced Analytics & Storage
  # ============================================================
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - chdata:/var/lib/clickhouse
      - ../db/clickhouse/init.sql:/docker-entrypoint-initdb.d/init.sql
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    networks:
      - predator-sovereign-net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  opensearch:
    image: opensearchproject/opensearch:2.12.0
    environment:
      - cluster.name=predator-search
      - node.name=predator-os1
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms1g -Xmx1g"
      - DISABLE_INSTALL_DEMO_CONFIG=true
      - DISABLE_SECURITY_PLUGIN=true
    ports:
      - "9200:9200"
    volumes:
      - osdata:/usr/share/opensearch/data
    networks:
      - predator-sovereign-net
    healthcheck:
      test: ["CMD", "curl", "-s", "http://localhost:9200/_cluster/health?local=true"]
      interval: 20s
      timeout: 10s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.8.0
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrantdata:/qdrant/storage
    networks:
      - predator-sovereign-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    networks:
      - predator-sovereign-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # 5.1. OSINT Service (Intelligence Gathering)
  # ============================================================
  osint-service:
    build:
      context: ../
      dockerfile: services/osint-service/Dockerfile
    ports:
      - "9201:9200"  # Хост 9201 → контейнер 9200 (уникаємо конфлікту з OpenSearch 9200)
    env_file:
      - ../.env
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - predator-sovereign-net
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1'

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    ports:
      - "4000:4000"
    volumes:
      - ./litellm/config.yaml:/app/config.yaml
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    env_file:
      - ../.env
    networks:
      - predator-sovereign-net
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'

  autonomous-agent:
    build:
      context: ../
      dockerfile: services/autonomous-agent/Dockerfile
    env_file:
      - ../.env
    volumes:
      - ../:/app  # Щоб агент міг аналізувати та комітити код
      - ~/.gitconfig:/etc/gitconfig:ro
    depends_on:
      - litellm
    networks:
      - predator-sovereign-net
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'

networks:
  predator-sovereign-net:
    driver: bridge

volumes:
  redpandadata:
  pgdata:
  redisdata:
  neo4jdata:
  neo4jplugins:
  chdata:
  osdata:
  qdrantdata:
  miniodata:
