

services:
  # ============================================================
  # 1. Frontend (React/Vite)
  # ============================================================
  ui:
    build:
      context: ../
      dockerfile: apps/predator-analytics-ui/Dockerfile
    ports:
      - "3030:3030"
    restart: always
    depends_on:
      - core-api
    networks:
      - predator-sovereign-net

  # ============================================================
  # 2. Core API (FastAPI)
  # ============================================================
  core-api:
    build:
      context: ../
      dockerfile: services/core-api/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    volumes:
      - ./logs/core-api:/app/logs
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    networks:
      - predator-sovereign-net
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2'

  # ============================================================
  # 2.1. Graph Service (Neo4j Algos)
  # ============================================================
  graph-service:
    build:
      context: ../
      dockerfile: services/graph_service/Dockerfile
    ports:
      - "8001:8001"
    env_file:
      - ../.env
    restart: always
    depends_on:
      neo4j:
        condition: service_healthy
    networks:
      - predator-sovereign-net
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1'

  # ============================================================
  # 2.2. Federation Search Service
  # ============================================================
  federation-service:
    build:
      context: ../
      dockerfile: services/federation-service/Dockerfile
    ports:
      - "8002:8002"
    env_file:
      - ../.env
    environment:
      - POSTGRES_URL=postgresql://predator:${POSTGRES_PASSWORD:-predator_secret}@postgres:5432/predator_db
      - CLICKHOUSE_URL=http://clickhouse:8123
      - OPENSEARCH_URL=http://opensearch:9200
      - QDRANT_URL=http://qdrant:6333
      - NEO4J_URL=bolt://neo4j:7687
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      opensearch:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    networks:
      - predator-sovereign-net
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1'

  # ============================================================
  # 3. Ingestion Worker
  # ============================================================
  ingestion-worker:
    build:
      context: ../
      dockerfile: services/ingestion-worker/Dockerfile
    env_file:
      - ../.env
    environment:
      - CLICKHOUSE_HOST=clickhouse
      - CLICKHOUSE_PORT=8123
      - CLICKHOUSE_USER=${CLICKHOUSE_USER:-predator}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-predator_password}
      - KAFKA_BOOTSTRAP_SERVERS=redpanda:9092
      - POSTGRES_HOST=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-predator_secret}
      - POSTGRES_USER=${POSTGRES_USER:-predator}
      - POSTGRES_DB=predator_db
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-predator_neo4j}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-predator_redis}@redis:6379/0
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=admin
      - MINIO_SECRET_KEY=predator_password
      - MINIO_SECURE=false
      - LLM_OLLAMA_BASE_URL=http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./logs/worker:/app/logs
      - ../data/kafka_offline:/app/data/kafka_offline
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    networks:
      - predator-sovereign-net
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1'

  # ============================================================
  # 4. Infrastructure
  # ============================================================
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-predator}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-predator_secret}
      POSTGRES_DB: predator_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../db/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U predator -d predator_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - predator-sovereign-net

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-predator_redis}
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-predator_redis}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - predator-sovereign-net

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v23.2.14
    command:
      - redpanda
      - start
      - --smp 1
      - --memory 1G
      - --reserve-memory 0M
      - --overprovisioned
      - --node-id 0
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
    ports:
      - "19092:19092"
    volumes:
      - redpandadata:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - predator-sovereign-net

  neo4j:
    image: neo4j:5.17.0
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-predator_neo4j}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_server_memory_heap_initial__size: 512M
      NEO4J_server_memory_heap_max__size: 1G
      NEO4J_server_memory_pagecache_size: 512M
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4jdata:/data
      - neo4jplugins:/plugins
    # user: "neo4j"
    networks:
      - predator-sovereign-net
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "${NEO4J_PASSWORD:-predator_neo4j}", "RETURN 1"]
      interval: 20s
      timeout: 10s
      retries: 5

  # ============================================================
  # 5. Advanced Analytics & Storage
  # ============================================================
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    environment:
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-predator}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-predator_password}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ports:
      - "8123:8123"
      - "9002:9000"
    volumes:
      - chdata:/var/lib/clickhouse
      - ../db/clickhouse/init.sql:/docker-entrypoint-initdb.d/init.sql
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    networks:
      - predator-sovereign-net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  opensearch:
    image: opensearchproject/opensearch:2.12.0
    environment:
      - cluster.name=predator-search
      - node.name=predator-os1
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms1g -Xmx1g"
      - DISABLE_INSTALL_DEMO_CONFIG=true
      - DISABLE_SECURITY_PLUGIN=true
    ports:
      - "9200:9200"
    volumes:
      - osdata:/usr/share/opensearch/data
    networks:
      - predator-sovereign-net
    healthcheck:
      test: ["CMD", "curl", "-s", "http://localhost:9200/_cluster/health?local=true"]
      interval: 20s
      timeout: 10s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.8.0
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrantdata:/qdrant/storage
    networks:
      - predator-sovereign-net
    healthcheck:
      test: ["CMD", "sh", "-c", "exit 0"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    networks:
      - predator-sovereign-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # 5.1. OSINT Service (Intelligence Gathering)
  # ============================================================
  osint-service:
    build:
      context: ../
      dockerfile: services/osint-service/Dockerfile
    ports:
      - "9201:9200"  # Хост 9201 → контейнер 9200 (уникаємо конфлікту з OpenSearch 9200)
    env_file:
      - ../.env
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - predator-sovereign-net
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1'

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    ports:
      - "4000:4000"
    volumes:
      - ./litellm/config.yaml:/app/config.yaml
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - DATABASE_URL=""
    env_file:
      - ../.env
    networks:
      - predator-sovereign-net
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'

  autonomous-agent:
    build:
      context: ../
      dockerfile: services/autonomous-agent/Dockerfile
    env_file:
      - ../.env
    volumes:
      - ../:/app  # Щоб агент міг аналізувати та комітити код
      - ~/.gitconfig:/etc/gitconfig:ro
    depends_on:
      - litellm
    networks:
      - predator-sovereign-net
    deploy:
      resources:
        limits:
          memory: 8G
          cpus: '0.5'

  # ============================================================
  # 5.2. Telegram Control Center Bot
  # ============================================================
  telegram-bot:
    build:
      context: ../
      dockerfile: services/telegram-bot/Dockerfile
    env_file:
      - ../.env
    restart: always
    depends_on:
      - core-api
    networks:
      - predator-sovereign-net
    deploy:
      resources:
        limits:
          memory: 500M
          cpus: '0.5'

  # ============================================================
  # 5.3. UTOS (Unified Testing Operating System)
  # ============================================================
  utos:
    build:
      context: ../
      dockerfile: services/utos/Dockerfile
    ports:
      - "8003:8003"
    env_file:
      - ../.env
    environment:
      POSTGRES_DSN: "postgresql://predator:${POSTGRES_PASSWORD:-predator_secret}@postgres:5432/predator_db"
      REDIS_URL: "redis://:${REDIS_PASSWORD:-predator_redis}@redis:6379/0"
      NEO4J_URI: "bolt://neo4j:7687"
      CLICKHOUSE_URL: "http://clickhouse:8123"
      QDRANT_URL: "http://qdrant:6333"
      OPENSEARCH_URL: "http://opensearch:9200"
      MINIO_URL: "http://minio:9000"
      KAFKA_BOOTSTRAP_SERVERS: "redpanda:9092"
      CORE_API_URL: "http://core-api:8000"
      FRONTEND_URL: "http://ui:3030"
    restart: always
    networks:
      - predator-sovereign-net
    deploy:
      resources:
        limits:
          memory: 500M
          cpus: '0.5'

  # ============================================================
  # 5.4. Claw Code Agent (Self-Improvement Orchestrator)
  # ============================================================
  claw-code-agent:
    build:
      context: ../
      dockerfile: services/claw-code-agent/Dockerfile
    ports:
      - "8005:8005"
    env_file:
      - ../.env
    environment:
      - LLM_OLLAMA_BASE_URL=http://host.docker.internal:11434
    volumes:
      - ../:/workspace
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: always
    networks:
      - predator-sovereign-net
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1'

networks:
  predator-sovereign-net:
    driver: bridge

volumes:
  redpandadata:
  pgdata:
  redisdata:
  neo4jdata:
  neo4jplugins:
  chdata:
  osdata:
  qdrantdata:
  miniodata:

