version: '3.8'

services:
  # ============================================================
  # 1. Frontend (React/Vite)
  # ============================================================
  ui:
    build:
      context: ../
      dockerfile: apps/predator-analytics-ui/Dockerfile
    ports:
      - "3030:3030"
    restart: always
    depends_on:
      - core-api
    networks:
      - predator_net

  # ============================================================
  # 2. Core API (FastAPI)
  # ============================================================
  core-api:
    build:
      context: ../
      dockerfile: services/core-api/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    volumes:
      - ./logs/core-api:/app/logs
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - predator_net
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2'

  # ============================================================
  # 3. Ingestion Worker
  # ============================================================
  ingestion-worker:
    build:
      context: ../
      dockerfile: services/ingestion-worker/Dockerfile
    env_file:
      - ../.env
    volumes:
      - ./logs/worker:/app/logs
      - ../data/kafka_offline:/app/data/kafka_offline
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - predator_net
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1'

  # ============================================================
  # 4. Infrastructure
  # ============================================================
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: predator
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-predator_secret}
      POSTGRES_DB: predator_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../db/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U predator -d predator_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - predator_net

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-predator_redis}
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-predator_redis}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - predator_net

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - predator_net

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: 'zookeeper:2181'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - predator_net

  neo4j:
    image: neo4j:5.17.0
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-predator_neo4j}
      NEO4J_PLUGINS: '["apoc", "graph-data-science"]'
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4jdata:/data
      - neo4jplugins:/plugins
    networks:
      - predator_net

networks:
  predator_net:
    driver: bridge

volumes:
  pgdata:
  redisdata:
  neo4jdata:
  neo4jplugins:
