# ═══════════════════════════════════════════════════════════════
# 📊 PostgreSQL 16 — Конфіг для PREDATOR Analytics
# NVIDIA L40S Server (194.177.1.240)
# ═══════════════════════════════════════════════════════════════

# Це ДОДАТОК до стандартного postgresql.conf
# Файл розташування: /etc/postgresql/16/main/conf.d/predator.conf

# ═══════════════════════════════════════════════════════════════
# 🧠 ПАМ'ЯТІ (MEMORY)
# ═══════════════════════════════════════════════════════════════

# Спільна буфер для кешування (25% від вільної памяті, макс. 40GB)
# На L40S сервері: можна 4-8 GB
shared_buffers = 4GB

# Ефективна пам'ять кешу ОС (50% від вільної памяті)
effective_cache_size = 12GB

# Рядків пам'яті для роботи запитів
work_mem = 256MB

# Макс. роботи пам'яті на весь сервер
max_parallel_workers_per_gather = 4

# ═══════════════════════════════════════════════════════════════
# ⚡ PARALLELLISM (паралельність запитів)
# ═══════════════════════════════════════════════════════════════

max_worker_processes = 8
max_parallel_workers = 8
max_parallel_maintenance_workers = 4

# ═══════════════════════════════════════════════════════════════
# 🔍 ЗАПИТИ (QUERY PLANNING)
# ═══════════════════════════════════════════════════════════════

# Аналізатор запитів ватиме індекси від якої вартості
random_page_cost = 1.1

# ═══════════════════════════════════════════════════════════════
# 💾 ДИСК (STORAGE)
# ═══════════════════════════════════════════════════════════════

# Write-ahead log (для надійності)
wal_level = replica
wal_buffers = 16MB

# Checkpoints (контрольні точки) - чим рідше, тим швидше, але менше надійності
checkpoint_timeout = 15min
checkpoint_completion_target = 0.9
max_wal_size = 2GB
min_wal_size = 512MB

# ═══════════════════════════════════════════════════════════════
# 🌐 МЕРЕЖА (NETWORK)
# ═══════════════════════════════════════════════════════════════

# Максимальна кількість одночасних з'єднань
max_connections = 200

# Timeout для неактивних з'єднань
idle_in_transaction_session_timeout = '5min'

# ═══════════════════════════════════════════════════════════════
# 📊 ЛОГУВАННЯ
# ═══════════════════════════════════════════════════════════════

# Логування повільних запитів (>1000ms)
log_min_duration_statement = 1000
log_duration = off
log_statement = 'all'  # логувати ВСІ запити (для аудиту)

# Ротація логів
log_rotation_age = '1d'
log_rotation_size = '100MB'

# ═══════════════════════════════════════════════════════════════
# 🔐 БЕЗПЕКА (SECURITY)
# ═══════════════════════════════════════════════════════════════

# SSL для з'єднань (якщо налаштовано)
ssl = on
ssl_cert_file = '/etc/ssl/certs/server.crt'
ssl_key_file = '/etc/ssl/private/server.key'

# ═══════════════════════════════════════════════════════════════
# 🎯 PREDATOR-СПЕЦИФІЧНІ НАЛАШТУВАННЯ
# ═══════════════════════════════════════════════════════════════

# RLS (Row-Level Security) для PREDATOR - ОБОВ'ЯЗКОВО
row_security = on

# Включити розширення для повнотекстового пошуку
shared_preload_libraries = 'pg_stat_statements,uuid-ossp,btree_gist'

# ═══════════════════════════════════════════════════════════════
# ✅ РЕЗЮМЕ
# ═══════════════════════════════════════════════════════════════
#
# Цей конфіг:
# • Оптимізований для NVIDIA L40S сервера
# • Використовує 4-8 GB памяті (незначна частина від 256GB)
# • Включає логування для аудиту (PREDATOR вимога)
# • Безпечний (SSL + RLS)
# • Надійний (WAL, checkpoints)
#
# CPU: <1% IDLE, 5-15% при активних запитах
# ПАМЯТЬ: 2-4 GB зазвичай, до 8 GB під пік-навантаженням
# ДИСК: 15-30 GB для PREDATOR + логи
#
# 💰 РЕСУРСИ: МАЛО! Можна сміливо запускати!
