apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: predator-elite-ingress
  namespace: predator-elite
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60s"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60s"
spec:
  rules:
  - host: predator.dima1203oleg.dev
    http:
      paths:
      - path: /api/v1
        pathType: Prefix
        backend:
          service:
            name: predator-elite-core-api
            port:
              number: 8000
      - path: /api/v2
        pathType: Prefix
        backend:
          service:
            name: predator-elite-core-api
            port:
              number: 8000
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: predator-elite-core-api
            port:
              number: 8000
      - path: /
        pathType: Prefix
        backend:
          service:
            name: predator-elite-frontend
            port:
              number: 80
