apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: predator-v55-ingress
  namespace: predator-v55
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60s"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60s"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
  - hosts:
    - predator.dima1203oleg.dev
    secretName: predator-v55-tls
  rules:
  - host: predator.dima1203oleg.dev
    http:
      paths:
      - path: /api/v1
        pathType: Prefix
        backend:
          service:
            name: predator-v55-core-api
            port:
              number: 8000
      - path: /api/v2
        pathType: Prefix
        backend:
          service:
            name: predator-v55-core-api
            port:
              number: 8000
      - path: /api/graph
        pathType: Prefix
        backend:
          service:
            name: predator-v55-graph-service
            port:
              number: 8002
      - path: /
        pathType: Prefix
        backend:
          service:
            name: predator-v55-frontend
            port:
              number: 80
