apiVersion: apps/v1
kind: Deployment
metadata:
  name: predator-elite-ml-studio
  namespace: predator-elite
  labels:
    app.kubernetes.io/name: ml-studio
    app.kubernetes.io/component: ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ml-studio
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ml-studio
        app.kubernetes.io/component: ai
    spec:
      containers:
      - name: ml-studio
        image: europe-west3-docker.pkg.dev/project-b63e383c-4a98-418d-837/predator-repo/core-api:fix-risk-perm-7b98e001
        imagePullPolicy: IfNotPresent
        command: ["python", "-m", "app.main"]
        ports:
        - containerPort: 8003
          name: http
        env:
        - name: DATABASE_URL
          value: "postgres://predator:predator_password@predator-elite-postgres:5432/predator"
        - name: REDIS_URL
          value: "redis://predator-elite-redis-master:6379/0"
        - name: QDRANT_URL
          value: "http://predator-elite-qdrant:6333"
        - name: OLLAMA_URL
          value: "http://predator-elite-ollama:11434"
        - name: CORE_API_URL
          value: "http://predator-elite-core-api:8000"
        - name: LOG_LEVEL
          value: "INFO"
        - name: PORT
          value: "8003"
        livenessProbe:
          httpGet:
            path: /health/live
            port: 8003
          initialDelaySeconds: 30
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 8003
          initialDelaySeconds: 15
          periodSeconds: 10
        resources:
          limits:
            cpu: 1000m
            memory: 2Gi
          requests:
            cpu: 250m
            memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: predator-elite-ml-studio
  namespace: predator-elite
spec:
  selector:
    app.kubernetes.io/name: ml-studio
  ports:
  - port: 8003
    name: http
