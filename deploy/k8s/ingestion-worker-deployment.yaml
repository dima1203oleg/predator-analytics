apiVersion: apps/v1
kind: Deployment
metadata:
  name: predator-elite-ingestion-worker
  namespace: predator-elite
  labels:
    app.kubernetes.io/name: ingestion-worker
    app.kubernetes.io/component: data-ingestion
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: ingestion-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ingestion-worker
        app.kubernetes.io/component: data-ingestion
    spec:
      containers:
      - name: ingestion-worker
        image: europe-west3-docker.pkg.dev/project-b63e383c-4a98-418d-837/predator-repo/ingestion-worker:latest
        imagePullPolicy: Always
        env:
        - name: KAFKA_BOOTSTRAP_SERVERS
          value: "predator-elite-redpanda:9092"
        - name: DATABASE_URL
          value: "postgresql+asyncpg://predator:predator_password@predator-elite-postgres:5432/predator"
        - name: REDIS_URL
          value: "redis://predator-elite-redis-master:6379/0"
        - name: MINIO_URL
          value: "http://predator-elite-minio:9000"
        - name: MINIO_ACCESS_KEY
          value: "predator"
        - name: MINIO_SECRET_KEY
          value: "predator-minio-secure"
        - name: QDRANT_URL
          value: "http://predator-elite-qdrant:6333"
        - name: OPENSEARCH_URL
          value: "http://predator-elite-opensearch:9200"
        - name: CORE_API_URL
          value: "http://predator-elite-core-api:8000"
        - name: LOG_LEVEL
          value: "INFO"
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 100m
            memory: 128Mi
