apiVersion: apps/v1
kind: Deployment
metadata:
  name: predator-v55-neo4j
  namespace: predator-v55
  labels:
    app.kubernetes.io/name: neo4j
    app.kubernetes.io/component: graph-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: neo4j
  template:
    metadata:
      labels:
        app.kubernetes.io/name: neo4j
        app.kubernetes.io/component: graph-db
    spec:
      containers:
      - name: neo4j
        image: neo4j:5.15-community
        env:
        - name: NEO4J_AUTH
          value: neo4j/predator-neo4j-secure
        - name: NEO4J_dbms_memory_heap_max__size
          value: 512M
        - name: NEO4J_dbms_memory_pagecache_size
          value: 256M
        ports:
        - containerPort: 7474
          name: http
        - containerPort: 7687
          name: bolt
        volumeMounts:
        - name: data
          mountPath: /data
        resources:
          limits:
            cpu: 500m
            memory: 1Gi
          requests:
            cpu: 100m
            memory: 256Mi
      volumes:
      - name: data
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: predator-v55-neo4j
  namespace: predator-v55
spec:
  selector:
    app.kubernetes.io/name: neo4j
  ports:
  - port: 7474
    name: http
  - port: 7687
    name: bolt
