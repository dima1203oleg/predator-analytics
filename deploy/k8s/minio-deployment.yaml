apiVersion: apps/v1
kind: Deployment
metadata:
  name: predator-v55-minio
  namespace: predator-v55
  labels:
    app.kubernetes.io/name: minio
    app.kubernetes.io/component: storage
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: minio
  template:
    metadata:
      labels:
        app.kubernetes.io/name: minio
        app.kubernetes.io/component: storage
    spec:
      containers:
      - name: minio
        image: minio/minio:RELEASE.2024-02-26T09-33-48Z
        command:
        - /bin/sh
        - -c
        - minio server /data --console-address :9001
        env:
        - name: MINIO_ROOT_USER
          value: predator
        - name: MINIO_ROOT_PASSWORD
          value: predator-minio-secure
        ports:
        - containerPort: 9000
          name: api
        - containerPort: 9001
          name: console
        volumeMounts:
        - name: data
          mountPath: /data
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 100m
            memory: 128Mi
      volumes:
      - name: data
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: predator-v55-minio
  namespace: predator-v55
spec:
  selector:
    app.kubernetes.io/name: minio
  ports:
  - port: 9000
    name: api
  - port: 9001
    name: console
