apiVersion: apps/v1
kind: Deployment
metadata:
  name: predator-v55-qdrant
  namespace: predator-v55
  labels:
    app.kubernetes.io/name: qdrant
    app.kubernetes.io/component: vector-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: qdrant
  template:
    metadata:
      labels:
        app.kubernetes.io/name: qdrant
        app.kubernetes.io/component: vector-db
    spec:
      containers:
      - name: qdrant
        image: qdrant/qdrant:v1.7.4
        ports:
        - containerPort: 6333
          name: http
        - containerPort: 6334
          name: grpc
        volumeMounts:
        - name: data
          mountPath: /qdrant/storage
        resources:
          limits:
            cpu: 500m
            memory: 1Gi
          requests:
            cpu: 100m
            memory: 256Mi
      volumes:
      - name: data
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: predator-v55-qdrant
  namespace: predator-v55
spec:
  selector:
    app.kubernetes.io/name: qdrant
  ports:
  - port: 6333
    name: http
  - port: 6334
    name: grpc
