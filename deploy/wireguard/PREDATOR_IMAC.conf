[Interface]
# iMac (Compute Node) — WireGuard Server
PrivateKey = oDQ33e6FtyQAudW/gLgga+mRa5OobjsNCIMw0vrNwGY=
Address = 10.8.0.1/24
ListenPort = 51820

# Форвардинг трафіку між VPN-клієнтами та локальною мережею
PostUp   = sysctl -w net.inet.ip.forwarding=1; iptables -A FORWARD -i wg0 -j ACCEPT; iptables -A FORWARD -o wg0 -j ACCEPT; iptables -t nat -A POSTROUTING -o eth0 -j MASQUERADE
PostDown = iptables -D FORWARD -i wg0 -j ACCEPT; iptables -D FORWARD -o wg0 -j ACCEPT; iptables -t nat -D POSTROUTING -o eth0 -j MASQUERADE

