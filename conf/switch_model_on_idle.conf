#!/bin/bash

# ⚙️ Конфігурація для скрипта switch_model_on_idle.sh

# -- Шляхи до файлів --

# Директорія для лог-файлів та PID-файлу.
# Скрипт автоматично створить її, якщо вона не існує.
LOG_DIR="/Users/Shared/Predator_60/logs"

# Файл, за яким ведеться спостереження. Зміна цього файлу скидає таймер.
TENNIS_CHANNEL="/Users/Shared/Predator_60/agent_tennis_channel.md"

# Файл, де зберігається назва поточної активної моделі.
MODEL_FILE="/Users/Shared/Predator_60/current_model.txt"

# Файл для тимчасового вимкнення сповіщень.
# Якщо цей файл існує, сповіщення не надсилатимуться. Створіть його: touch /Users/Shared/Predator_60/conf/mute_notifications.flag
NOTIFICATION_MUTE_FILE="/Users/Shared/Predator_60/conf/mute_notifications.flag"

# -- Налаштування таймерів (у секундах) --

# Час простою, після якого відбувається зміна моделі.
IDLE_TIMEOUT=180

# -- Сповіщення в Telegram --
# 1. Створіть бота через @BotFather та отримайте токен.
# 2. Напишіть боту /start та отримайте chat_id за посиланням:
#    https://api.telegram.org/bot<ВАШ_ТОКЕН>/getUpdates
# 3. Вставте отримані значення сюди.
TELEGRAM_BOT_TOKEN=""
TELEGRAM_CHAT_ID=""

# -- Список доступних моделей --
# Порядок моделей важливий для ротації. Скрипт перемкне на наступну модель у списку.
MODELS=(
    "gpt-4o"
    "claude-3-opus-20240229"
    "gemini-1.5-pro-latest"
    "gpt-4-turbo"
)