syntax = "proto3";

package predator.swarm.v1;

// Service for Constitutional Governance (Arbiter)
service ArbiterService {
    // Check if an action is constitutionally allowed
    rpc CheckAuthorization (AuthorizationRequest) returns (AuthorizationResponse);

    // Log an action to the Truth Ledger
    rpc ReportAction (ActionLog) returns (ActionResponse);
}

// Service for Inter-Agent Swarm Communication
service SwarmService {
    // Broadcast an event to the swarm
    rpc BroadcastEvent (SwarmEvent) returns (SwarmAck);

    // Propose a change for swarm consensus
    rpc ProposeAction (Proposal) returns (ConsensusResponse);
}

// Messages

message AuthorizationRequest {
    string agent_id = 1;
    string action_type = 2;
    string target_resource = 3;
    map<string, string> context = 4;
}

message AuthorizationResponse {
    bool allowed = 1;
    string reason = 2;
    string signature = 3;
    float confidence_score = 4;
}

message ActionLog {
    string agent_id = 1;
    string action_type = 2;
    string payload_json = 3;
    string timestamp = 4;
    string signature = 5;
}

message ActionResponse {
    bool success = 1;
    string ledger_hash = 2;
}

message SwarmEvent {
    string event_id = 1;
    string source_agent = 2;
    string event_type = 3;
    string payload_json = 4;
    int32 importance = 5; // 0-100
    string timestamp = 6;
}

message SwarmAck {
    bool received = 1;
}

message Proposal {
    string proposal_id = 1;
    string proposer_agent = 2;
    string description = 3;
    string changes_json = 4;
}

message ConsensusResponse {
    bool approved = 1;
    int32 votes_for = 2;
    int32 votes_against = 3;
    string decision_rationale = 4;
}
