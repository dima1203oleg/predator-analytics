# ═══════════════════════════════════════════════════════════════════════════════
# 🦁 PREDATOR ANALYTICS — SonarQube Project Configuration
# Автоматичне сканування: OWASP Top 10, Code Smells, Technical Debt
# ═══════════════════════════════════════════════════════════════════════════════

# Ідентифікація проекту
sonar.projectKey=predator-analytics
sonar.projectName=PREDATOR Analytics
sonar.projectVersion=45.0

# Інтерфейс SonarQube
sonar.host.url=http://194.177.1.240:9100

# ═══════════════════════════════════════════════════════════════════════════════
# Шляхи до коду
# ═══════════════════════════════════════════════════════════════════════════════
sonar.sources=app,services,libs,apps/predator-analytics-ui/src
sonar.tests=tests,apps/predator-analytics-ui/src/__tests__

# ═══════════════════════════════════════════════════════════════════════════════
# Python Backend
# ═══════════════════════════════════════════════════════════════════════════════
sonar.python.version=3.12
sonar.python.coverage.reportPaths=coverage.xml
sonar.python.pylint.reportPaths=pylint-report.txt

# ═══════════════════════════════════════════════════════════════════════════════
# TypeScript/JavaScript Frontend
# ═══════════════════════════════════════════════════════════════════════════════
sonar.typescript.lcov.reportPaths=apps/predator-analytics-ui/coverage/lcov.info
sonar.javascript.lcov.reportPaths=apps/predator-analytics-ui/coverage/lcov.info

# ═══════════════════════════════════════════════════════════════════════════════
# Виключення (НЕ сканувати)
# ═══════════════════════════════════════════════════════════════════════════════
sonar.exclusions=\
  **/node_modules/**,\
  **/.venv/**,\
  **/dist/**,\
  **/build/**,\
  **/__pycache__/**,\
  **/migrations/**,\
  **/alembic/**,\
  **/*.min.js,\
  **/*.min.css,\
  **/vendor/**,\
  **/mock-api-server.mjs,\
  **/venv/**,\
  **/.git/**

sonar.test.exclusions=\
  **/node_modules/**,\
  **/.venv/**

# ═══════════════════════════════════════════════════════════════════════════════
# Quality Gate — блокує merge якщо:
# - Нових багів > 0
# - Security Hotspots > 0  
# - Coverage < 70%
# - Duplications > 3%
# ═══════════════════════════════════════════════════════════════════════════════
sonar.qualitygate.wait=true

# Кодування файлів
sonar.sourceEncoding=UTF-8

# Мова інтерфейсу
sonar.language=py,ts,js
