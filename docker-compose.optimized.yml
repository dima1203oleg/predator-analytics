# Predator Analytics v29.1 - HYPER-OPTIMIZED Production Stack
# 🚀 Focus: Stability, Resource Isolation, and Auto-Healing

services:
  # --- INFRASTRUCTURE (Tier 1) ---
  postgres:
    image: timescale/timescaledb:latest-pg15
    container_name: predator_postgres_opt
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-666666}
      POSTGRES_DB: predator_db
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d predator_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [predator-net]

  redis:
    image: redis:7-alpine
    container_name: predator_redis_opt
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    deploy:
      resources:
        limits:
          memory: 768M
    networks: [predator-net]

  # --- GOVERNANCE (Tier 2) ---
  governance:
    build:
      context: .
      dockerfile: services/constitutional-core/Dockerfile
    container_name: predator_governance_opt
    environment:
      - DATABASE_URL=postgresql+asyncpg://admin:666666@postgres:5432/predator_db
      - REDIS_URL=redis://redis:6379/0
      - SOM_RING_LEVEL=active_guardian
    depends_on:
      postgres: { condition: service_healthy }
    deploy:
      resources:
        limits:
          memory: 1G
    networks: [predator-net]

  # --- AI ORCHESTRATION (Tier 3) ---
  orchestrator:
    build:
      context: .
      dockerfile: services/orchestrator/Dockerfile
    container_name: predator_orchestrator_opt
    network_mode: host # Swarm-ready
    env_file: [.env]
    volumes:
      - ./data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock # For Training Trigger
    restart: always

  # --- AI ENGINES (Tier 4) ---
  ollama:
    image: ollama/ollama:latest
    container_name: predator_ollama_opt
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes: [ollama_data:/root/.ollama]
    networks: [predator-net]

networks:
  predator-net:
    driver: bridge

volumes:
  ollama_data:
  postgres_data:
