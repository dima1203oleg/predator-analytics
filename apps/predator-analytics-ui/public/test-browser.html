<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест браузера</title>
    <style>
        body { margin: 0; padding: 20px; background: #050608; color: white; font-family: monospace; }
        .success { color: #00ff41; }
        .error { color: #ff3333; }
        .info { color: #00f0ff; }
    </style>
</head>
<body>
    <div id="test-results">
        <div class="info">Перевірка браузера...</div>
    </div>
    <script>
        const results = document.getElementById('test-results');
        
        // Тест 1: JavaScript працює
        try {
            results.innerHTML += '<div class="success">✅ JavaScript працює</div>';
        } catch (e) {
            results.innerHTML += '<div class="error">❌ JavaScript помилка: ' + e.message + '</div>';
        }
        
        // Тест 2: React
        try {
            results.innerHTML += '<div class="info">⏳ Завантаження React через Vite...</div>';
        } catch (e) {
            results.innerHTML += '<div class="error">❌ React помилка: ' + e.message + '</div>';
        }
        
        // Тест 3: WebGL
        try {
            const canvas = document.createElement('canvas');
            const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
            if (gl) {
                results.innerHTML += '<div class="success">✅ WebGL підтримується</div>';
            } else {
                results.innerHTML += '<div class="error">❌ WebGL не підтримується</div>';
            }
        } catch (e) {
            results.innerHTML += '<div class="error">❌ WebGL помилка: ' + e.message + '</div>';
        }
        
        // Перенаправлення на головний додаток через 2 секунди
        setTimeout(() => {
            window.location.href = '/';
        }, 2000);
    </script>
</body>
</html>
