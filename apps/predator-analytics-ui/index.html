<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Predator v55 | Нейронна Аналітика</title>
    <meta name="description" content="AI-Native Мультиагентна Аналітична Платформа" />
    <!-- Миттєвий чорний екран + pre-boot індикатор (до React) -->
    <style>
      html, body { margin: 0; padding: 0; background: #000; }
      #root:empty {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        width: 100vw;
        background: #000;
      }
      #root:empty::before {
        content: '';
        width: 48px;
        height: 48px;
        border: 2px solid rgba(6,182,212,0.15);
        border-top-color: #06b6d4;
        border-radius: 50%;
        animation: pre-boot-spin 0.8s linear infinite;
      }
      #root:empty::after {
        content: 'P';
        position: absolute;
        font-family: -apple-system, sans-serif;
        font-size: 18px;
        font-weight: 900;
        color: #06b6d4;
        opacity: 0.8;
        animation: pre-boot-pulse 1.5s ease-in-out infinite;
      }
      @keyframes pre-boot-spin {
        to { transform: rotate(360deg); }
      }
      @keyframes pre-boot-pulse {
        0%, 100% { opacity: 0.4; }
        50% { opacity: 1; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
