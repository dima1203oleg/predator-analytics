<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Predator v56.1 Nexus | Стратегічне Ядро Аналітики</title>
    <meta name="description" content="Суверенна AI-Native Платформа Кібер-Розвідки та OSINT" />
    <!-- Миттєвий чорний екран + NEXUS pre-boot індикатор -->
    <style>
      html, body { margin: 0; padding: 0; background: #010409; cursor: crosshair; }
      #root:empty {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        width: 100vw;
        background: #010409;
      }
      #root:empty::before {
        content: '';
        width: 60px;
        height: 60px;
        border: 1px solid rgba(34,211,238,0.1);
        border-top: 2px solid #22d3ee;
        border-right: 2px solid #22d3ee;
        border-radius: 50%;
        animation: pre-boot-spin 0.6s linear infinite;
        box-shadow: 0 0 20px rgba(34,211,238,0.2);
      }
      #root:empty::after {
        content: 'NEXUS';
        position: absolute;
        font-family: 'Inter', system-ui, sans-serif;
        letter-spacing: 0.3em;
        font-size: 10px;
        font-weight: 900;
        color: #22d3ee;
        opacity: 0.8;
        margin-top: 100px;
        animation: pre-boot-pulse 2s ease-in-out infinite;
      }
      @keyframes pre-boot-spin {
        to { transform: rotate(360deg); }
      }
      @keyframes pre-boot-pulse {
        0%, 100% { opacity: 0.3; transform: scale(0.95); }
        50% { opacity: 1; transform: scale(1.05); }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
