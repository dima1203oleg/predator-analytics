# PREDATOR Analytics v4.0 - Production Nginx Configuration
# Optimized for performance, security, and reliability

# Upstream backend servers
upstream predator_api {
    least_conn;
    server ${API_UPSTREAM} max_fails=3 fail_timeout=30s;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=static:10m rate=20r/s;
limit_req_zone $binary_remote_addr zone=health:10m rate=30r/s;

# Connection limiting
limit_conn_zone $binary_remote_addr zone=conn_limit_per_ip:10m;

server {
    listen 8080;
    server_name _;
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    
    # Content Security Policy
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self' https://api.predator.analytics https://analytics.predator.analytics; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;
    
    # Performance headers
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    add_header Vary "Accept-Encoding" always;
    
    # Connection limiting
    limit_conn conn_limit_per_ip 20;
    
    # Root directory
    root /usr/share/nginx/html;
    index index.html;
    
    # Health check endpoint
    location /health {
        limit_req zone=health burst=10 nodelay;
        access_log off;
        return 200 '{"status":"healthy","timestamp":"$time_iso8601","version":"4.0.0","environment":"${NODE_ENV}"}';
        add_header Content-Type application/json;
    }
    
    # Metrics endpoint
    location /metrics {
        limit_req zone=health burst=5 nodelay;
        access_log off;
        return 200 "# HELP http_requests_total Total HTTP requests\n# TYPE http_requests_total counter\nhttp_requests_total{method=\"GET\",status=\"200\"} 1\n";
        add_header Content-Type text/plain;
    }
    
    # API proxy
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        
        # Proxy settings
        proxy_pass http://predator_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        
        # Timeouts
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
        
        # Buffering
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;
        
        # Cache API responses
        proxy_cache_valid 200 302 1m;
        proxy_cache_valid 404 1m;
        proxy_cache_key $scheme$proxy_host$request_uri;
    }
    
    # Static assets with long caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        limit_req zone=static burst=50 nodelay;
        
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Vary "Accept-Encoding";
        
        # Gzip compression
        gzip_static on;
        
        # Security headers for static assets
        add_header X-Content-Type-Options "nosniff" always;
        
        # Error handling
        try_files $uri =404;
    }
    
    # HTML files with short caching
    location ~* \.(html)$ {
        limit_req zone=static burst=20 nodelay;
        
        expires 1h;
        add_header Cache-Control "public, max-age=3600, must-revalidate";
        
        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        
        # Error handling
        try_files $uri =404;
    }
    
    # Service Worker
    location /sw.js {
        expires 0;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }
    
    # Manifest and other app files
    location ~* \.(manifest|webapp|appcache)$ {
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
    }
    
    # Main application (SPA)
    location / {
        limit_req zone=static burst=30 nodelay;
        
        # Try to serve static file first, then fallback to index.html
        try_files $uri $uri/ /index.html;
        
        # Security headers for main app
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
    }
    
    # Error pages
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
    
    location = /404.html {
        root /usr/share/nginx/html;
        internal;
    }
    
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
    
    # Disable access to sensitive files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    location ~ ~$ {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    # Logging
    access_log /var/log/nginx/access.log combined buffer=32k flush=1m;
    error_log /var/log/nginx/error.log warn;
    
    # Performance optimization
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    
    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        application/atom+xml
        application/javascript
        application/json
        application/rss+xml
        application/vnd.ms-fontobject
        application/x-font-ttf
        application/x-web-app-manifest+json
        image/svg+xml
        image/x-icon
        text/css
        text/plain
        text/x-component;
    
    # MIME types
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
}
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Проксі для API v1
    location /api/v1/ {
        set $api_backend ${API_UPSTREAM};
        proxy_pass $api_backend;
        
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Таймаути з'єднання
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Кешуємо лише безпечні GET/HEAD запити
        proxy_cache api_cache;
        proxy_cache_methods GET HEAD;
        proxy_cache_valid 200 10m;
        proxy_cache_valid 404 1m;
        proxy_cache_key "$scheme$request_method$host$request_uri";
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        add_header X-Cache-Status $upstream_cache_status;
    }

    # Проксі для API v45
    location /api/v45/ {
        set $api_v45 ${API_UPSTREAM};
        proxy_pass $api_v45;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Проксі для статичних файлів backend
    location /static/ {
        set $api_backend_static ${API_UPSTREAM};
        proxy_pass $api_backend_static;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Ендпоїнт health check
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Метрики не експонуємо
    location /metrics {
        access_log off;
        return 404;
    }

    # Заборона доступу до службових файлів
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }

    # Логи
    access_log /var/log/nginx/access.log combined buffer=32k flush=5s;
    error_log /var/log/nginx/error.log warn;
}
