# 🚀 PREDATOR Analytics UI - Kubernetes Deployment
# Version: v55.1.0
# Purpose: Production-ready Kubernetes deployment

apiVersion: apps/v1
kind: Deployment
metadata:
  name: predator-frontend
  namespace: predator
  labels:
    app: predator-frontend
    version: v55.1.0
    component: frontend
    environment: production
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: predator-frontend
  template:
    metadata:
      labels:
        app: predator-frontend
        version: v55.1.0
        component: frontend
        environment: production
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3030"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
      containers:
      - name: frontend
        image: ghcr.io/dima1203oleg/predator-analytics-ui:v55.1.0-production
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 3030
          protocol: TCP
        env:
        - name: VITE_API_URL
          value: "http://predator-core-api.predator.svc.cluster.local:8000"
        - name: NODE_ENV
          value: "production"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        startupProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 6
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
            - ALL
        volumeMounts:
        - name: nginx-cache
          mountPath: /var/cache/nginx
        - name: nginx-logs
          mountPath: /var/log/nginx
      volumes:
      - name: nginx-cache
        emptyDir: {}
      - name: nginx-logs
        emptyDir: {}
      imagePullSecrets:
      - name: ghcr-secret
      nodeSelector:
        kubernetes.io/os: linux
      tolerations:
      - key: "node-role.kubernetes.io/master"
        operator: "Exists"
        effect: "NoSchedule"
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - predator-frontend
              topologyKey: kubernetes.io/hostname

---
apiVersion: v1
kind: Service
metadata:
  name: predator-frontend
  namespace: predator
  labels:
    app: predator-frontend
    version: v55.1.0
    component: frontend
    environment: production
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "3030"
    prometheus.io/path: "/metrics"
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 3030
    targetPort: http
    protocol: TCP
  selector:
    app: predator-frontend

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: predator-frontend
  namespace: predator
  labels:
    app: predator-frontend
    component: frontend
    environment: production

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: predator-frontend
  namespace: predator
  labels:
    app: predator-frontend
    component: frontend
    environment: production
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: predator-frontend

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: predator-frontend
  namespace: predator
  labels:
    app: predator-frontend
    component: frontend
    environment: production
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: predator-frontend
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 10
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: predator-frontend
  namespace: predator
  labels:
    app: predator-frontend
    component: frontend
    environment: production
spec:
  podSelector:
    matchLabels:
      app: predator-frontend
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    - podSelector:
        matchLabels:
          app: predator-frontend
    ports:
    - protocol: TCP
      port: 3030
  egress:
  - to:
    - podSelector:
        matchLabels:
          app: predator-core-api
    ports:
    - protocol: TCP
      port: 8000
  - to: []
    ports:
    - protocol: TCP
      port: 53
      port: 443
    - protocol: UDP
      port: 53
  - to: []
    ports:
    - protocol: TCP
      port: 80
      port: 443

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: predator-frontend-config
  namespace: predator
  labels:
    app: predator-frontend
    component: frontend
    environment: production
data:
  nginx.conf: |
    # Production Nginx Configuration
    worker_processes auto;
    error_log /var/log/nginx/error.log warn;
    pid /var/run/nginx.pid;
    
    events {
        worker_connections 1024;
        use epoll;
        multi_accept on;
    }
    
    http {
        include /etc/nginx/mime.types;
        default_type application/octet-stream;
        
        # Logging
        log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                        '$status $body_bytes_sent "$http_referer" '
                        '"$http_user_agent" "$http_x_forwarded_for"';
        
        access_log /var/log/nginx/access.log main;
        
        # Performance
        sendfile on;
        tcp_nopush on;
        tcp_nodelay on;
        keepalive_timeout 65;
        types_hash_max_size 2048;
        client_max_body_size 100M;
        
        # Gzip compression
        gzip on;
        gzip_vary on;
        gzip_min_length 1000;
        gzip_comp_level 6;
        gzip_types
            text/plain
            text/css
            text/xml
            text/javascript
            application/javascript
            application/xml+rss
            application/json;
        
        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        
        # Rate limiting
        limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
        limit_req_zone $binary_remote_addr zone=static:10m rate=50r/s;
        
        server {
            listen 3030;
            server_name _;
            root /usr/share/nginx/html;
            index index.html;
            
            # Health check
            location /health {
                access_log off;
                return 200 "healthy\n";
                add_header Content-Type text/plain;
            }
            
            # Static assets with caching
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
                expires 30d;
                add_header Cache-Control "public, immutable";
                add_header Vary "Accept-Encoding";
                limit_req zone=static burst=20 nodelay;
                access_log off;
            }
            
            # API proxy with rate limiting
            location /api/ {
                limit_req zone=api burst=5 nodelay;
                proxy_pass http://predator-core-api.predator.svc.cluster.local:8000;
                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection "upgrade";
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_connect_timeout 60s;
                proxy_send_timeout 60s;
                proxy_read_timeout 60s;
                proxy_buffering on;
                proxy_buffer_size 4k;
                proxy_buffers 8 4k;
                proxy_busy_buffers_size 8k;
            }
            
            # SPA routing
            location / {
                try_files $uri $uri/ /index.html;
                add_header Cache-Control "no-cache, no-store, must-revalidate";
                add_header Pragma "no-cache";
                add_header Expires "0";
            }
            
            # Deny access to sensitive files
            location ~ /\. {
                deny all;
                access_log off;
                log_not_found off;
            }
            
            # Custom error pages
            error_page 404 /404.html;
            error_page 500 502 503 504 /50x.html;
            
            location = /50x.html {
                root /usr/share/nginx/html;
            }
        }
    }

---
apiVersion: v1
kind: Secret
metadata:
  name: predator-frontend-secrets
  namespace: predator
  labels:
    app: predator-frontend
    component: frontend
    environment: production
type: Opaque
data:
  # Base64 encoded values
  # VITE_API_URL: aHR0cDovL3ByZWRhdG9yLWNvcmUtYXBpLnByZWRhdG9yLnN2Yy5jbHVzdGVyLmxvY2FsOjgwMDA=
  # NODE_ENV: cHJvZHVjdGlvbg==
