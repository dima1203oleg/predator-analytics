<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PREDATOR LUNAR survival</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #09090b; color: #f4f4f5; font-family: sans-serif; }
        .predator-card { background: #18181b; border: 1px solid #27272a; border-radius: 8px; padding: 20px; }
        .status-active { color: #22c55e; }
        .blink { animation: blinker 1.5s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [channels, setChannels] = useState([]);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                fetch('/api/v1/sources/connectors')
                    .then(r => r.json())
                    .then(data => {
                        setChannels(data);
                        setLoading(false);
                    })
                    .catch(err => console.error(err));

                const interval = setInterval(() => {
                    fetch('/api/v1/sources/connectors')
                        .then(r => r.json())
                        .then(setChannels);
                }, 5000);
                return () => clearInterval(interval);
            }, []);

            return (
                <div className="min-h-screen p-8">
                    <header className="flex justify-between items-center mb-12">
                        <div>
                            <h1 className="text-3xl font-bold tracking-tighter text-red-500">PREDATOR <span className="text-white">v31</span></h1>
                            <p className="text-zinc-500 text-sm">SURVIVAL MODE (NO-NODE-MODULES)</p>
                        </div>
                        <div className="flex items-center gap-4">
                            <div className="bg-red-500/10 text-red-500 px-3 py-1 rounded-full text-xs font-mono blink border border-red-500/20">
                                LIVE MONITORING ACTIVE
                            </div>
                        </div>
                    </header>

                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        {channels.map(ch => (
                            <div key={ch.id} className="predator-card hover:border-red-500/50 transition-colors">
                                <div className="flex justify-between items-start mb-4">
                                    <h3 className="font-bold text-lg">{ch.name}</h3>
                                    <span className="text-[10px] bg-zinc-800 px-2 py-0.5 rounded text-zinc-400">ID: {ch.id}</span>
                                </div>
                                <p className="text-zinc-400 text-sm mb-4 truncate italic">{ch.description || ch.url}</p>
                                <div className="flex justify-between items-center">
                                    <span className="text-xs text-zinc-500">Last Sync: {ch.last_sync ? new Date(ch.last_sync).toLocaleTimeString() : 'Waiting...'}</span>
                                    <div className="flex items-center gap-1.5">
                                        <div className="w-2 h-2 rounded-full bg-green-500 shadow-[0_0_8px_rgba(34,197,94,0.5)]"></div>
                                        <span className="text-xs uppercase font-bold text-green-500">Active</span>
                                    </div>
                                </div>
                            </div>
                        ))}

                        {channels.length === 0 && !loading && (
                            <div className="col-span-full predator-card text-center py-12 text-zinc-500">
                                No active channels found in /tmp/predator_channels.json
                            </div>
                        )}
                    </div>

                    <footer className="mt-12 pt-8 border-t border-zinc-800 text-zinc-600 text-xs flex justify-between">
                        <div>OODA LOOP: OBSERVE > ORIENT > DECIDE > ACT</div>
                        <div className="font-mono">BYPASSING DARWIN_ARM64_EPERM_LOCK</div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
