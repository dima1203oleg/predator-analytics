apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: predator-analytics-v25
  namespace: argocd
  labels:
    version: v25.0.0
    stack: predator
spec:
  project: default
  source:
    repoURL: "https://github.com/dima1203oleg/predator-analytics.git"
    targetRevision: main
    path: k8s/overlays/prod
  destination:
    server: "https://kubernetes.default.svc"
    namespace: predator-v25
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
