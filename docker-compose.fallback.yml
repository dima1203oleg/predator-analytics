version: '3.8'

name: predator-fallback

services:
  postgres:
    image: timescale/timescaledb:latest-pg15
    container_name: predator_postgres_fallback
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-predator_password}
      POSTGRES_DB: ${POSTGRES_DB:-predator_db}
    ports:
      - "5432:5432"
    deploy:
      resources:
        limits:
          memory: 800M
    restart: unless-stopped
    networks: [predator-fallback-net]

  redis:
    image: redis:7-alpine
    container_name: predator_redis_fallback
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    deploy:
      resources:
        limits:
          memory: 300M
    restart: unless-stopped
    networks: [predator-fallback-net]

  minio:
    image: minio/minio:latest
    container_name: predator_minio_fallback
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-predator_password}
    ports:
      - "9000:9000"
      - "9001:9001"
    deploy:
      resources:
        limits:
          memory: 300M
    restart: unless-stopped
    networks: [predator-fallback-net]

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: predator_litellm_fallback
    ports:
      - "4000:4000"
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-predator-litellm-secret}
    command: ["--port", "4000", "--num_workers", "1"]
    deploy:
      resources:
        limits:
          memory: 512M
    restart: unless-stopped
    networks: [predator-fallback-net]

  backend:
    image: ghcr.io/dima1203oleg/predator-backend:latest
    container_name: predator_backend_fallback
    ports:
      - "9080:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-predator_password}@postgres:5432/${POSTGRES_DB:-predator_db}
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      LITELLM_BASE_URL: http://litellm:4000
      LITELLM_API_KEY: ${LITELLM_MASTER_KEY:-predator-litellm-secret}
      ENV: production
      # Disable heavy features for fallback
      USE_KAFKA: "false"
      USE_OPENSEARCH: "false"
      USE_QDRANT: "false"
    depends_on:
      - postgres
      - redis
    deploy:
      resources:
        limits:
          memory: 1G
    restart: unless-stopped
    networks: [predator-fallback-net]

  frontend:
    image: ghcr.io/dima1203oleg/predator-frontend:latest
    container_name: predator_frontend_fallback
    ports:
      - "3030:80"
    environment:
      VITE_API_URL: "http://localhost:9080"
      VITE_LITELLM_URL: "http://localhost:4000"
    deploy:
      resources:
        limits:
          memory: 300M
    restart: unless-stopped
    networks: [predator-fallback-net]

networks:
  predator-fallback-net:
    driver: bridge
