# PREDATOR Analytics - Global Discovery Manifest
# Версія: 57.0-ELITE
# Цей файл визначає глобальний перелік джерел даних (категорій), які мають бути
# автоматично виявлені, проаналізовані та інтегровані через AI Autonomous Factory.

categories:
  - id: "cat_government"
    name: "Державні реєстри та суди"
    sources:
      - id: "state_registries"
        name: "Державні реєстри"
        type: "ckan"
        url: "https://data.gov.ua/api/3/action/package_search"
        priority: "high"
        tags: ["registry", "business", "legal"]
        instruction: "Find unified state registries of legal entities and real estate."

      - id: "courts_law"
        name: "Суди та законодавство"
        type: "web_scrape"
        url: "https://reyestr.court.gov.ua/"
        priority: "high"
        tags: ["courts", "law"]
        instruction: "Find court decisions and legislative acts APIs."

  - id: "cat_osint"
    name: "OSINT та Аналітика"
    sources:
      - id: "tenders_spending"
        name: "Тендери та фінанси"
        type: "openapi"
        url: "https://public.api.openprocurement.org/api/2.5/tenders"
        priority: "high"
        instruction: "Connect to Prozorro."

      - id: "pep_sanctions"
        name: "ПЕП та санкції"
        type: "json"
        url: "https://pep.org.ua/uk/api/"
        priority: "critical"
        instruction: "Extract PEP lists."

  - id: "cat_darkweb_social"
    name: "Тіньові та соціальні"
    proxy_strategy: "tor"
    sources:
      - id: "social_networks"
        name: "Соціальні мережі"
        type: "api"
        url: "https://api.telegram.org"
      - id: "dark_web"
        name: "Dark Web"
        type: "web_scrape"
        url: "http://onion"
