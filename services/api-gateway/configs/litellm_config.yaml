# ============================================================================
# LITELLM GATEWAY CONFIGURATION
# Predator Analytics v25.0 - Multi-LLM Router with Failover
# ============================================================================

# Основні моделі з автоматичним failover
model_list:
  # ========== PRIMARY: Anthropic Claude ==========
  - model_name: predator-main
    litellm_params:
      model: anthropic/claude-3-5-sonnet-20241022
      api_key: os.environ/ANTHROPIC_API_KEY
      max_tokens: 4096
      temperature: 0.7
    model_info:
      description: "Primary analysis model - Claude 3.5 Sonnet"
      tier: primary

  # ========== BACKUP: OpenAI GPT-4 ==========
  - model_name: predator-main
    litellm_params:
      model: openai/gpt-4o
      api_key: os.environ/OPENAI_API_KEY
      max_tokens: 4096
      temperature: 0.7
    model_info:
      description: "Backup model - GPT-4 Optimized"
      tier: backup

  # ========== FAST: Groq LLaMA ==========
  - model_name: predator-fast
    litellm_params:
      model: groq/llama-3.1-70b-versatile
      api_key: os.environ/GROQ_API_KEY
      max_tokens: 2048
      temperature: 0.5
    model_info:
      description: "Fast inference for quick responses"
      tier: fast

  # ========== LOCAL: Ollama (Fallback) ==========
  - model_name: predator-local
    litellm_params:
      model: ollama/llama3.1
      api_base: http://localhost:11434
      max_tokens: 2048
    model_info:
      description: "Local fallback when cloud is unavailable"
      tier: local

  # ========== EMBEDDINGS ==========
  - model_name: embed-multilingual
    litellm_params:
      model: openai/text-embedding-3-small
      api_key: os.environ/OPENAI_API_KEY
    model_info:
      description: "Multilingual embeddings for Ukrainian/English"

# ============================================================================
# ROUTER SETTINGS
# ============================================================================
router_settings:
  # Стратегія маршрутизації
  routing_strategy: latency-based-routing

  # Fallback chain
  fallbacks:
    - predator-main: [predator-fast, predator-local]

  # Context window fallbacks (якщо запит занадто довгий)
  context_window_fallbacks:
    - predator-main: [predator-fast]

  # Rate limit handling
  allowed_fails: 3
  cooldown_time: 60 # seconds

  # Retry policy
  num_retries: 3
  retry_after: 5 # seconds

# ============================================================================
# REDIS CACHE
# ============================================================================
litellm_settings:
  # Кешування для економії та швидкості
  cache: true
  cache_params:
    type: redis
    host: redis
    port: 6379
    ttl: 3600 # 1 година

  # Логування
  set_verbose: false
  json_logs: true

  # Rate limiting
  max_budget: 100 # $100/day limit
  budget_duration: 1d

  # Timeouts
  request_timeout: 120
  stream_timeout: 300

# ============================================================================
# GUARDRAILS
# ============================================================================
guardrails:
  - guardrail_name: content-filter
    litellm_params:
      guardrail: aporia
      mode: pre_call
      api_key: os.environ/APORIA_API_KEY

# ============================================================================
# CUSTOM CALLBACKS
# ============================================================================
callbacks:
  - custom_callback_class: app.services.llm_council.callbacks.PredatorCallback
