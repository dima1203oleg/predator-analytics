# ══════════════════════════════════════════════════════════════════
# Маршрутизатор: Usage-Based Routing v2
# Балансує 15 ключів + автоматичний failover на Ollama
# ══════════════════════════════════════════════════════════════════
router_settings:
  routing_strategy: usage-based-routing-v2
  num_retries: 5                              # 5 спроб (більше ключів)
  timeout: 60
  retry_after: 3                              # 3 секунди між спробами
  allowed_fails: 3                            # 3 невдачі до блокування ключа
  cooldown_time: 120                          # секунд до повернення ключа

  # Redis для спільного стану між LiteLLM worker-ами
  redis_host: redis
  redis_port: 6379
  redis_password: os.environ/REDIS_PASSWORD_LITE

  # Semantic Cache — кешує ідентичні запити (економія RPM)
  cache_params:
    type: redis
    max_connections: 100
    supported_call_types:
      - acompletion
      - completion
      - embedding

  # ── Fallback: якщо Gemini вичерпано → Ollama GPU ──
  fallbacks:
    - gemini-flash: [ollama-coder]
    - gemini-thinking: [ollama-qwen]
    - gemini-pro: [ollama-qwen]

# ══════════════════════════════════════════════════════════════════
# Загальні налаштування LiteLLM Proxy
# ══════════════════════════════════════════════════════════════════
general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL
  store_model_in_db: true
  disable_spend_logs: false

  # CORS для Mac Frontend + Tailscale
  allow_origins:
    - "http://localhost:3030"
    - "http://127.0.0.1:3030"
    - "http://194.177.1.240:3030"
    - "http://predator-server:3030"          # Tailscale hostname
    - "*"

litellm_settings:
  success_callback: ["prometheus"]
  failure_callback: ["prometheus"]
  json_logs: true
  set_verbose: false
  drop_params: true
  # Бюджетування
  max_budget: 100.0                           # Максимальний бюджет (долари)
  budget_duration: "30d"                      # Період бюджету
