[pytest]
minversion = 8.0
asyncio_mode = auto

# Де шукати тести
testpaths = tests

# Патерни файлів і класів
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Шляхи до Python модулів (поточна директорія core-api)
pythonpath = .

# Опції запуску
addopts =
    --strict-markers
    --strict-config
    --tb=short
    -v
    --no-header

# Фільтри попереджень
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning
    ignore::PendingDeprecationWarning
