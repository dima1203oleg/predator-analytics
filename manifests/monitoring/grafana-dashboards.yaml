apiVersion: v1
kind: ConfigMap
metadata:
  name: predator-grafana-dashboards
  namespace: predator-analytics
  labels:
    grafana_dashboard: "1"
data:
  predator-overview.json: |
    {
      "title": "Predator v25.1 Overview",
      "panels": [
        {
          "title": "Total Decisions",
          "type": "stat",
          "targets": [ { "expr": "sum(predator_decisions_total)" } ]
        },
        {
          "title": "API Request Rate",
          "type": "graph",
          "targets": [ { "expr": "rate(http_requests_total[5m])" } ]
        },
        {
          "title": "LLM Latency (p95)",
          "type": "graph",
          "targets": [ { "expr": "histogram_quantile(0.95, rate(llm_request_duration_seconds_bucket[5m]))" } ]
        },
        {
          "title": "Drift Events",
          "type": "logs",
          "targets": [ { "expr": "{app=\"sio-controller\"} |= \"drift detected\"" } ]
        }
      ]
    }
