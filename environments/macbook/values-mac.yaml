# values-mac.yaml
# ══════════════════════════════════════════════════════════════
# PREDATOR Analytics — MacBook (M3)
# РОЛЬ: ТІЛЬКИ Frontend UI (порт 3030)
# Навантаження знято: backend/DB/ML — лише на NVIDIA Server
# Frontend підключається до NVIDIA Server через VITE_API_URL
# ══════════════════════════════════════════════════════════════

namespace: predator-macbook

global:
  env: "mac-ui-only"
  imageRegistry: ghcr.io/dima1203oleg

# ============ Frontend (ЄДИНИЙ компонент на маку) ============
frontend:
  enabled: true
  image:
    repository: ghcr.io/dima1203oleg/predator-frontend
    tag: "latest"         # оновлюється CI автоматично
    pullPolicy: Always
  replicas: 1
  resources:
    limits:
      cpu: "0.5"
      memory: "512Mi"
    requests:
      cpu: "0.1"          # мінімальне навантаження на M3
      memory: "128Mi"
  service:
    type: NodePort
    port: 80
    nodePort: 3030        # http://localhost:3030
  env:
    - name: VITE_API_URL
      # ← Замінити на реальний IP/хост NVIDIA сервера
      value: "http://NVIDIA_SERVER_IP:9080"
    - name: VITE_ENV
      value: "mac-ui"
    - name: VITE_MOCK_API
      value: "false"      # реальний backend на NVIDIA

# ============ Backend — ВИМКНЕНО на маку ============
backend:
  enabled: false          # ← Виконується ТІЛЬКИ на NVIDIA Server
  # Всі запити frontend → NVIDIA_SERVER_IP:9080

# ============ PostgreSQL — ВИМКНЕНО на маку ============
postgresql:
  enabled: false          # ← Виконується ТІЛЬКИ на NVIDIA Server

# ============ Redis — ВИМКНЕНО на маку ============
redis:
  enabled: false          # ← Виконується ТІЛЬКИ на NVIDIA Server

# ============ NAS / AutoML — ВИМКНЕНО на маку ============
nas:
  enabled: false          # ← Виконується ТІЛЬКИ на NVIDIA Server

# ============ Моніторинг — легкий sidecar ============
monitoring:
  enabled: false          # Повний моніторинг на NVIDIA; на маку не потрібен

# ============ Node Selector ============
nodeSelector: {}          # Без обмежень — запускається де є

# ============ Tolerations ============
tolerations: []

# ============ Affinity ============
affinity: {}
