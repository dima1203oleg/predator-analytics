openapi: 3.0.3
info:
  title: Predator Analytics API
  version: 25.0.0
  description: |
    # 🛡️ PREDATOR ANALYTICS v45.0 API

    Незламна система аналітики з автоматичним самовідновленням.

    ## Автентифікація
    Використовуйте Bearer токен в заголовку `Authorization`.

    ## Rate Limiting
    - Explorer: 100 запитів/хвилина
    - Operator: 500 запитів/хвилина
    - Commander: без обмежень

  contact:
    name: Predator Support
    email: support@predator.ua
  license:
    name: Proprietary

servers:
  - url: http://194.177.1.240/api
    description: Production Server
  - url: http://localhost:8090/api
    description: Local Development

tags:
  - name: Health
    description: Перевірка здоров'я системи
  - name: Analysis
    description: AI-powered аналіз даних
  - name: Data Hub
    description: Управління джерелами та датасетами
  - name: Cases
    description: Управління кейсами
  - name: Council
    description: Multi-LLM Council (дебати)

paths:
  /v45/health:
    get:
      tags: [Health]
      summary: Перевірка здоров'я системи
      operationId: getHealth
      responses:
        "200":
          description: Система працює
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [healthy, degraded, critical]
                  version:
                    type: string
                  uptime_seconds:
                    type: integer

  /v45/analyze:
    post:
      tags: [Analysis]
      summary: E2E AI аналіз даних
      operationId: analyze
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - query
              properties:
                query:
                  type: string
                context:
                  type: string
                create_case:
                  type: boolean
      responses:
        "200":
          description: Результат аналізу
          content:
            application/json:
              schema:
                type: object
                properties:
                  answer:
                    type: string
                  confidence:
                    type: number

  /v1/data-hub/upload:
    post:
      tags: [Data Hub]
      summary: Завантажити файл
      operationId: uploadDataset
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "200":
          description: Файл завантажено
