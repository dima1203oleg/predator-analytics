apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: predator-default-deny
  namespace: predator-prod
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: rtb-to-mcp-router
  namespace: predator-prod
spec:
  podSelector:
    matchLabels:
      app: rtb-engine
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: sio-controller
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: mcp-router
