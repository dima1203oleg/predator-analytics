server {
    listen 80;
    server_name _;

    # Головний інтерфейс Predator (ваша існуюча система)
    location / {
        proxy_pass http://127.0.0.1:8092;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # OpenSearch Dashboards з ПРЯМОЮ УКРАЇНІЗАЦІЄЮ
    location /osd/ {
        proxy_pass http://127.0.0.1:5601/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Виключаємо стиснення, щоб Nginx міг міняти текст
        proxy_set_header Accept-Encoding "";

        # Правила перекладу на льоту
        sub_filter_once off;
        sub_filter_types text/html text/css text/javascript application/javascript application/json;

        sub_filter '"Home"' '"Головна"';
        sub_filter '"Discover"' '"Огляд даних"';
        sub_filter '"Dashboard"' '"Дашборд"';
        sub_filter '"Dashboards"' '"Дашборди"';
        sub_filter '"Visualize"' '"Візуалізація"';
        sub_filter '"Management"' '"Керування"';
        sub_filter '"Dev Tools"' '"Інструменти"';
        sub_filter '"Stack Management"' '"Система"';
        sub_filter '"Save"' '"Зберегти"';
        sub_filter '"Cancel"' '"Відмінити"';
        sub_filter '"Refresh"' '"Оновити"';
        sub_filter 'Welcome to OpenSearch Dashboards' 'Ласкаво просимо до Predator Analytics';
    }

    # API
    location /api/ {
        proxy_pass http://127.0.0.1:8090/api/;
        proxy_set_header Host $host;
    }
}
