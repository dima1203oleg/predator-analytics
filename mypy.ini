# ═══════════════════════════════════════════════════════════════════════════════
# 🦁 PREDATOR ANALYTICS — Mypy Strict Mode Configuration
# Python 3.12 | Обов'язкова типізація | Zero tolerance to untyped code
# ═══════════════════════════════════════════════════════════════════════════════

[mypy]
python_version = 3.12

# ── Strict Mode: максимально суворий ──
strict = true
warn_return_any = true
warn_unused_configs = true
warn_redundant_casts = true
warn_unused_ignores = true
no_implicit_optional = true
strict_equality = true
strict_concatenate = true

# ── Відображення помилок ──
show_error_codes = true
show_error_context = true
show_column_numbers = true
color_output = true
pretty = true

# ── Додаткові перевірки ──
check_untyped_defs = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
disallow_untyped_calls = true
disallow_untyped_decorators = true
disallow_any_generics = true
disallow_any_unimported = true
disallow_subclassing_any = true

# ── Namespace packages ──
namespace_packages = true
explicit_package_bases = true

# ── Кеш ──
cache_dir = .mypy_cache
incremental = true

# ── Шляхи до модулів проекту ──
mypy_path = .

# ═══════════════════════════════════════════════════════════════════════════════
# Бібліотеки без стабів — ігноруємо помилки імпорту
# ═══════════════════════════════════════════════════════════════════════════════

[mypy-celery.*]
ignore_missing_imports = true

[mypy-redis.*]
ignore_missing_imports = true

[mypy-qdrant_client.*]
ignore_missing_imports = true

[mypy-opensearchpy.*]
ignore_missing_imports = true

[mypy-minio.*]
ignore_missing_imports = true

[mypy-kafka.*]
ignore_missing_imports = true

[mypy-transformers.*]
ignore_missing_imports = true

[mypy-torch.*]
ignore_missing_imports = true

[mypy-numpy.*]
ignore_missing_imports = true

[mypy-pandas.*]
ignore_missing_imports = true

[mypy-openpyxl.*]
ignore_missing_imports = true

[mypy-xlrd.*]
ignore_missing_imports = true

[mypy-uvicorn.*]
ignore_missing_imports = true

[mypy-opentelemetry.*]
ignore_missing_imports = true

[mypy-prometheus_client.*]
ignore_missing_imports = true

[mypy-neo4j.*]
ignore_missing_imports = true

# ═══════════════════════════════════════════════════════════════════════════════
# Налаштування для модулів проекту
# ═══════════════════════════════════════════════════════════════════════════════

# FastAPI/Pydantic — спеціальний плагін
[mypy-pydantic.*]
init_forbid_extra = true
init_typed = true

# Тести — трохи м'якше
[mypy-tests.*]
disallow_untyped_defs = false
disallow_untyped_decorators = false

# Скрипти — допускаємо нетипізований код
[mypy-scripts.*]
disallow_untyped_defs = false
ignore_errors = true

# Міграції — автозгенерований код
[mypy-migrations.*]
ignore_errors = true

[mypy-alembic.*]
ignore_missing_imports = true
ignore_errors = true
