# Глобальні налаштування Predator Analytics
global:
  environment: production
  language: uk_UA
  pythonVersion: "3.12"
  timezone: "Europe/Kiev"

# ════ CORE SERVICES (Custom) ════

backend:
  enabled: true
  replicaCount: 1
  image:
    repository: predator/backend
    tag: v45.6
    pullPolicy: IfNotPresent
  service:
    port: 8000
  env:
    AZR_AUTONOMY_LEVEL: "full"
    SOVEREIGN_AUTO_APPROVE: "true"

frontend:
  enabled: true
  replicaCount: 1
  image:
    repository: predator/frontend
    tag: v45.6
  service:
    port: 80

orchestrator:
  enabled: true
  image:
    repository: predator/orchestrator
    tag: v45.6

constitutional_core:
  enabled: true
  image:
    repository: predator/governance
    tag: v45.6
  service:
    ports: [8091, 8092, 8093, 8094, 8095, 50051]

celery_worker:
  enabled: true
  image:
    repository: predator/backend # Uses backend image
    tag: v45.6
  replicas: 1

h2o:
  enabled: true
  automl_image: h2oai/h2o-open-source-k8s:latest
  studio_image: h2oairelease/h2oai-llmstudio-app:latest

ollama:
  enabled: true
  image: ollama/ollama:latest
  cpu_only: true

# ════ DEPENDENCIES (Bitnami & Others) ════

postgresql:
  enabled: true
  auth:
    username: predator_admin
    database: predator_db
    password: predator_password
  primary:
    persistence:
      enabled: true
      size: 10Gi

redis:
  enabled: true
  auth:
    enabled: true
    password: predator_secret_key
  architecture: standalone

rabbitmq:
  enabled: true
  auth:
    username: predator
    password: predator_secret_key

kafka:
  enabled: true
  zookeeper:
    enabled: true

minio:
  enabled: true
  auth:
    rootUser: predator_admin
    rootPassword: predator_secret_key
  persistence:
    size: 20Gi

qdrant:
  enabled: true
  replicaCount: 1

opensearch:
  enabled: true
  replicas: 1
  opensearchJavaOpts: "-Xms512m -Xmx512m"

monitoring:
  enabled: true # Prometheus + Grafana
