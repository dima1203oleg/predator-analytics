# ═══════════════════════════════════════════════════════════════
# AXIOM 4: ЗАКОН БЕЗПЕКИ
# Predator Analytics v28-S Constitutional Framework
# ═══════════════════════════════════════════════════════════════

id: "axiom_4"
name: "Закон Безпеки"
name_en: "Law of Safety"
version: "28.0"
level: "FUNDAMENTAL"
status: "ENFORCED"
created_at: "2026-01-12T22:55:00Z"
hash_algorithm: "SHA3-512"

formal_logic: |
  # Кожна дія повинна мати оцінку ризику нижче порогу
  ∀ action ∈ System.Actions:
    action.executable ⇔
      (action.risk_score < RISK_THRESHOLD)
      ∧ (∃ rollback_plan ∧ rollback_plan.tested = true)
      ∧ (action.reversible = true ∨ action.approved_irreversible = true)

  # Незворотні дії потребують спеціального затвердження
  ∀ action ∈ System.Actions:
    action.irreversible ⇒
      (action.approved_by_human = true)
      ∧ (action.alternative_count = 0)
      ∧ (action.recorded_in_ledger = true)

  # Конституційні обмеження
  RISK_THRESHOLD = 0.20  # 20% максимальний ризик

explanation: |
  Закон Безпеки встановлює пріоритет безпеки над функціональністю:

  1. ОЦІНКА РИЗИКУ: Кожна дія оцінюється на ризик перед виконанням.
     Максимально дозволений рівень ризику - 20%.

  2. ПЛАН ВІДКАТУ: Кожна дія повинна мати протестований план відкату.
     Це дозволяє швидко відновитися від помилок.

  3. ЗВОРОТНІСТЬ: Переважають зворотні дії. Незворотні дії
     потребують спеціального людського затвердження.

  4. КОНСЕРВАТИВНИЙ ПІДХІД: При сумнівах система обирає
     безпечніший шлях або відмовляється від дії.

immutability: "ABSOLUTE"

risk_assessment:
  thresholds:
    LOW:
      range: [0.00, 0.05]
      approval: "AUTO"
      description: "Автоматичне схвалення"
      examples:
        - "Читання даних"
        - "Генерація звітів"
        - "Оновлення кешу"

    MEDIUM:
      range: [0.05, 0.15]
      approval: "ARBITER_REVIEW"
      description: "Потребує огляду Arbiter"
      examples:
        - "Оновлення конфігурації"
        - "Міграція даних (зворотна)"
        - "Оптимізація алгоритмів"

    HIGH:
      range: [0.15, 0.20]
      approval: "HUMAN_APPROVAL"
      description: "Потребує людського затвердження"
      examples:
        - "Видалення даних"
        - "Зміна схеми БД"
        - "Інтеграція зовнішніх систем"

    EXTREME:
      range: [0.20, 1.00]
      approval: "BLOCKED"
      description: "Заблоковано за замовчуванням"
      examples:
        - "Зміна конституційних аксіом"
        - "Видалення критичних даних"
        - "Вимкнення безпеки"

  risk_factors:
    - factor: "data_modification"
      weight: 0.3
      levels:
        none: 0.0
        read_only: 0.0
        create: 0.1
        update: 0.2
        delete: 0.5

    - factor: "scope"
      weight: 0.2
      levels:
        single_record: 0.0
        batch: 0.2
        table: 0.4
        database: 0.7
        system: 1.0

    - factor: "reversibility"
      weight: 0.25
      levels:
        instant_rollback: 0.0
        minutes_rollback: 0.1
        hours_rollback: 0.3
        days_rollback: 0.6
        irreversible: 1.0

    - factor: "tested"
      weight: 0.15
      levels:
        production_tested: 0.0
        staging_tested: 0.2
        dev_tested: 0.4
        untested: 0.8

    - factor: "external_impact"
      weight: 0.1
      levels:
        internal_only: 0.0
        affects_users: 0.3
        affects_external_systems: 0.6
        public_facing: 0.8

rollback_plan_requirements:
  mandatory_fields:
    - field: "plan_id"
      description: "Унікальний ідентифікатор плану"

    - field: "steps"
      description: "Покрокові інструкції відкату"
      min_steps: 1

    - field: "estimated_duration_minutes"
      description: "Очікуваний час відкату"
      max_value: 60

    - field: "tested"
      description: "Чи був план протестований"
      required_value: true

    - field: "data_preservation_strategy"
      description: "Як зберігаються дані під час відкату"

    - field: "rollback_triggers"
      description: "Умови автоматичного відкату"
      min_triggers: 1

  testing_requirements:
    - "План повинен бути протестований в staging середовищі"
    - "Успішний тест не старший 7 днів"
    - "Документований результат тесту"
    - "Час виконання не перевищує estimated_duration_minutes * 1.5"

irreversible_action_protocol:
  requirements:
    - "Явне людське затвердження з authority_level >= ADMIN"
    - "Документоване обґрунтування"
    - "Підтвердження відсутності альтернатив"
    - "Запис в Truth Ledger до виконання"
    - "Пост-аудит протягом 24 годин"

  pre_execution_checks:
    - "Перевірка, що немає зворотних альтернатив"
    - "Перевірка, що затвердження отримано"
    - "Перевірка, що записано в Ledger"
    - "Перевірка, що backup створено"

  examples_of_irreversible:
    - "Видалення production даних"
    - "Зміна криптографічних ключів"
    - "Скасування інтеграцій"
    - "Архівація даних з видаленням оригіналу"

enforcement:
  primary:
    - method: "Risk Assessment Engine"
      description: "Автоматична оцінка ризику кожної дії"
      automated: true

    - method: "Rollback Plan Validator"
      description: "Валідація наявності та коректності плану відкату"
      automated: true

    - method: "Irreversibility Check"
      description: "Перевірка зворотності дії"
      automated: true

  secondary:
    - method: "Human Approval Gateway"
      description: "Шлюз для затвердження ризикових дій"
      automated: false

    - method: "Post-Execution Audit"
      description: "Аудит після виконання незворотних дій"
      automated: false

constraints:
  - id: "risk_below_threshold"
    description: "Ризик дії повинен бути нижче порогу"
    check_expression: "action.risk_score < 0.20"
    violation_severity: "CRITICAL"
    violation_action: "BLOCK_EXECUTION"

  - id: "rollback_plan_required"
    description: "Кожна дія потребує плану відкату"
    check_expression: "action.rollback_plan is not null"
    violation_severity: "HIGH"
    violation_action: "BLOCK_UNTIL_PLAN_PROVIDED"

  - id: "rollback_plan_tested"
    description: "План відкату повинен бути протестований"
    check_expression: "action.rollback_plan.tested == true"
    violation_severity: "HIGH"
    violation_action: "BLOCK_UNTIL_TESTED"

  - id: "irreversible_requires_approval"
    description: "Незворотні дії потребують затвердження"
    check_expression: "action.irreversible implies action.human_approved"
    violation_severity: "CRITICAL"
    violation_action: "BLOCK_AND_ESCALATE"

monitoring:
  metrics:
    - "actions_by_risk_level_total"
    - "actions_blocked_high_risk_total"
    - "rollback_executions_total"
    - "rollback_success_rate"
    - "irreversible_actions_total"
    - "average_risk_score"

  alerts:
    - condition: "action_risk_score > 0.15"
      severity: "HIGH"
      action: "NOTIFY_AND_REQUEST_APPROVAL"

    - condition: "rollback_plan_missing"
      severity: "CRITICAL"
      action: "BLOCK_EXECUTION"

    - condition: "rollback_failure"
      severity: "CRITICAL"
      action: "EMERGENCY_ESCALATION"
