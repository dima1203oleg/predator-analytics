# ═══════════════════════════════════════════════════════════════════════════════
# 🦁 PREDATOR ANALYTICS - RUFF CONFIGURATION v1.0
# Python Linter & Formatter - Ultra Performance Mode
# ═══════════════════════════════════════════════════════════════════════════════

# Target Python 3.12
target-version = "py312"

# Line length - matches Black default
line-length = 120

# Exclude paths from linting
exclude = [
    ".git",
    ".ruff_cache",
    ".venv",
    ".vscode",
    "__pycache__",
    "*.pyc",
    "*.pyo",
    "*.egg-info",
    "node_modules",
    "dist",
    "build",
    ".pytest_cache",
    ".mypy_cache",
    "migrations/versions/*.py",  # Auto-generated Alembic migrations
    "alembic/versions/*.py",
    "**/site-packages",
    ".devcontainer",
]

# Include these file patterns
include = ["*.py", "*.pyi"]

# Fix issues automatically where possible
fix = true

# Show fixes that were applied
show-fixes = true

# Output format
output-format = "grouped"

# ─────────────────────────────────────────────────────────────────────────────
# LINTING RULES
# ─────────────────────────────────────────────────────────────────────────────
[lint]
# Select all major rule sets for comprehensive linting
select = [
    # Core Rules
    "E",      # pycodestyle errors
    "W",      # pycodestyle warnings
    "F",      # Pyflakes (unused imports, variables, etc.)
    "I",      # isort (import sorting)
    "N",      # pep8-naming
    "UP",     # pyupgrade (Python upgrade suggestions)

    # Security & Best Practices
    "S",      # flake8-bandit (security)
    "B",      # flake8-bugbear (common bugs)
    "A",      # flake8-builtins (shadowing builtins)
    "C4",     # flake8-comprehensions
    "DTZ",    # flake8-datetimez (timezone-aware datetime)
    "T10",    # flake8-debugger (no debugger statements)
    "ISC",    # flake8-implicit-str-concat
    "ICN",    # flake8-import-conventions
    "G",      # flake8-logging-format
    "PIE",    # flake8-pie (misc lints)
    "PYI",    # flake8-pyi (type stub lints)
    "PT",     # flake8-pytest-style
    "Q",      # flake8-quotes
    "RSE",    # flake8-raise (raise statement lints)
    "RET",    # flake8-return (return statement lints)
    "SLF",    # flake8-self (private member access)
    "SIM",    # flake8-simplify
    "TID",    # flake8-tidy-imports
    "TCH",    # flake8-type-checking
    "ARG",    # flake8-unused-arguments
    "PTH",    # flake8-use-pathlib
    "ERA",    # eradicate (commented-out code)
    "PL",     # Pylint rules
    "TRY",    # tryceratops (exception handling)
    "FLY",    # flynt (f-string conversion)
    "PERF",   # Perflint (performance)
    "FURB",   # refurb (modern Python)
    "LOG",    # flake8-logging
    "RUF",    # Ruff-specific rules

    # Documentation (enabled but lenient)
    "D",      # pydocstyle (docstrings)
]

# Ignore specific rules that are too strict for this project
ignore = [
    # Docstring rules - too strict for development phase
    "D100",   # Missing docstring in public module
    "D101",   # Missing docstring in public class
    "D102",   # Missing docstring in public method
    "D103",   # Missing docstring in public function
    "D104",   # Missing docstring in public package
    "D105",   # Missing docstring in magic method
    "D107",   # Missing docstring in __init__
    "D203",   # 1 blank line required before class docstring
    "D213",   # Multi-line docstring summary should start at the second line
    "D205",   # 1 blank line between summary and description - bulk fix needed
    "D200",   # One-line docstring should fit on one line
    "D415",   # First line should end with period - bulk fix needed

    # Too strict for practical use
    "S101",   # Use of assert - needed for tests and validation
    "S104",   # Possible binding to all interfaces - needed for Docker
    "S105",   # Hardcoded password assignment - false positives
    "S106",   # Hardcoded password in function argument - false positives
    "S108",   # Probable insecure temp file usage
    "S110",   # try-except-pass detected
    "S311",   # Standard pseudo-random not for security
    "S603",   # subprocess call - checked and safe
    "S607",   # Starting a process with partial executable path
    "PLR0913",# Too many arguments - complex functions exist
    "PLR2004",# Magic value used in comparison
    "TRY003", # Long exception message - sometimes needed
    "TRY301", # raise within try - valid pattern for re-raising
    "TRY300", # Consider moving to else block - style preference
    "TRY401", # Redundant exception object in logging.exception
    "TRY400", # Use logging.exception instead of logging.error
    "TRY002", # Create custom exception class
    "ARG001", # Unused function argument - needed for callbacks/handlers
    "ARG002", # Unused method argument - needed for overrides
    "PTH123", # open() instead of pathlib - sometimes clearer
    "PTH110", # os.path.exists() - gradual migration to pathlib
    "PTH118", # os.path.join() - gradual migration to pathlib
    "RUF001", # Cyrillic chars - project uses Ukrainian
    "RUF002", # Cyrillic chars docstring
    "RUF003", # Cyrillic chars comment
    "RUF006", # Dangling asyncio tasks
    "RUF012", # Mutable class attributes ClassVar annotation

    # Bulk migration needed - will enable gradually
    "G004",   # Logging f-string - bulk fix needed across project
    "E402",   # Module level import not at top - project structure requires
    "E701",   # Multiple statements on one line - style
    "E722",   # Bare except - bulk fix needed
    "PLC0415",# Import outside top level - needed for conditional imports
    "PLW0603",# Global statement - architecture requires in some places
    "DTZ003", # datetime.utcnow() - gradual migration needed
    "DTZ005", # datetime without tzinfo - gradual migration needed
    "B904",   # raise without from - bulk fix needed
    "ERA001", # Commented code - intentional in some places
    "SLF001", # Private member access - needed for internal tools
    "PERF401",# Use list comprehension - style preference
    "F401",   # Unused import - some might be needed for side effects/future
    "F821",   # Undefined name - false positives with conditional imports
    "A002",   # Argument shadowing builtin
    "N815",   # Variable in class scope mixed case
    "N802",   # Function name in mixed case
    "TID252", # Relative imports from parent
    "PLR0915",# Too many statements
    "PLR0912",# Too many branches
    "PLR0911",# Too many returns
    "D417",   # Missing argument description
    "D106",   # Missing docstring in nested class
    "PTH120", # abspath vs Path.resolve()
    "PTH103", # makedirs vs Path.mkdir()
    "PTH202", # getsize vs Path.stat().st_size
    "PTH119", # basename vs Path.name
    "PTH109", # getcwd vs Path.cwd()
    "PTH108", # unlink vs Path.unlink()
    "B008",   # Call in function default
    "SIM102", # Combined if statements
    "S324",   # Insecure hash
    "S608",   # SQL injection string formatting
    "S602",   # subprocess shell=True
    "S314",   # XML parsing
    "G201",   # Logging .error(f"...")
    "PTH102", # os.path.exists()
    "PTH113", # os.path.islink()
    "PTH107", # os.remove()
    "PTH112", # os.path.isdir()
    "PTH100", # os.path.isabs()
    "PTH122", # os.path.splitdrive()
    "PTH208", # os.listdir()
    "PTH111", # os.path.join() with multiple args
    "N806",   # Variable name should be lowercase
    "N801",   # Class name should use CapWords
    "N818",   # Exception name should end in Error
    "E721",   # Use isinstance() instead of type() comparison
    "SIM108", # Use ternary operator
    "SIM103", # Return condition directly
    "SIM105", # with contextlib.suppress
    "PLW2901",# Loop variable overwritten
    "PLW1510",# subprocess.run without check=True
    "F811",   # Redefinition of unused name
    "F403",   # from .tasks.etl import *
    "F405",   # Name may be undefined, or defined from star imports
    "S112",   # Try-except-continue
    "S113",   # Request without timeout
    "S501",   # Insecure SSL/TLS
    "LOG015", # Use logging.exception in exception handlers
    "UP035",  # Use dict/list instead of typing.Dict/List
    "B007",   # Unused loop variable
    "B024",   # Abstract base class with no abstract methods
    "RUF100", # Unused noqa
    "PT028",  # pytest.raises with multiple exceptions
    "PLW1508",# invalid-envvar-default
    "N811",   # Constant name should be uppercase
    "B025",   # Duplicate except handler
    "ARG005", # Unused lambda argument
    "UP031",  # printf-string-formatting
    "SIM117", # Multiple with statements
    "S307",   # Use of eval()
    "S301",   # Use of pickle
    "RUF059", # Unused unpacked variable
    "PLW0602",# Using global for update
    "PLW0211",# Static method with self
    "PLC0206",# Dictionary iteration instead of items()
    "G003",   # logging using string concatenation
    "E741",   # Ambiguous variable name
    "DTZ901", # datetime.now() without tzinfo
    "DTZ007", # datetime.fromtimestamp() without tzinfo
    "DTZ004", # datetime.utcfromtimestamp()
    "B027",   # Empty body in abstract method
    "B023",   # Function definition does not bind loop variable
    "B006",   # Mutable default argument
    "B011",   # Do not assert False
    "B018",   # Found useless expression
    "B020",   # Loop control variable not used
    "B026",   # Star-arg unpacking after a keyword argument
    "SLF001", # Private member access
    "ARG004", # Unused static method argument
    "A001",   # Variable shadowing builtin
    "I001",   # Import sort mismatch

    # Conflicts with formatter
    "E501",   # Line too long - formatter handles this
    "W191",   # Indentation contains tabs
    "ISC001", # Implicitly concatenated string - conflicts with formatter
    "Q000",   # Single quotes preferred
]

# Allow autofix for these rules
fixable = ["ALL"]

# Never autofix these (might change semantics)
unfixable = []

# Allow unused variables when prefixed with underscore
dummy-variable-rgx = "^(_+|(_+[a-zA-Z0-9_]*[a-zA-Z0-9]+?))$"

# ─────────────────────────────────────────────────────────────────────────────
# IMPORT SORTING (isort)
# ─────────────────────────────────────────────────────────────────────────────
[lint.isort]
# Force single line imports from __future__
force-single-line = false

# Number of lines to separate imports sections
lines-after-imports = 2
lines-between-types = 1

# Known first-party modules (your project)
known-first-party = [
    "app",
    "services",
    "libs",
    "agents",
    "predatorctl",
    "tests",
]

# Known local-folder modules
known-local-folder = ["src"]

# Third-party libraries that should be sorted together
known-third-party = [
    "fastapi",
    "pydantic",
    "sqlalchemy",
    "celery",
    "redis",
    "httpx",
    "numpy",
    "pandas",
    "torch",
    "transformers",
    "opentelemetry",
]

# Force imports to be sorted case-insensitively
force-sort-within-sections = true

# Section order
section-order = [
    "future",
    "standard-library",
    "third-party",
    "first-party",
    "local-folder",
]

# ─────────────────────────────────────────────────────────────────────────────
# PYLINT RULES
# ─────────────────────────────────────────────────────────────────────────────
[lint.pylint]
# Maximum number of arguments for function / method
max-args = 10

# Maximum number of branches for function / method body
max-branches = 15

# Maximum number of return statements in function / method body
max-returns = 8

# Maximum number of statements in function / method body
max-statements = 60

# Maximum number of public methods for a class
max-public-methods = 25

# ─────────────────────────────────────────────────────────────────────────────
# MCCABE COMPLEXITY
# ─────────────────────────────────────────────────────────────────────────────
[lint.mccabe]
# Maximum cyclomatic complexity
max-complexity = 15

# ─────────────────────────────────────────────────────────────────────────────
# FLAKE8-BUGBEAR
# ─────────────────────────────────────────────────────────────────────────────
[lint.flake8-bugbear]
# Allow default function arguments that are mutable
extend-immutable-calls = [
    "fastapi.Depends",
    "fastapi.Query",
    "fastapi.Path",
    "fastapi.Body",
    "fastapi.Header",
    "fastapi.Cookie",
    "fastapi.Form",
    "fastapi.File",
    "pydantic.Field",
    "sqlalchemy.Column",
    "typer.Option",
    "typer.Argument",
]

# ─────────────────────────────────────────────────────────────────────────────
# FLAKE8-PYTEST-STYLE
# ─────────────────────────────────────────────────────────────────────────────
[lint.flake8-pytest-style]
# Prefer fixture over test_ prefix
fixture-parentheses = true
parametrize-names-type = "tuple"
parametrize-values-type = "list"
parametrize-values-row-type = "tuple"

# ─────────────────────────────────────────────────────────────────────────────
# PYDOCSTYLE
# ─────────────────────────────────────────────────────────────────────────────
[lint.pydocstyle]
# Use Google-style docstrings
convention = "google"

# ─────────────────────────────────────────────────────────────────────────────
# FLAKE8-TYPE-CHECKING
# ─────────────────────────────────────────────────────────────────────────────
[lint.flake8-type-checking]
# Quote annotations to avoid runtime imports
quote-annotations = true
runtime-evaluated-base-classes = [
    "pydantic.BaseModel",
    "sqlalchemy.orm.DeclarativeBase",
]
runtime-evaluated-decorators = [
    "pydantic.validate_call",
    "attrs.define",
]

# ─────────────────────────────────────────────────────────────────────────────
# FLAKE8-TIDY-IMPORTS
# ─────────────────────────────────────────────────────────────────────────────
[lint.flake8-tidy-imports]
# Banned module-level imports
ban-relative-imports = "parents"

# ─────────────────────────────────────────────────────────────────────────────
# PER-FILE IGNORES
# ─────────────────────────────────────────────────────────────────────────────
[lint.per-file-ignores]
# Test files - relaxed rules
"tests/**/*.py" = [
    "S101",    # assert is fine in tests
    "PLR2004", # magic values in tests are common
    "ARG001",  # unused fixture arguments
    "SLF001",  # private member access for testing
]
"**/test_*.py" = [
    "S101",
    "PLR2004",
    "ARG001",
    "SLF001",
]

# Migration files - auto-generated
"**/migrations/**/*.py" = ["ALL"]
"**/alembic/**/*.py" = ["ALL"]

# Init files - expected to have unused imports for re-export
"__init__.py" = ["F401", "F403"]

# Configuration files
"**/conftest.py" = ["F401", "ARG001"]

# Scripts - more relaxed
"scripts/**/*.py" = ["T201", "S603", "S607"]

# ─────────────────────────────────────────────────────────────────────────────
# FORMATTING
# ─────────────────────────────────────────────────────────────────────────────
[format]
# Use double quotes
quote-style = "double"

# Indent with spaces
indent-style = "space"

# Skip magic trailing comma
skip-magic-trailing-comma = false

# Unix line endings
line-ending = "auto"

# Enable preview style
preview = true

# Format docstrings
docstring-code-format = true
docstring-code-line-length = 80
