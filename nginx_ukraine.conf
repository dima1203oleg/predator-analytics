server {
    listen 80;
    server_name _;

    # Головний інтерфейс Predator
    location / {
        proxy_pass http://127.0.0.1:8092;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # OpenSearch Dashboards ПЕРЕКЛАДЕНИЙ
    location /search/ {
        proxy_pass http://127.0.0.1:5601/;
        proxy_set_header Host $host;
        proxy_set_header Accept-Encoding ""; # Обов'язково для роботи фільтра

        # Українізація на льоту
        sub_filter_once off;
        sub_filter_types text/html text/css text/javascript application/javascript;

        sub_filter '"Home"' '"Головна"';
        sub_filter '"Discover"' '"Огляд даних"';
        sub_filter '"Visualize"' '"Аналітика"';
        sub_filter '"Dashboard"' '"Дашборди"';
        sub_filter '"Dev Tools"' '"Інструменти"';
        sub_filter '"Management"' '"Керування"';
        sub_filter '"Stack Management"' '"Система"';
        sub_filter '"Save"' '"Зберегти"';
        sub_filter '"Cancel"' '"Відмінити"';
        sub_filter '"Refresh"' '"Оновити"';
        sub_filter 'Welcome to OpenSearch Dashboards' 'Вітаємо у Predator Analytics';
    }

    # API та інші сервіси
    location /api/ {
        proxy_pass http://127.0.0.1:8090/api/;
        proxy_set_header Host $host;
    }

    location /docs {
        proxy_pass http://127.0.0.1:8090/docs;
    }

    location /static/ {
        proxy_pass http://127.0.0.1:8090/static/;
    }
}
