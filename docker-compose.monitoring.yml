version: '3.8'

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: predator_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - predator-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: predator_grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - predator-network
    restart: unless-stopped
    depends_on:
      - prometheus

  loki:
    image: grafana/loki:latest
    container_name: predator_loki
    ports:
      - "3100:3100"
    volumes:
      - loki_data:/loki
    networks:
      - predator-network
    restart: unless-stopped

  promtail:
    image: grafana/promtail:latest
    container_name: predator_promtail
    volumes:
      - /var/log:/var/log
      - ./monitoring/promtail.yml:/etc/promtail/config.yml
    networks:
      - predator-network
    restart: unless-stopped
    depends_on:
      - loki

volumes:
  prometheus_data:
  grafana_data:
  loki_data:

networks:
  predator-network:
    driver: bridge