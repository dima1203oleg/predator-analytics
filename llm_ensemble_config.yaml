# 🤖 LLM Ensemble Configuration — Динамічний вибір моделей для агентів

# 📋 Список доступних моделей з пріоритетами
models:
  - name: gemini-2.0-flash
    provider: gemini
    priority: 1
    max_tokens: 1000000
    cost_per_1k_tokens: 0.0001
    reliability_score: 0.95
    
  - name: gemini-2.0-flash-thinking
    provider: gemini
    priority: 2
    max_tokens: 1000000
    cost_per_1k_tokens: 0.0002
    reliability_score: 0.90
    
  - name: gemini-1.5-pro
    provider: gemini
    priority: 3
    max_tokens: 2000000
    cost_per_1k_tokens: 0.0005
    reliability_score: 0.92
    
  - name: glm-5.1
    provider: zhipu
    priority: 4
    max_tokens: 128000
    cost_per_1k_tokens: 0.0003
    reliability_score: 0.88
    
  - name: glm-5
    provider: zhipu
    priority: 5
    max_tokens: 128000
    cost_per_1k_tokens: 0.00025
    reliability_score: 0.85
    
  - name: glm-4.7
    provider: zhipu
    priority: 6
    max_tokens: 128000
    cost_per_1k_tokens: 0.0002
    reliability_score: 0.80
    
  - name: mistral
    provider: mistral
    priority: 7
    max_tokens: 32000
    cost_per_1k_tokens: 0.0004
    reliability_score: 0.87
    
  - name: cohere
    provider: cohere
    priority: 8
    max_tokens: 128000
    cost_per_1k_tokens: 0.0006
    reliability_score: 0.89
    
  - name: openrouter
    provider: openrouter
    priority: 9
    max_tokens: 100000
    cost_per_1k_tokens: 0.0007
    reliability_score: 0.85
    
  - name: together.ai
    provider: together.ai
    priority: 10
    max_tokens: 100000
    cost_per_1k_tokens: 0.0008
    reliability_score: 0.82
    
  - name: kimi-2.7
    provider: kimi
    priority: 11
    max_tokens: 200000
    cost_per_1k_tokens: 0.0005
    reliability_score: 0.84

# 🔄 Логіка вибору моделі
selection_strategy:
  # Пріоритет на основі надійності та вартості
  primary_criteria: reliability_score
  secondary_criteria: cost_per_1k_tokens
  
  # Мінімальний поріг надійності
  min_reliability_score: 0.80
  
  # Максимальний бюджет на запит (в доларах)
  max_cost_per_request: 0.10
  
  # Час очікування відповіді (в секундах)
  timeout: 30
  
  # Автоматичне перемикання моделі при помилці
  auto_switch_on_failure: true
  
  # Логіка fallback: якщо модель недоступна, вибирається наступна за пріоритетом
  fallback_strategy: priority_based

# 📊 Моніторинг та оцінка моделей
monitoring:
  # Період оновлення статистики (в секундах)
  update_interval: 60
  
  # Метрики для оцінки моделей
  metrics:
    - response_time
    - success_rate
    - cost
    - reliability_score

# 🛠️ Налаштування для агентів
agents:
  mega_agent:
    allowed_models:
      - gemini-2.0-flash
      - gemini-2.0-flash-thinking
      - gemini-1.5-pro
      - glm-5.1
      - glm-5
      - glm-4.7
    
  klav_agent:
    allowed_models:
      - mistral
      - cohere
      - openrouter
      - together.ai
      - kimi-2.7