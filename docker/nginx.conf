events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # =====================================
    # КРИТИЧНО: Налаштування для великих файлів (митні декларації до 1GB)
    # =====================================
    client_max_body_size 1G;
    client_body_timeout 600s;
    client_body_buffer_size 128k;

    # Логування
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Оптимізація
    sendfile on;
    keepalive_timeout 120;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # ── Upstream: Backend API ─────────────────────────────────────────────
    # BACKEND_HOST env variable allows switching between:
    #   - Docker Compose: "backend"
    #   - Kubernetes:     "predator-backend"
    upstream backend_upstream {
        server backend:8000;
    }

    # ── Upstream: OpenSearch Dashboards ───────────────────────────────────
    upstream opensearch_upstream {
        server opensearch-dashboards:5601;
    }

    server {
        listen 80;
        server_name localhost;

        # Статичні файли (фронтенд)
        location / {
            root /usr/share/nginx/html;
            index index.html index.htm;
            try_files $uri $uri/ /index.html;
        }

        # Проксі до бекенду
        # SOM & Ledger Locations (v29-S)
        location ^~ /api/v1/som/ {
            proxy_pass http://som:8095;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location ^~ /api/v1/ledger/ {
            proxy_pass http://som:8095;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/ {
            client_max_body_size 2G;
            proxy_request_buffering off;
            proxy_pass http://backend:8000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # Збільшені таймаути для великих файлів та довгих операцій
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
            proxy_connect_timeout 120s;
        }

        # WebSocket підтримка для Omniscience
        location /api/v25/ws/ {
            proxy_pass http://backend:8000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 86400;
        }

        # Статичні файли бекенду
        location /static/ {
            proxy_pass http://backend:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Health check endpoint
        location /health {
            access_log off;
            return 200 '{"status":"healthy","version":"v25.0"}';
            add_header Content-Type application/json;
        }

        # WebSocket proxy for real-time updates
        location /ws {
            proxy_pass http://backend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 86400;
        }

        # UA-Sources API proxy (ALL endpoints)
        location ~ ^/api/v1/(databases|sources|security|system|portal|evolution|llm|ml|optimizer|analytics|integrations|nexus|tasks|saga|neural|metrics|health) {
            proxy_pass http://backend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 300;
            proxy_connect_timeout 10;
        }

        # General API proxy
        location /api/ {
            proxy_pass http://backend_upstream/api/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 300;
            proxy_connect_timeout 10;
        }

        # OpenSearch Dashboards Proxy with Ukrainian Localization
        location /osd/ {
            proxy_pass http://opensearch_upstream/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 600s;
            client_max_body_size 1G;
        }

        # SPA fallback — всі маршрути повертають index.html (React Router)
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Error pages
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}
