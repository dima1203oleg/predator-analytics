events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # =====================================
    # КРИТИЧНО: Налаштування для великих файлів (митні декларації до 1GB)
    # =====================================
    client_max_body_size 1G;
    client_body_timeout 600s;
    client_body_buffer_size 128k;

    # Логування
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Оптимізація
    sendfile on;
    keepalive_timeout 120;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Resolver for Docker DNS (Robustness Fix)
    resolver 127.0.0.11 valid=30s ipv6=off;

    # Основний сервер
    server {
        listen 80;
        server_name localhost;

        # Статичні файли (фронтенд)
        location / {
            root /usr/share/nginx/html;
            index index.html index.htm;
            try_files $uri $uri/ /index.html;
        }

        # Проксі до бекенду
        # SOM & Ledger Locations (v29-S)
        location ^~ /api/v1/som/ {
            proxy_pass http://som:8095;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location ^~ /api/v1/ledger/ {
            proxy_pass http://som:8095;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/ {
            client_max_body_size 2G;
            proxy_request_buffering off;
            proxy_pass http://backend:8000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # Збільшені таймаути для великих файлів та довгих операцій
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
            proxy_connect_timeout 120s;
        }

        # WebSocket підтримка для Omniscience
        location /api/v25/ws/ {
            proxy_pass http://backend:8000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 86400;
        }

        # Статичні файли бекенду
        location /static/ {
            proxy_pass http://backend:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Health check endpoint
        location /health {
            return 200 'OK';
            add_header Content-Type text/plain;
        }

        # OpenSearch Dashboards proxy (Dynamic Resolution)
        location /opensearch-dashboards/ {
            set $dashboards_upstream predator_dashboards:5601;
            proxy_pass http://$dashboards_upstream/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
            proxy_read_timeout 300s;
        }

        # Grafana proxy (Dynamic Resolution)
        location /grafana/ {
            set $grafana_upstream predator_grafana:3000;
            proxy_pass http://$grafana_upstream/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Prometheus proxy (Dynamic Resolution)
        location /prometheus/ {
            set $prometheus_upstream predator_prometheus:9090;
            proxy_pass http://$prometheus_upstream/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # H2O LLM Studio proxy (Dynamic Resolution - Already Configured)
        location /llm-studio/ {
            set $llm_upstream h2o-llmstudio:10101;
            proxy_pass http://$llm_upstream/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
            proxy_read_timeout 600s;
            client_max_body_size 1G;
            # Fallback error handling
            proxy_intercept_errors on;
            error_page 502 503 504 = @llm_unavailable;
        }

        location @llm_unavailable {
            default_type application/json;
            return 503 '{"error": "H2O LLM Studio сервіс тимчасово недоступний", "status": 503}';
        }

        # MinIO Console proxy (Dynamic Resolution)
        location /minio/ {
            set $minio_upstream predator_minio:9001;
            proxy_pass http://$minio_upstream/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 600s;
            client_max_body_size 1G;
        }

        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}
