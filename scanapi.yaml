project:
  name: Predator Analytics API Core
  baseUrl: "http://localhost:8090"

endpoints:
  - name: Evolution Status
    path: "/api/v25/evolution/status"
    requests:
      - name: Get Current Metrics
        method: GET
        tests:
          - name: Status code is 200
            assertion: "{{response.status_code == 200}}"
          - name: Intelligence gain is present
            assertion: "{{'intelligence_gain' in response.json()}}"

  - name: System Health
    path: "/api/v25/system/status"
    requests:
      - name: Heartbeat Check
        method: GET
        tests:
          - name: Active status
            assertion: "{{response.json().status == 'active'}}"
