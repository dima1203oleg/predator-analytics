# ═══════════════════════════════════════════════════════════════
# 🦁 PREDATOR Analytics v4.1 — Канонічна конфігурація Pytest
# Python 3.12 | async тести | coverage ≥80%
# ═══════════════════════════════════════════════════════════════

[pytest]
minversion = 8.0
asyncio_mode = auto

# Де шукати тести
testpaths = tests services libs

# Патерни файлів і класів
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Шляхи до Python модулів
pythonpath = .

# Опції запуску
addopts =
    --strict-markers
    --strict-config
    --tb=short
    -v
#    --cov=app
#    --cov-report=term-missing
#    --cov-report=html:coverage/html
#    --cov-report=xml:coverage/xml
    --no-header

# Маркери (для групування тестів)
markers =
    unit: Юніт-тести (без зовнішніх залежностей)
    integration: Інтеграційні тести (з реальними сервісами)
    e2e: End-to-end тести
    slow: Повільні тести (ML тренування)
    api: API endpoint тести
    security: Тести безпеки

# Логування
log_cli = true
log_level = INFO
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s (%(filename)s:%(lineno)s)
log_cli_date_format = %H:%M:%S

# Фільтри попереджень
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning
    ignore::PendingDeprecationWarning
