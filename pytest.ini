# ═══════════════════════════════════════════════════════════════════════════════
# 🦁 PREDATOR ANALYTICS — Pytest Configuration (God-Mode)
# Python 3.12 | async tests | coverage reporting
# ═══════════════════════════════════════════════════════════════════════════════

[pytest]
minversion = 7.0

# Опції запуску
addopts =
    -ra
    -q
    --strict-markers
    --strict-config
    --tb=short
    --cov=app
    --cov-report=term-missing
    --cov-report=xml:coverage.xml
    --cov-report=html:coverage_html
    --no-header
    --ignore=tests/e2e/test_k8s_load.py
    --ignore=tests/e2e/test_system_flow.py
    --ignore=tests/test_autonomous_intelligence_v2.py
    --ignore=tests/test_etl_truth.py
    --ignore=tests/test_guardian.py
    --ignore=tests/test_k8s_dump.py
    --ignore=tests/test_kubernetes_dump.py
    --ignore=tests/unit/test_cers.py
    --ignore=tests/unit/test_ingestion.py
    --ignore=tests/v27_tests/test_v27_features.py

# Шляхи до Python модулів
pythonpath = . apps/backend

# Де шукати тести
testpaths =
    tests
    apps/backend/tests

# Async режим (для FastAPI)
asyncio_mode = auto

# Логування
log_cli = true
log_level = INFO
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s (%(filename)s:%(lineno)s)
log_cli_date_format = %H:%M:%S

# Маркери (для групування тестів)
markers =
    slow: Повільні тести (база даних, мережа)
    integration: Інтеграційні тести
    e2e: End-to-end тести
    unit: Юніт-тести
    api: API endpoint тести
    security: Тести безпеки

# Фільтри попереджень
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning
    ignore::PendingDeprecationWarning

# Таймаут (секунди)
timeout = 30
