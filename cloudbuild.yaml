steps:
  # 1. Build core-api
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'europe-west3-docker.pkg.dev/$PROJECT_ID/predator-repo/core-api:latest', '-f', 'services/core-api/Dockerfile', '.']
  
  # 2. Build frontend
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'europe-west3-docker.pkg.dev/$PROJECT_ID/predator-repo/frontend:latest', '-f', 'apps/predator-analytics-ui/Dockerfile', './apps/predator-analytics-ui']
  
  # 3. Build graph-service
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'europe-west3-docker.pkg.dev/$PROJECT_ID/predator-repo/graph-service:latest', '-f', 'services/graph-service/Dockerfile', '.']
  
  # 4. Build cerebro
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'europe-west3-docker.pkg.dev/$PROJECT_ID/predator-repo/cerebro:latest', '-f', 'services/cerebro/Dockerfile', '.']
  
  # 5. Build rtb-engine
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'europe-west3-docker.pkg.dev/$PROJECT_ID/predator-repo/rtb-engine:latest', '-f', 'services/rtb-engine/Dockerfile', '.']
  
  # 6. Build ingestion-worker
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'europe-west3-docker.pkg.dev/$PROJECT_ID/predator-repo/ingestion-worker:latest', '-f', 'services/ingestion-worker/Dockerfile', '.']
  
  # 7. Build mcp-router
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'europe-west3-docker.pkg.dev/$PROJECT_ID/predator-repo/mcp-router:latest', '-f', 'services/mcp-router/Dockerfile', '.']

images:
  - 'europe-west3-docker.pkg.dev/$PROJECT_ID/predator-repo/core-api:latest'
  - 'europe-west3-docker.pkg.dev/$PROJECT_ID/predator-repo/frontend:latest'
  - 'europe-west3-docker.pkg.dev/$PROJECT_ID/predator-repo/graph-service:latest'
  - 'europe-west3-docker.pkg.dev/$PROJECT_ID/predator-repo/cerebro:latest'
  - 'europe-west3-docker.pkg.dev/$PROJECT_ID/predator-repo/rtb-engine:latest'
  - 'europe-west3-docker.pkg.dev/$PROJECT_ID/predator-repo/ingestion-worker:latest'
  - 'europe-west3-docker.pkg.dev/$PROJECT_ID/predator-repo/mcp-router:latest'

options:
  machineType: 'E2_HIGHCPU_8'
